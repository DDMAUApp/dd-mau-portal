                                                    <th className="text-left px-3 py-2 font-bold text-gray-700 sticky left-0 bg-purple-50 z-10 min-w-[100px]">
                                                        {language === "es" ? "Nombre" : "Name"}
                                                    </th>
                                                    {SKILL_STATIONS.map(s => (
                                                        <th key={s.id} className="px-1 py-2 text-center font-bold text-gray-600 min-w-[40px]">
                                                            <div className="text-base">{s.emoji}</div>
                                                            <div className="text-[9px] leading-tight">{s.nameEn}</div>
                                                        </th>
                                                    ))}
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {bohStaff.map((staff, idx) => (
                                                    <tr key={staff.id} className={idx % 2 === 0 ? "bg-white" : "bg-gray-50"}>
                                                        <td className={`px-3 py-1.5 font-bold text-gray-800 sticky left-0 z-10 ${idx % 2 === 0 ? "bg-white" : "bg-gray-50"}`}>
                                                            {staff.name.split(" ")[0]}
                                                        </td>
                                                        {SKILL_STATIONS.map(s => {
                                                            const checked = !!skillsMatrix[staff.name + "_" + s.id];
                                                            return (
                                                                <td key={s.id} className="px-1 py-1.5 text-center">
                                                                    <button
                                                                        onClick={() => toggleSkill(staff.name, s.id)}
                                                                        className={`w-7 h-7 rounded-md text-sm font-bold transition ${
                                                                            checked
                                                                                ? "bg-mint-600 text-white"
                                                                                : "bg-gray-100 text-gray-300 hover:bg-gray-200"
                                                                        }`}
                                                                    >
                                                                        {checked ? "✓" : ""}
                                                                    </button>
                                                                </td>
                                                            );
                                                        })}
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                    {/* Quick stats */}
                                    <div className="px-4 py-2 bg-purple-50 border-t border-purple-200 flex flex-wrap gap-3">
                                        {SKILL_STATIONS.map(s => {
                                            const count = bohStaff.filter(st => skillsMatrix[st.name + "_" + s.id]).length;
                                            return (
                                                <span key={s.id} className={`text-xs font-bold ${count === 0 ? "text-red-500" : count <= 2 ? "text-orange-500" : "text-gray-500"}`}>
                                                    {s.emoji} {count}
                                                </span>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}

                            {/* ── STATION BOARD ── */}
                            <div className="bg-charcoal rounded-xl p-4">
                                <div className="flex items-center justify-between mb-3">
                                    <h3 className="text-white font-bold text-sm uppercase tracking-wider">
                                        {language === "es" ? "📋 Estaciones de Hoy" : "📋 Today's Stations"}
                                    </h3>
                                    {currentIsAdmin && (
                                        <button onClick={() => setEditingStations(!editingStations)}
                                            className={`text-xs px-2.5 py-1 rounded-full font-bold ${editingStations ? "bg-red-500 text-white" : "bg-white bg-opacity-20 text-white"}`}>
                                            {editingStations ? (language === "es" ? "✕ Cerrar" : "✕ Done") : (language === "es" ? "✏️ Editar" : "✏️ Edit")}
                                        </button>
                                    )}
                                </div>

                                {/* ── EDIT MODE ── */}
                                {editingStations && currentIsAdmin && (
                                    <div className="mb-3 space-y-2">
                                        {customStations.map((pos, idx) => (
                                            <div key={pos.id} className="bg-white bg-opacity-10 rounded-lg p-2 flex items-center gap-2">
                                                <div className="flex flex-col gap-0.5">
                                                    <button onClick={() => moveStation(pos.id, -1)} disabled={idx === 0}
                                                        className={`text-xs leading-none ${idx === 0 ? "text-gray-600" : "text-gray-300 hover:text-white"}`}>▲</button>
                                                    <button onClick={() => moveStation(pos.id, 1)} disabled={idx === customStations.length - 1}
                                                        className={`text-xs leading-none ${idx === customStations.length - 1 ? "text-gray-600" : "text-gray-300 hover:text-white"}`}>▼</button>
                                                </div>
                                                <input type="text" value={pos.emoji} onChange={e => updateStationEmoji(pos.id, e.target.value)}
                                                    className="w-10 text-center text-lg bg-white bg-opacity-10 rounded border border-gray-600 text-white" style={{padding: "2px"}} />
                                                <input type="text" value={pos.nameEn} onChange={e => renameStation(pos.id, e.target.value)}
                                                    className="flex-1 bg-white bg-opacity-10 rounded border border-gray-600 text-white text-xs px-2 py-1.5 font-bold" />
                                                <button onClick={() => removeStation(pos.id)}
                                                    className="text-red-400 hover:text-red-300 text-sm font-bold px-1">✕</button>
                                            </div>
                                        ))}
                                        {/* Add new station */}
                                        <div className="bg-white bg-opacity-5 rounded-lg p-2 flex items-center gap-2 border border-dashed border-gray-600">
                                            <input type="text" value={newStationEmoji} onChange={e => setNewStationEmoji(e.target.value)}
                                                className="w-10 text-center text-lg bg-white bg-opacity-10 rounded border border-gray-600 text-white" style={{padding: "2px"}}
                                                placeholder="📍" />
                                            <input type="text" value={newStationName} onChange={e => setNewStationName(e.target.value)}
                                                className="flex-1 bg-white bg-opacity-10 rounded border border-gray-600 text-white text-xs px-2 py-1.5"
                                                placeholder={language === "es" ? "Nueva estación..." : "New station name..."}
                                                onKeyDown={e => { if (e.key === "Enter") addStation(); }} />
                                            <button onClick={addStation}
                                                className="bg-mint text-white text-xs font-bold px-3 py-1.5 rounded hover:opacity-90">+</button>
                                        </div>
                                        {/* Reset to defaults */}
                                        <button onClick={resetStationsToDefault}
                                            className="text-xs text-gray-400 hover:text-gray-200 underline mt-1">
                                            {language === "es" ? "Restaurar predeterminados" : "Reset to defaults"}
                                        </button>
                                    </div>
                                )}

                                {/* ── ASSIGNMENT GRID ── */}
                                <div className="grid grid-cols-2 gap-2">
                                    {ALL_POSITIONS.map(pos => {
                                        const person = breakPlan.stations?.[pos.id] || "";
                                        return (
                                            <div key={pos.id} className="bg-white rounded-lg p-2.5">
                                                <div className="flex items-center gap-1.5 mb-1.5">
                                                    <span className="text-lg">{pos.emoji}</span>
                                                    <span className="font-bold text-xs text-charcoal">{language === "es" ? pos.nameEs : pos.nameEn}</span>
                                                </div>
                                                <select
                                                    className="w-full border border-gray-200 rounded px-2 py-1.5 text-xs bg-gray-50"
                                                    value={person}
                                                    onChange={e => updateStationAssignment(pos.id, e.target.value)}
                                                >
                                                    <option value="">—</option>
                                                    {(pos.id === "manager" ? (staffList || []).filter(s => ["Kitchen Manager", "Asst Kitchen Manager", "Manager", "Shift Lead"].includes(s.role) && (s.location === storeLocation || s.location === "both")) : bohStaff).map(s => (
                                                        <option key={s.id} value={s.name}>{s.name}</option>
                                                    ))}
                                                </select>
                                            </div>
                                        );
                                    })}
                                </div>

                                {/* Who's working today summary */}
                                {(() => {
                                    const assigned = getAssignedStaff();
                                    if (assigned.length === 0) return null;
                                    return (
                                        <div className="mt-3 pt-3 border-t border-gray-600">
                                            <p className="text-xs text-gray-400 mb-1">{language === "es" ? "Trabajando hoy" : "Working today"}: <span className="text-white font-bold">{assigned.length}</span></p>
                                            <p className="text-xs text-gray-300">{assigned.map(n => n.split(" ")[0]).join(", ")}</p>
                                        </div>
                                    );
                                })()}
                            </div>

                            {/* ── BREAK WAVES ── */}
                            {BREAK_WAVES.map((wave, waveIdx) => {
                                const assignedStaff = getAssignedStaff();
                                const breakers = getWaveBreakers(wave.id);
                                const available = getAvailableCovers(wave.id);
                                const needCover = getPositionsNeedingCover(wave.id);
                                const staffMap = getStaffPositionMap();

                                // People who already went on break in earlier waves
                                const alreadyBroke = new Set();
                                BREAK_WAVES.slice(0, waveIdx).forEach(prev => {
                                    getWaveBreakers(prev.id).forEach(n => alreadyBroke.add(n));
                                });

                                // Build cover assignment counts for warnings
                                const coverCounts = {};
                                needCover.forEach(nc => {
                                    const c = nc.cover;
                                    if (c) {
                                        if (!coverCounts[c]) coverCounts[c] = [];
                                        coverCounts[c].push(language === "es" ? nc.pos.nameEs : nc.pos.nameEn);
                                    }
                                });
                                const doubles = Object.entries(coverCounts).filter(([_, s]) => s.length > 1);
                                const uncovered = needCover.filter(nc => !nc.cover);

                                return (
                                    <div key={wave.id} className="bg-white border-2 border-blue-200 rounded-xl overflow-hidden">
                                        <div className="bg-blue-600 text-white px-4 py-2.5 flex items-center justify-between">
                                            <div className="flex items-center gap-2">
                                                <h3 className="font-bold text-sm">{language === "es" ? `Grupo ${waveIdx+1}` : `Wave ${waveIdx+1}`} —</h3>
                                                <input type="time" value={breakWaveTimes[waveIdx] || wave.time}
                                                    onChange={e => updateWaveTime(waveIdx, e.target.value)}
                                                    className="bg-blue-500 text-white border border-blue-400 rounded px-1.5 py-0.5 text-sm font-bold" style={{colorScheme:"dark"}} />
                                            </div>
                                            <span className="text-xs bg-blue-500 px-2 py-0.5 rounded-full">
                                                {breakers.length} {language === "es" ? "en break" : "on break"}
                                            </span>
                                        </div>

                                        <div className="p-3">
                                            {assignedStaff.length === 0 ? (
                                                <p className="text-center text-gray-400 text-sm py-4">
                                                    {language === "es" ? "Asigna estaciones primero" : "Assign stations first"}
                                                </p>
                                            ) : (
                                                <div>
                                                    {/* ─ Who's going on break? ─ */}
                                                    <p className="text-xs font-bold text-gray-500 uppercase tracking-wide mb-2">
                                                        {language === "es" ? "¿Quién sale a break?" : "Who's going on break?"}
                                                    </p>
                                                    <div className="flex flex-wrap gap-1.5 mb-3">
                                                        {assignedStaff.map(name => {
                                                            const onBreak = breakers.includes(name);
                                                            const alreadyWent = alreadyBroke.has(name);
                                                            const positions = (staffMap[name] || []).map(p => p.emoji).join("");
                                                            if (alreadyWent && !onBreak) {
                                                                // Already took break in earlier wave — show grayed out
                                                                return (
                                                                    <span key={name}
                                                                        className="px-2.5 py-1.5 rounded-full text-xs font-bold border-2 bg-gray-100 text-gray-300 border-gray-100 line-through"
                                                                        title={language === "es" ? "Ya tomó break" : "Already took break"}
                                                                    >
                                                                        {positions} {name.split(" ")[0]}
                                                                    </span>
                                                                );
                                                            }
                                                            return (
                                                                <button key={name}
                                                                    onClick={() => toggleBreaker(wave.id, name)}
                                                                    className={`px-2.5 py-1.5 rounded-full text-xs font-bold transition border-2 ${
                                                                        onBreak
                                                                            ? "bg-orange-500 text-white border-orange-500"
                                                                            : "bg-white text-gray-700 border-gray-200 hover:border-orange-300"
                                                                    }`}
                                                                >
                                                                    {positions} {name.split(" ")[0]}
                                                                </button>
                                                            );
                                                        })}
                                                    </div>

                                                    {/* ─ Coverage map ─ */}
                                                    {needCover.length > 0 && (
                                                        <div>
                                                            <p className="text-xs font-bold text-mint-700 uppercase tracking-wide mb-2">
                                                                {language === "es" ? "Cobertura necesaria" : "Coverage needed"}
                                                            </p>
                                                            <div className="space-y-2">
                                                                {needCover.map(nc => (
                                                                    <div key={nc.pos.id} className="flex items-center gap-2 bg-orange-50 border border-orange-200 rounded-lg p-2">
                                                                        <span className="text-lg">{nc.pos.emoji}</span>
                                                                        <div className="flex-1 min-w-0">
                                                                            <div className="text-xs">
                                                                                <span className="font-bold text-gray-500">{language === "es" ? nc.pos.nameEs : nc.pos.nameEn}</span>
                                                                                <span className="text-orange-500 ml-1">({nc.person.split(" ")[0]} {language === "es" ? "en break" : "on break"})</span>
                                                                            </div>
                                                                            <select
                                                                                className={`w-full mt-1 border rounded px-2 py-1.5 text-xs font-bold ${nc.cover ? "border-mint-400 bg-mint-50 text-mint-800" : "border-red-300 bg-red-50 text-red-700"}`}
                                                                                value={nc.cover}
                                                                                onChange={e => setWaveCover(wave.id, nc.pos.id, e.target.value)}
                                                                            >
                                                                                <option value="">{language === "es" ? "⚠️ Seleccionar cobertura..." : "⚠️ Select cover..."}</option>
                                                                                {(() => {
                                                                                    const qualified = getQualifiedCovers(nc.pos.id, available, wave.id);
                                                                                    const unqualified = available.filter(n => !qualified.includes(n));
                                                                                    return [
                                                                                        ...qualified.map(n => (
                                                                                            <option key={n} value={n}>✓ {n} {(staffMap[n] || []).map(p => p.emoji).join("")}</option>
                                                                                        )),
                                                                                        unqualified.length > 0 && qualified.length > 0 ? <option key="_sep" disabled>───────</option> : null,
                                                                                        ...unqualified.map(n => (
                                                                                            <option key={n} value={n} style={{color:"#999"}}>{n}</option>
                                                                                        ))
                                                                                    ];
                                                                                })()}
                                                                            </select>
                                                                        </div>
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        </div>
                                                    )}

                                                    {/* ─ Still working (not on break) ─ */}
                                                    {breakers.length > 0 && available.length > 0 && (
                                                        <div className="mt-3 pt-2 border-t border-gray-200">
                                                            <p className="text-xs font-bold text-gray-400 mb-1">
                                                                {language === "es" ? "Trabajando" : "Still working"}: {available.map(n => {
                                                                    const positions = (staffMap[n] || []).map(p => p.emoji).join("");
                                                                    return positions + " " + n.split(" ")[0];
                                                                }).join(", ")}
                                                            </p>
                                                        </div>
                                                    )}

                                                    {/* ─ Warnings ─ */}
                                                    {(uncovered.length > 0 || doubles.length > 0) && (
                                                        <div className="mt-2 space-y-1">
                                                            {uncovered.length > 0 && (
                                                                <div className="text-xs text-red-600 font-bold bg-red-50 rounded px-2 py-1">
                                                                    ⚠️ {language === "es" ? "Sin cubrir" : "Uncovered"}: {uncovered.map(nc => (language === "es" ? nc.pos.nameEs : nc.pos.nameEn)).join(", ")}
                                                                </div>
                                                            )}
                                                            {doubles.map(([name, stations]) => (
                                                                <div key={name} className="text-xs text-orange-700 bg-orange-50 rounded px-2 py-1">
                                                                    ⚠️ <span className="font-bold">{name.split(" ")[0]}</span> {language === "es" ? "cubre" : "covers"} {stations.join(" + ")}
                                                                </div>
                                                            ))}
                                                        </div>
                                                    )}
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                );
                            })}
                            {/* ── PRINT BUTTON ── */}
                            {(() => {
                                const assigned = getAssignedStaff();
                                if (assigned.length === 0) return null;
                                return (
                                    <button onClick={() => {
                                        const today = new Date().toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric", year: "numeric" });
                                        const staffMap = getStaffPositionMap();
                                        let html = `<html><head><title>Break Plan - ${today}</title><style>
                                            * { margin: 0; padding: 0; box-sizing: border-box; }
                                            body { font-family: Arial, sans-serif; padding: 20px; max-width: 700px; margin: 0 auto; }
                                            h1 { font-size: 22px; text-align: center; margin-bottom: 2px; }
                                            .date { text-align: center; color: #666; font-size: 13px; margin-bottom: 16px; }
                                            .section { border: 2px solid #333; border-radius: 8px; margin-bottom: 14px; overflow: hidden; }
                                            .section-header { background: #333; color: white; padding: 6px 12px; font-weight: bold; font-size: 14px; }
                                            .station-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
                                            .station { padding: 6px 12px; border-bottom: 1px solid #ddd; border-right: 1px solid #ddd; font-size: 13px; }
                                            .station:nth-child(even) { border-right: none; }
                                            .station-name { font-weight: bold; color: #333; font-size: 11px; text-transform: uppercase; }
                                            .station-person { color: #000; font-size: 14px; margin-top: 1px; }
                                            .wave { margin-bottom: 12px; }
                                            .wave-header { background: #2563eb; color: white; padding: 6px 12px; font-weight: bold; font-size: 14px; }
                                            .wave-body { padding: 8px 12px; }
                                            .wave-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; border-bottom: 1px solid #eee; font-size: 13px; }
                                            .wave-row:last-child { border-bottom: none; }
                                            .breakers { font-weight: bold; color: #ea580c; }
                                            .cover-label { color: #666; font-size: 11px; }
                                            .cover-name { font-weight: bold; color: #15803d; }
                                            .working { color: #666; font-size: 12px; margin-top: 6px; }
                                            @media print { body { padding: 10px; } }
                                        </style></head><body>`;
                                        html += `<h1>🍜 DD Mau Break Plan</h1><div class="date">${today}</div>`;

                                        // Stations
                                        html += `<div class="section"><div class="section-header">📋 Today's Stations</div><div class="station-grid">`;
                                        ALL_POSITIONS.forEach(pos => {
                                            const person = breakPlan.stations?.[pos.id] || "—";
                                            html += `<div class="station"><div class="station-name">${pos.emoji} ${pos.nameEn}</div><div class="station-person">${person}</div></div>`;
                                        });
                                        html += `</div></div>`;

                                        // Break waves
                                        BREAK_WAVES.forEach((wave, waveIdx) => {
                                            const breakers = getWaveBreakers(wave.id);
                                            const available = getAvailableCovers(wave.id);
                                            const needCover = getPositionsNeedingCover(wave.id);
                                            html += `<div class="section"><div class="wave-header">${wave.nameEn}</div><div class="wave-body">`;
                                            if (breakers.length > 0) {
                                                html += `<div style="margin-bottom:6px"><span class="breakers">On break: ${breakers.map(n => n.split(" ")[0]).join(", ")}</span></div>`;
                                                needCover.forEach(nc => {
                                                    const coverName = nc.cover ? nc.cover.split(" ")[0] : "⚠️ UNCOVERED";
                                                    html += `<div class="wave-row"><span>${nc.pos.emoji} ${nc.pos.nameEn} <span class="cover-label">(${nc.person.split(" ")[0]} on break)</span></span><span class="cover-name">→ ${coverName}</span></div>`;
                                                });
                                                if (available.length > 0) {
                                                    html += `<div class="working">Still working: ${available.map(n => { const positions = (staffMap[n] || []).map(p => p.emoji).join(""); return positions + " " + n.split(" ")[0]; }).join(", ")}</div>`;
                                                }
                                            } else {
                                                html += `<div style="color:#999;font-size:13px">No breaks assigned</div>`;
                                            }
                                            html += `</div></div>`;
                                        });

                                        html += `</body></html>`;
                                        const printWindow = window.open("", "_blank");
                                        printWindow.document.write(html);
                                        printWindow.document.close();
                                        printWindow.focus();
                                        setTimeout(() => printWindow.print(), 300);
                                    }}
                                        className="w-full mt-4 py-3 rounded-xl font-bold text-sm bg-blue-600 text-white hover:bg-blue-700 active:scale-95 transition flex items-center justify-center gap-2">
                                        🖨️ {language === "es" ? "Imprimir Plan de Breaks" : "Print Break Plan"}
                                    </button>
                                );
                            })()}
                        </div>
                    )}
                </div>
            );
        }

        // Menu Reference Component
        function MenuReference({ language }) {
            const [expandedCategory, setExpandedCategory] = useState(null);

            return (
                <div className="p-4 pb-24">
                    <h2 className="text-2xl font-bold text-mint-700 mb-4">🍜 {t("menuReference", language)}</h2>

                    <div className="space-y-3">
                        {MENU_DATA.map((category, idx) => (
                            <div key={idx} className="bg-white rounded-lg border-2 border-gray-200 overflow-hidden">
                                <button
                                    onClick={() => setExpandedCategory(expandedCategory === idx ? null : idx)}
                                    className="w-full p-4 text-left bg-gradient-to-r from-mint-50 to-white hover:bg-mint-50 border-b flex justify-between items-center"
                                >
                                    <h3 className="font-bold text-lg text-mint-700">{language === "es" ? category.categoryEs : category.category}</h3>
                                    <span className="text-xl">{expandedCategory === idx ? "▼" : "▶"}</span>
                                </button>

                                {expandedCategory === idx && (
                                    <div className="p-4 space-y-4">
                                        {category.items.map((item, itemIdx) => (
                                            <div key={itemIdx} className="pb-4 border-b last:border-b-0">
                                                <div className="flex justify-between items-start mb-2">
                                                    <div>
                                                        <h4 className="font-bold text-gray-800">{language === "es" ? item.nameEn : item.nameEn}</h4>
                                                        {item.nameVi && <p className="text-sm text-gray-600">{item.nameVi}</p>}
                                                    </div>
                                                    <p className="font-bold text-mint-700">{item.price}</p>
                                                </div>
                                                <p className="text-sm text-gray-700 mb-2">{language === "es" ? item.descEs : item.descEn}</p>
                                                <div className="flex gap-2 flex-wrap text-xs">
                                                    {item.popular && <span className="bg-mint-100 text-mint-700 px-2 py-1 rounded">⭐ {t("popular", language)}</span>}
                                                    {item.spicy && <span className="bg-orange-100 text-orange-700 px-2 py-1 rounded">🌶 {t("spicy", language)}</span>}
                                                    {item.allergens && <span className="bg-yellow-100 text-yellow-700 px-2 py-1 rounded">⚠ {item.allergens}</span>}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        // Schedule Component
        function Schedule({ staffName, language, storeLocation, staffList }) {
            const getStaffLocation = (name) => {
                const s = (staffList || []).find(st => st.name === name);
                return s?.location || "webster";
            };
            const filterByLocation = (entries) => entries.filter(e => {
                const loc = getStaffLocation(e.name);
                return loc === storeLocation || loc === "both";
            });

            return (
                <div className="p-4 pb-24">
                    <h2 className="text-2xl font-bold text-mint-700 mb-2">📅 {t("weeklySchedule", language)}</h2>
                    <p className="text-gray-600 mb-4">{SCHEDULE_DATA.week} — <span className="font-bold text-mint-700">{LOCATION_LABELS[storeLocation]}</span></p>

                    <div className="space-y-4">
                        {SCHEDULE_DATA.shifts.map((day, idx) => {
                            const filteredSchedule = filterByLocation(day.schedule);
                            return (

        // DD Mau Location Coordinates
        const DD_MAU_LOCATIONS = [
            { name: "Maryland Heights", lat: 38.7138, lng: -90.4391 },
            { name: "Webster Groves", lat: 38.5917, lng: -90.3389 }
        ];
        const GEOFENCE_RADIUS_FEET = 500;

        // Haversine distance in feet
        function getDistanceFeet(lat1, lng1, lat2, lng2) {
            const R = 20902231; // Earth radius in feet
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) ** 2 +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                Math.sin(dLng / 2) ** 2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        function isWithinGeofence(lat, lng) {
            return DD_MAU_LOCATIONS.some(loc =>
                getDistanceFeet(lat, lng, loc.lat, loc.lng) <= GEOFENCE_RADIUS_FEET
            );
        }

        // Geofence hook
        function useGeofence() {
            const [isAtDDMau, setIsAtDDMau] = useState(false);
            const [checking, setChecking] = useState(true);
            const [error, setError] = useState(null);

            useEffect(() => {
                if (!navigator.geolocation) {
                    setError("noGeo");
                    setChecking(false);
                    return;
                }

                const watchId = navigator.geolocation.watchPosition(
                    (pos) => {
                        const inside = isWithinGeofence(pos.coords.latitude, pos.coords.longitude);
                        setIsAtDDMau(inside);
                        setChecking(false);
                        setError(null);
                    },
                    (err) => {
                        setError(err.code === 1 ? "denied" : "unavailable");
                        setChecking(false);
                    },
                    { enableHighAccuracy: true, maximumAge: 30000, timeout: 10000 }
                );

                return () => navigator.geolocation.clearWatch(watchId);
            }, []);

            return { isAtDDMau, checking, error };
        }

            // Scale ingredient quantities
            const scaleIngredient = (text, multiplier) => {
                if (!multiplier || multiplier === 1) return text;
                // Match leading fractions, decimals, or whole numbers (with optional fraction after)
                return text.replace(/^(\d+\s+\d+\/\d+|\d+\/\d+|\d+\.?\d*)/, (match) => {
                    let num;
                    if (match.includes(" ") && match.includes("/")) {
                        // Mixed number like "1 1/2"
                        const parts = match.split(" ");
                        const whole = parseFloat(parts[0]);
                        const [n, d] = parts[1].split("/").map(Number);
                        num = whole + n / d;
                    } else if (match.includes("/")) {
                        // Fraction like "1/2"
                        const [n, d] = match.split("/").map(Number);
                        num = n / d;
                    } else {
                        num = parseFloat(match);
                    }
                    const scaled = num * multiplier;
                    // Format nicely
                    if (scaled === Math.floor(scaled)) return scaled.toString();
                    // Check for clean fractions
                    const fracs = [[0.25, "1/4"], [0.333, "1/3"], [0.5, "1/2"], [0.667, "2/3"], [0.75, "3/4"]];
                    const whole = Math.floor(scaled);
                    const dec = scaled - whole;
                    for (const [val, str] of fracs) {
                        if (Math.abs(dec - val) < 0.05) return whole > 0 ? `${whole} ${str}` : str;
                    }
                    return scaled % 1 === 0 ? scaled.toString() : scaled.toFixed(1);
                });

                const handleVisChange = () => {
                    if (document.hidden) setScreenBlurred(true);

                };
                const handleBlur = () => setScreenBlurred(true);
                const handleFocus = () => setTimeout(() => setScreenBlurred(false), 300);
                document.addEventListener('visibilitychange', handleVisChange);
                window.addEventListener('blur', handleBlur);
                window.addEventListener('focus', handleFocus);
                return () => {
                    document.removeEventListener('visibilitychange', handleVisChange);
                    window.removeEventListener('blur', handleBlur);
                    window.removeEventListener('focus', handleFocus);
                };

        // Checklist History Component (Admin only)
        function ChecklistHistory({ language, storeLocation }) {
            const [historyDates, setHistoryDates] = useState([]);
            const [selectedDate, setSelectedDate] = useState(null);
            const [dayData, setDayData] = useState(null);
            const [loading, setLoading] = useState(true);
            const [historySide, setHistorySide] = useState("FOH");
            const [expandedPhoto, setExpandedPhoto] = useState(null);

            useEffect(() => {
                const fetchHistory = async () => {
                    try {
                        const snapshot = await db.collection("checklistHistory_" + storeLocation).get();
                        const dates = snapshot.docs.map(doc => doc.id).filter(d => !d.includes("_")).sort().reverse().slice(0, 30);
                        setHistoryDates(dates);
                        if (dates.length > 0) setSelectedDate(dates[0]);
                    } catch (err) { console.error("Error loading history:", err); }
                    setLoading(false);
                };
                fetchHistory();
            }, [storeLocation]);

            useEffect(() => {
                if (!selectedDate) return;
                const fetchDay = async () => {
                    try {
                        // Prefer the _saved version (has completed checks before reset)
                        const savedDoc = await db.collection("checklistHistory_" + storeLocation).doc(selectedDate + "_saved").get();
                        if (savedDoc.exists) { setDayData(savedDoc.data()); return; }
                        const doc = await db.collection("checklistHistory_" + storeLocation).doc(selectedDate).get();
                        if (doc.exists) setDayData(doc.data());
                        else setDayData(null);
                    } catch (err) { console.error("Error loading day:", err); }
                };
                fetchDay();
            }, [selectedDate, storeLocation]);

            const formatDate = (dateStr) => {
                const d = new Date(dateStr + "T12:00:00");
                return d.toLocaleDateString(language === "es" ? "es-US" : "en-US", { weekday: "short", month: "short", day: "numeric" });
            };

            const renderHistoryPeriod = (period) => {
                if (!dayData || !dayData.customTasks) return null;
                const tasks = dayData.customTasks[historySide]?.[period.id] || [];
                if (tasks.length === 0) return null;
                const checks = dayData.checks || {};

                let totalItems = 0, doneItems = 0;
                tasks.forEach(task => {
                    if (task.subtasks && task.subtasks.length > 0) {
                        totalItems += task.subtasks.length;
                        doneItems += task.subtasks.filter(s => checks[s.id]).length;
                    } else {
                        totalItems += 1;
                        doneItems += checks[task.id] ? 1 : 0;
                    }
                    if (task.requirePhoto) { totalItems += 1; doneItems += checks[task.id + "_photo"] ? 1 : 0; }
                });

                const allDone = totalItems > 0 && doneItems === totalItems;

                return (
                    <div key={period.id} className="mb-3">
                        <div className="flex items-center justify-between mb-1.5">
                            <span className="text-sm font-bold text-gray-700">{period.emoji} {language === "es" ? period.nameEs : period.nameEn}</span>
                            <span className={`text-xs font-bold px-2 py-0.5 rounded-full ${allDone ? "bg-green-100 text-green-700" : "bg-amber-100 text-amber-700"}`}>
                                {doneItems}/{totalItems}
                            </span>
                        </div>
                        <div className="space-y-1">
                            {tasks.map((task, idx) => {
                                const hasSubtasks = task.subtasks && task.subtasks.length > 0;
                                const taskDone = hasSubtasks
                                    ? task.subtasks.every(s => checks[s.id])
                                    : !!checks[task.id];
                                const photoDone = task.requirePhoto ? !!checks[task.id + "_photo"] : true;
                                const fullyDone = taskDone && photoDone;
                                const photoUrl = checks[task.id + "_photo"];

                                return (
                                    <div key={idx} className={`p-2 rounded-lg text-sm ${fullyDone ? "bg-green-50" : "bg-red-50"}`}>
                                        <div className="flex items-center gap-2">
                                            <span className="text-base">{fullyDone ? "✅" : "❌"}</span>
                                            <span className={fullyDone ? "text-gray-700" : "text-red-700 font-medium"}>
                                                {task.task.includes("\n") ? task.task.split("\n").map((line, li) => (
                                                    <span key={li}>{li === 0 ? line : <><br/><span className="font-normal text-xs text-gray-500">{line}</span></>}</span>
                                                )) : task.task}
                                            </span>
                                        </div>
                                        {hasSubtasks && (
                                            <div className="ml-7 mt-1 space-y-0.5">
                                                {task.subtasks.map((sub, si) => (
                                                    <div key={si} className="flex items-center gap-1.5 text-xs">
                                                        <span>{checks[sub.id] ? "✅" : "⬜"}</span>
                                                        <span className={checks[sub.id] ? "text-gray-600" : "text-red-600"}>{sub.task}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                        {task.requirePhoto && (
                                            <div className="ml-7 mt-1">
                                                {photoUrl ? (
                                                    <button onClick={() => setExpandedPhoto(expandedPhoto === task.id ? null : task.id)}
                                                        className="text-xs font-bold text-mint-700 flex items-center gap-1">
                                                        📸 {expandedPhoto === task.id
                                                            ? (language === "es" ? "Ocultar foto" : "Hide photo")
                                                            : (language === "es" ? "Ver foto" : "View photo")}
                                                    </button>
                                                ) : (
                                                    <span className="text-xs text-red-400 font-medium">📸 {language === "es" ? "Foto no tomada" : "Photo not taken"}</span>
                                                )}
                                                {expandedPhoto === task.id && photoUrl && (
                                                    <img src={photoUrl} alt="Task photo" className="mt-1 rounded-lg border border-gray-200 max-w-full" style={{ maxHeight: "200px" }} />
                                                )}
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                );
            };

            if (loading) return <div className="text-center text-gray-500 py-4">{language === "es" ? "Cargando..." : "Loading..."}</div>;

            if (historyDates.length === 0) {
                return (
                    <div className="bg-gray-50 rounded-lg p-4 text-center text-gray-500">
                        <p className="text-sm">{language === "es"
                            ? "Aún no hay historial de listas. El historial comenzará a guardarse cuando el equipo use las listas."
                            : "No checklist history yet. History will start saving when the team uses the checklists."}</p>
                    </div>
                );
            }

            return (
                <div>
                    {/* Date picker */}
                    <div className="flex gap-2 overflow-x-auto pb-2 mb-3" style={{ scrollbarWidth: "none" }}>
                        {historyDates.map(date => (
                            <button key={date} onClick={() => setSelectedDate(date)}
                                className={`flex-shrink-0 px-3 py-2 rounded-lg text-xs font-bold transition ${selectedDate === date
                                    ? "bg-mint-700 text-white"
                                    : "bg-gray-100 text-gray-600 hover:bg-mint-50"}`}>
                                {formatDate(date)}
                            </button>
                        ))}
                    </div>

                    {/* FOH / BOH toggle */}
                    <div className="flex gap-2 mb-4">
                        <button onClick={() => setHistorySide("FOH")}
                            className={`flex-1 py-2 rounded-lg text-xs font-bold transition ${historySide === "FOH" ? "bg-mint-700 text-white" : "bg-gray-100 text-gray-600"}`}>
                            FOH
                        </button>
                        <button onClick={() => setHistorySide("BOH")}
                            className={`flex-1 py-2 rounded-lg text-xs font-bold transition ${historySide === "BOH" ? "bg-mint-700 text-white" : "bg-gray-100 text-gray-600"}`}>
                            BOH
                        </button>
                    </div>

                    {selectedDate && dayData && (
                        <div>
                            <p className="text-xs text-gray-500 mb-3">
                                {language === "es" ? "Última actualización" : "Last updated"}: {new Date(dayData.date).toLocaleString()}
                            </p>
                            {TIME_PERIODS.map(p => renderHistoryPeriod(p))}
                            {TIME_PERIODS.every(p => {
                                const tasks = dayData.customTasks?.[historySide]?.[p.id] || [];
                                return tasks.length === 0;
                            }) && (
                                <p className="text-center text-gray-400 text-sm py-4">{language === "es" ? "Sin tareas para este lado" : "No tasks for this side"}</p>
                            )}
                        </div>
                    )}

                    {selectedDate && !dayData && (
                        <p className="text-center text-gray-400 text-sm py-4">{language === "es" ? "Sin datos para este día" : "No data for this day"}</p>
                    )}
                </div>
            );
        }

        // Inventory History Component (Admin only)
        function InventoryHistory({ language, customInventory: customInventoryProp, storeLocation }) {
            const [historyDates, setHistoryDates] = useState([]);
            const [selectedDate, setSelectedDate] = useState(null);
            const [dayData, setDayData] = useState(null);
            const [prevData, setPrevData] = useState(null);
            const [loading, setLoading] = useState(true);
            // Editable list name
            const [listName, setListName] = useState("");
            const [editingName, setEditingName] = useState(false);
            // Ordered checkboxes
            const [ordered, setOrdered] = useState({});
            // Edit mode for counts & adding items
            const [histEditMode, setHistEditMode] = useState(false);
            const [histCounts, setHistCounts] = useState({});
            const [saving, setSaving] = useState(false);
            // Searchable add-item picker
            const [showAddPicker, setShowAddPicker] = useState(false);
            const [addSearch, setAddSearch] = useState("");
            // Full inventory (passed as prop or loaded from Firestore)
            const [fullInventory, setFullInventory] = useState(customInventoryProp || []);

            // Load full inventory if not passed as prop
            useEffect(() => {
                if (customInventoryProp && customInventoryProp.length > 0) {
                    setFullInventory(customInventoryProp);
                } else {
                    const loadInv = async () => {
                        try {
                            const doc = await db.collection("ops").doc("inventory_" + storeLocation).get();
                            if (doc.exists && doc.data().customInventory) setFullInventory(doc.data().customInventory);
                        } catch (err) { console.error("Error loading inventory for picker:", err); }
                    };
                    loadInv();
                }
            }, [customInventoryProp, storeLocation]);

            useEffect(() => {
                const fetchHistory = async () => {
                    try {
                        const snapshot = await db.collection("inventoryHistory_" + storeLocation).get();
                        const dates = snapshot.docs.map(doc => doc.id).sort().reverse().slice(0, 30);
                        setHistoryDates(dates);
                        if (dates.length > 0) setSelectedDate(dates[0]);
                    } catch (err) { console.error("Error loading inventory history:", err); }
                    setLoading(false);
                };
                fetchHistory();
            }, [storeLocation]);

            // Load selected day + previous day for comparison
            useEffect(() => {
                if (!selectedDate) return;
                const fetchDay = async () => {
                    try {
                        const doc = await db.collection("inventoryHistory_" + storeLocation)
                            .doc(selectedDate).get();
                        if (doc.exists) {
                            const data = doc.data();
                            setDayData(data);
                            setListName(data.listName || "");
                            setOrdered(data.ordered || {});
                            setHistCounts(data.counts || {});
                        } else {
                            setDayData(null);
                            setListName("");
                            setOrdered({});
                            setHistCounts({});
                        }

                        // Find previous day in history
                        const idx = historyDates.indexOf(selectedDate);
                        if (idx < historyDates.length - 1) {
                            const prevDoc = await db.collection("inventoryHistory_" + storeLocation)
                                .doc(historyDates[idx + 1]).get();
                            if (prevDoc.exists) setPrevData(prevDoc.data());
                            else setPrevData(null);
                        } else {
                            setPrevData(null);
                        }
                    } catch (err) { console.error("Error loading day:", err); }
                    setHistEditMode(false);
                    setAddingToCategory(null);
                };
                fetchDay();
            }, [selectedDate, historyDates, storeLocation]);

            // Save helper — persist changes back to Firestore (merge to handle new fields)
            const saveToFirestore = async (updates) => {
                if (!selectedDate) return;
                setSaving(true);
                try {
                    await db.collection("inventoryHistory_" + storeLocation).doc(selectedDate).set(updates, { merge: true });
                } catch (err) { console.error("Error saving inventory history:", err); }
                setSaving(false);
            };

            // Toggle ordered checkbox
            const toggleOrdered = async (itemId) => {
                const newOrdered = { ...ordered, [itemId]: !ordered[itemId] };
                setOrdered(newOrdered);
                await saveToFirestore({ ordered: newOrdered });
            };

            // Save list name
            const saveListName = async () => {
                setEditingName(false);
                await saveToFirestore({ listName });
            };

            // Update a count in edit mode
            const updateHistCount = (itemId, val) => {
                const n = Math.max(0, parseInt(val) || 0);
                setHistCounts(prev => ({ ...prev, [itemId]: n }));
            };

            // Save edited counts back (keep all items — this is a saved order list)
            const saveHistEdits = async () => {
                const updates = { counts: { ...histCounts } };
                await saveToFirestore(updates);
                setDayData(prev => ({ ...prev, counts: { ...histCounts } }));
                setHistEditMode(false);
            };

            // Add item from inventory picker to the saved list
            const addItemFromPicker = async (item, categoryName) => {
                // Check if item already exists in the saved list
                const alreadyExists = (dayData.items || []).some(cat => cat.items.some(i => i.id === item.id));
                if (alreadyExists) {
                    // Just increment count
                    const newCounts = { ...histCounts, [item.id]: (histCounts[item.id] || 0) + 1 };
                    setHistCounts(newCounts);
                    setDayData(prev => ({ ...prev, counts: newCounts }));
                    await saveToFirestore({ counts: newCounts });
                    return;
                }
                // Find or create category in saved list
                const newItem = { id: item.id, name: item.name, nameEs: item.nameEs || "", supplier: item.supplier || "", orderDay: item.orderDay || "" };
                let updatedItems = [...(dayData.items || [])];
                const catIdx = updatedItems.findIndex(c => c.category === categoryName);
                if (catIdx >= 0) {
                    updatedItems[catIdx] = { ...updatedItems[catIdx], items: [...updatedItems[catIdx].items, newItem] };
                } else {
                    updatedItems.push({ category: categoryName, items: [newItem] });
                }
                const newCounts = { ...histCounts, [item.id]: 1 };
                setHistCounts(newCounts);
                setDayData(prev => ({ ...prev, items: updatedItems, counts: newCounts }));
                await saveToFirestore({ items: updatedItems, counts: newCounts });
            };

            const formatDate = (dateStr) => {
                // Keys are like "2026-04-11_143022"
                const datePart = dateStr.split("_")[0];
                const timePart = dateStr.split("_")[1];
                const d = new Date(datePart + "T12:00:00");
                const dateLabel = d.toLocaleDateString(language === "es" ? "es-US" : "en-US", { weekday: "short", month: "short", day: "numeric" });
                if (timePart) {
                    const h = timePart.slice(0, 2);
                    const m = timePart.slice(2, 4);
                    const hr = parseInt(h);
                    const ampm = hr >= 12 ? "pm" : "am";
                    const hr12 = hr % 12 || 12;
                    return `${dateLabel} ${hr12}:${m}${ampm}`;
                }
                return dateLabel;
            };

            const printInventory = () => {
                if (!dayData || !dayData.items) return;
                const dateLabel = formatDate(selectedDate);
                const titleName = listName || (language === "es" ? "Conteo de Inventario" : "Inventory Count");
                let html = `<!DOCTYPE html><html><head><title>DD Mau - ${titleName}</title>
                    <style>
                        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 20px; color: #222; }
                        h1 { font-size: 20px; margin-bottom: 4px; }
                        .subtitle { font-size: 12px; color: #666; margin-bottom: 16px; }
                        table { width: 100%; border-collapse: collapse; margin-bottom: 16px; }
                        th { background: #d9ecdb; text-align: left; padding: 6px 10px; font-size: 13px; border: 1px solid #ccc; }
                        td { padding: 5px 10px; font-size: 12px; border: 1px solid #ddd; }
                        .count { text-align: right; font-weight: bold; width: 50px; }
                        .diff-pos { color: green; font-size: 11px; }
                        .diff-neg { color: red; font-size: 11px; }
                        .supplier { color: #999; font-size: 11px; }
                        .ordered { text-decoration: line-through; color: #999; }
                        .check { color: green; font-weight: bold; }
                        @media print { body { padding: 0; } }
                    </style></head><body>`;
                html += `<h1>🍜 DD Mau — ${titleName}</h1>`;
                html += `<div class="subtitle">${dateLabel} • ${language === "es" ? "Última actualización" : "Last updated"}: ${new Date(dayData.date).toLocaleString()}</div>`;

                dayData.items.forEach(cat => {
                    html += `<table><tr><th colspan="4">${cat.category}</th></tr>`;
                    cat.items.forEach(item => {
                        const count = dayData.counts?.[item.id] || 0;
                        const prevCount = prevData?.counts?.[item.id];
                        const diff = prevCount !== undefined ? count - prevCount : null;
                        const name = language === "es" && item.nameEs ? item.nameEs : item.name;
                        const supplierStr = item.supplier ? ` <span class="supplier">(${item.supplier})</span>` : "";
                        const isOrdered = ordered[item.id];
                        let diffStr = "";
                        if (diff !== null && diff !== 0) {
                            diffStr = diff > 0
                                ? ` <span class="diff-pos">+${diff}</span>`
                                : ` <span class="diff-neg">${diff}</span>`;
                        }
                        html += `<tr><td style="width:30px">${isOrdered ? '<span class="check">✓</span>' : '☐'}</td><td class="${isOrdered ? 'ordered' : ''}">${name}${supplierStr}</td><td class="count">${count}</td><td style="width:40px">${diffStr}</td></tr>`;
                    });
                    html += `</table>`;
                });

                html += `</body></html>`;
                const win = window.open("", "_blank");
                win.document.write(html);
                win.document.close();
                win.focus();
                setTimeout(() => win.print(), 300);
            };

            if (loading) return <div className="text-center text-gray-500 py-4">{language === "es" ? "Cargando..." : "Loading..."}</div>;

            if (historyDates.length === 0) {
                return (
                    <div className="bg-gray-50 rounded-lg p-4 text-center text-gray-500">
                        <p className="text-sm">{language === "es"
                            ? "Aún no hay historial de inventario. Comenzará a guardarse cuando se actualicen los conteos."
                            : "No inventory history yet. It will start saving when counts are updated."}</p>
                    </div>
                );
            }

            // Count ordered vs total
            const totalItems = dayData?.items?.reduce((sum, cat) => sum + cat.items.length, 0) || 0;
            const orderedCount = dayData?.items?.reduce((sum, cat) => sum + cat.items.filter(i => ordered[i.id]).length, 0) || 0;

            return (
                <div>
                    <div className="flex gap-2 overflow-x-auto pb-2 mb-4" style={{ scrollbarWidth: "none" }}>
                        {historyDates.map(date => (
                            <button key={date} onClick={() => setSelectedDate(date)}
                                className={`flex-shrink-0 px-3 py-2 rounded-lg text-xs font-bold transition ${selectedDate === date
                                    ? "bg-mint-700 text-white"
                                    : "bg-gray-100 text-gray-600 hover:bg-mint-50"}`}>
                                {formatDate(date)}
                            </button>
                        ))}
                    </div>

                    {selectedDate && dayData && dayData.items && (
                        <div className="space-y-4">
                            {/* Date + editable list name */}
                            <div className="bg-white rounded-xl border-2 border-mint-200 p-3">
                                <p className="text-xs text-gray-500 mb-1">
                                    {formatDate(selectedDate)}
                                </p>
                                {editingName ? (
                                    <div className="flex gap-2">
                                        <input type="text" value={listName}
                                            onChange={e => setListName(e.target.value)}
                                            placeholder={language === "es" ? "Nombre de la lista..." : "List name..."}
                                            className="flex-1 px-3 py-1.5 border-2 border-mint-300 rounded-lg text-sm font-bold focus:outline-none focus:border-mint-700"
                                            autoFocus
                                            onKeyDown={e => { if (e.key === "Enter") saveListName(); }} />
                                        <button onClick={saveListName}
                                            className="px-3 py-1.5 bg-mint-700 text-white rounded-lg text-xs font-bold hover:bg-mint-800">
                                            ✓
                                        </button>
                                    </div>
                                ) : (
                                    <div className="flex items-center gap-2 cursor-pointer group" onClick={() => setEditingName(true)}>
                                        <h4 className="font-bold text-lg text-gray-800">
                                            {listName || (language === "es" ? "Conteo de Inventario" : "Inventory Count")}
                                        </h4>
                                        <span className="text-gray-400 group-hover:text-mint-700 text-sm">✏️</span>
                                    </div>
                                )}
                                {/* Order progress */}
                                {totalItems > 0 && (
                                    <div className="mt-2">
                                        <div className="flex justify-between text-xs mb-1">
                                            <span className="text-gray-500">{language === "es" ? "Progreso de pedido" : "Order progress"}</span>
                                            <span className="font-bold text-mint-700">{orderedCount}/{totalItems}</span>
                                        </div>
                                        <div className="w-full bg-gray-200 rounded-full h-2">
                                            <div className="bg-mint-500 h-2 rounded-full transition-all" style={{ width: `${totalItems > 0 ? (orderedCount / totalItems * 100) : 0}%` }}></div>
                                        </div>
                                    </div>
                                )}
                            </div>

                            {/* Action buttons */}
                            <div className="flex gap-2">
                                <button onClick={() => { if (histEditMode) { saveHistEdits(); } else { setHistEditMode(true); } setShowAddPicker(false); }}
                                    className={`flex-1 py-2 rounded-lg text-xs font-bold transition ${histEditMode ? "bg-green-700 text-white" : "bg-blue-700 text-white"}`}>
                                    {histEditMode
                                        ? (language === "es" ? "✓ Guardar" : "✓ Save")
                                        : (language === "es" ? "✏️ Editar Lista" : "✏️ Edit List")}
                                </button>
                                <button onClick={printInventory}
                                    className="px-4 py-2 bg-mint-100 text-mint-700 rounded-lg text-xs font-bold hover:bg-mint-200 transition">
                                    🖨️ {language === "es" ? "Imprimir" : "Print"}
                                </button>
                            </div>

                            {/* Items list */}
                            {dayData.items.map((cat, catIdx) => (
                                <div key={catIdx} className="bg-white rounded-lg border border-gray-200 overflow-hidden">
                                    <div className="p-2 bg-mint-50 border-b border-gray-200 flex justify-between items-center">
                                        <h4 className="font-bold text-sm text-mint-800">{cat.category}</h4>
                                        <span className="text-xs text-gray-400">
                                            {cat.items.filter(i => ordered[i.id]).length}/{cat.items.length} {language === "es" ? "pedido" : "ordered"}
                                        </span>
                                    </div>
                                    <div className="divide-y divide-gray-100">
                                        {cat.items.map((item, idx) => {
                                            const count = histEditMode ? (histCounts[item.id] || 0) : (dayData.counts?.[item.id] || 0);
                                            const prevCount = prevData?.counts?.[item.id];
                                            const diff = prevCount !== undefined ? (dayData.counts?.[item.id] || 0) - prevCount : null;
                                            const isOrdered = ordered[item.id];

                                            return (
                                                <div key={idx} className={`flex items-center gap-2 px-2 py-2 text-sm ${isOrdered && !histEditMode ? "bg-green-50" : ""}`}>
                                                    {/* Checkbox */}
                                                    {!histEditMode && (
                                                        <button onClick={() => toggleOrdered(item.id)}
                                                            className={`w-6 h-6 rounded border-2 flex items-center justify-center flex-shrink-0 transition ${
                                                                isOrdered ? "bg-green-500 border-green-500 text-white" : "border-gray-300 hover:border-mint-500"}`}>
                                                            {isOrdered && <span className="text-xs font-bold">✓</span>}
                                                        </button>
                                                    )}
                                                    <div className={`flex-1 min-w-0 ${isOrdered && !histEditMode ? "line-through text-gray-400" : ""}`}>
                                                        <span className="text-gray-800">{language === "es" && item.nameEs ? item.nameEs : item.name}</span>
                                                        {item.supplier && <span className="text-xs text-gray-400 ml-1">({item.supplier})</span>}
                                                    </div>
                                                    <div className="flex items-center gap-2 flex-shrink-0">
                                                        {histEditMode ? (
                                                            <div className="flex items-center gap-1">
                                                                <button onClick={() => updateHistCount(item.id, (histCounts[item.id] || 0) - 1)}
                                                                    className="w-7 h-7 rounded bg-gray-200 text-gray-700 font-bold flex items-center justify-center hover:bg-red-100">−</button>
                                                                <span className="w-8 text-center font-bold">{histCounts[item.id] || 0}</span>
                                                                <button onClick={() => updateHistCount(item.id, (histCounts[item.id] || 0) + 1)}
                                                                    className="w-7 h-7 rounded bg-gray-200 text-gray-700 font-bold flex items-center justify-center hover:bg-green-100">+</button>
                                                            </div>
                                                        ) : (
                                                            <>
                                                                <span className="font-bold text-gray-800 w-8 text-right">{count}</span>
                                                                {diff !== null && diff !== 0 && (
                                                                    <span className={`text-xs font-bold px-1.5 py-0.5 rounded ${diff > 0 ? "bg-green-100 text-green-700" : "bg-red-100 text-red-700"}`}>
                                                                        {diff > 0 ? "+" : ""}{diff}
                                                                    </span>
                                                                )}
                                                            </>
                                                        )}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            ))}

                            {/* Add item from inventory picker */}
                            {histEditMode && !showAddPicker && (
                                <button onClick={() => { setShowAddPicker(true); setAddSearch(""); }}
                                    className="w-full py-3 rounded-xl font-bold text-sm bg-blue-600 text-white hover:bg-blue-700 active:scale-95 transition">
                                    + {language === "es" ? "Agregar Artículo del Inventario" : "Add Item from Inventory"}
                                </button>
                            )}
                            {histEditMode && showAddPicker && (
                                <div className="bg-white border-2 border-blue-300 rounded-xl overflow-hidden shadow-lg">
                                    <div className="p-3 bg-blue-50 border-b border-blue-200 flex items-center gap-2">
                                        <input type="text" value={addSearch} onChange={e => setAddSearch(e.target.value)}
                                            placeholder={language === "es" ? "🔍 Buscar artículo para agregar..." : "🔍 Search item to add..."}
                                            className="flex-1 px-3 py-2 border-2 border-gray-200 rounded-lg text-sm focus:outline-none focus:border-blue-500"
                                            autoFocus />
                                        <button onClick={() => setShowAddPicker(false)}
                                            className="px-3 py-2 bg-gray-200 text-gray-600 rounded-lg text-sm font-bold hover:bg-gray-300">✕</button>
                                    </div>
                                    <div className="max-h-64 overflow-y-auto">
                                        {(() => {
                                            const searchLower = addSearch.toLowerCase().trim();
                                            const existingIds = new Set((dayData.items || []).flatMap(cat => cat.items.map(i => i.id)));
                                            let hasResults = false;
                                            return fullInventory.map((cat, ci) => {
                                                const catName = cat.category || cat.name || "";
                                                const matchingItems = cat.items.filter(item => {
                                                    if (!searchLower) return !existingIds.has(item.id);
                                                    const nameMatch = (item.name || "").toLowerCase().includes(searchLower);
