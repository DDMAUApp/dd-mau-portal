    <script>
        // Inline PWA manifest (no separate file needed)
        const manifestData = {
            name: "DD Mau Staff Portal",
            short_name: "DD Mau",
            description: "Staff portal for DD Mau Vietnamese Eatery",
            start_url: window.location.href.split('?')[0],
            display: "standalone",
            background_color: "#f0f7f1",
            theme_color: "#255a37",
            orientation: "portrait",
            icons: [{
                src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23255a37'/><text y='70' x='50' text-anchor='middle' font-size='60'>🍜</text></svg>",
                sizes: "any",
                type: "image/svg+xml",
                purpose: "any"
            }]
        };
        const manifestBlob = new Blob([JSON.stringify(manifestData)], { type: 'application/json' });
        const manifestURL = URL.createObjectURL(manifestBlob);
        const manifestLink = document.createElement('link');
        manifestLink.rel = 'manifest';
        manifestLink.href = manifestURL;
        document.head.appendChild(manifestLink);

        // Inline service worker (no separate sw.js file needed)
        const swCode = `
            self.addEventListener('install', () => self.skipWaiting());
            self.addEventListener('activate', (e) => e.waitUntil(clients.claim()));
            self.addEventListener('fetch', (e) => {
                e.respondWith(fetch(e.request).catch(() => caches.match(e.request)));
            });
        `;
        if ('serviceWorker' in navigator) {
            const swBlob = new Blob([swCode], { type: 'application/javascript' });
            const swURL = URL.createObjectURL(swBlob);
            navigator.serviceWorker.register(swURL, { scope: '/' }).catch(() => {});
        }
    </script>

        // One-time migration: copy old non-suffixed docs/collections to _webster if they exist
        (async () => {
            try {
                // Migrate single documents
                const docMigrations = [
                    { from: "ops/checklists2", to: "ops/checklists2_webster" },
                    { from: "ops/inventory", to: "ops/inventory_webster" }
                ];
                for (const m of docMigrations) {
                    const newDoc = await db.doc(m.to).get();
                    if (!newDoc.exists) {
                        const oldDoc = await db.doc(m.from).get();
                        if (oldDoc.exists) {
                            await db.doc(m.to).set(oldDoc.data());
                            console.log("Migrated " + m.from + " → " + m.to);
                        }
                    }
                }
                // Migrate history collections
                const collMigrations = [
                    { from: "checklistHistory", to: "checklistHistory_webster" },
                    { from: "inventoryHistory", to: "inventoryHistory_webster" }
                ];
                for (const m of collMigrations) {
                    const newSnap = await db.collection(m.to).limit(1).get();
                    if (newSnap.empty) {
                        const oldSnap = await db.collection(m.from).get();
                        if (!oldSnap.empty) {
                            const batch = db.batch();
                            oldSnap.forEach(doc => batch.set(db.collection(m.to).doc(doc.id), doc.data()));

                            console.log("Migrated collection " + m.from + " → " + m.to + " (" + oldSnap.size + " docs)");

        const TRAINING_MODULES = [
            {
                id: 1,

                role: "FOH",
                duration: "60 min",
                lessons: [
                    {
                        titleEn: "Welcome to the DD Mau Family",
                        titleEs: "Bienvenido a la Familia DD Mau",
                        contentEn: "Welcome to DD Mau! Whether this is your first restaurant gig or you've been in the food game for years, we're pumped to have you on the team. DD Mau isn't just a restaurant — it's a vibe. It's the smell of fresh pho broth, the crunch of a perfect banh mi, and the smile on someone's face when they take that first bite of our coconut shrimp bao.\n\nThis training covers everything from how to greet a guest to how to handle a tough situation with grace. Read it, learn it, live it — and don't be afraid to bring your own personality to the table.\n\nDD Mau was founded by Julie Truong, who opened our first location in Maryland Heights in 2018 with a simple dream: bring authentic, fast-casual Vietnamese food to St. Louis. The name 'DD Mau' means 'hurry up' in Vietnamese — because great food shouldn't take forever, and neither should great service.\n\nWhat Makes DD Mau Different: Fresh meets fast. We're not a sit-down fine dining spot, and we're not a drive-through. We live in that sweet spot where amazing food meets quick, energetic service. Think of us as Vietnamese street food, elevated — with hospitality to match.",
                        contentEs: "¡Bienvenido a DD Mau! Ya sea que este sea tu primer trabajo en un restaurante o que hayas estado en la industria por años, estamos emocionados de tenerte en el equipo. DD Mau no es solo un restaurante — es una vibra. Es el olor del caldo fresco de pho, el crujido de un banh mi perfecto, y la sonrisa en la cara de alguien cuando prueba nuestro bao de camarón de coco.\n\nEsta capacitación cubre todo, desde cómo saludar a un cliente hasta cómo manejar una situación difícil con gracia. Léelo, apréndelo, vívelo — y no tengas miedo de traer tu propia personalidad.\n\nDD Mau fue fundado por Julie Truong, quien abrió nuestra primera ubicación en Maryland Heights en 2018 con un simple sueño: traer comida vietnamita auténtica y rápida a St. Louis. El nombre 'DD Mau' significa 'apúrate' en vietnamita — porque la buena comida no debería tardar mucho, y el buen servicio tampoco.\n\nLo que hace diferente a DD Mau: Fresco y rápido. No somos un restaurante de lujo ni un drive-through. Vivimos en ese punto ideal donde la comida increíble se encuentra con un servicio rápido y enérgico. Piensa en nosotros como comida callejera vietnamita, elevada — con hospitalidad a la par."

                    {
                        titleEn: "The DD Mau Guest Experience Standard",
                        titleEs: "El Estándar de Experiencia del Cliente DD Mau",
                        contentEn: "At DD Mau, every single interaction is a chance to make someone's day. We treat every visit like it matters — because it does.\n\nThe 3 Promises — Every team member, every shift, every guest:\n\n1. We See You — Every guest is acknowledged within 10 seconds of entering. Eye contact, a smile, and a genuine 'Welcome to DD Mau!' Nobody walks through our door and feels invisible.\n\n2. We've Got You — Our team is confident, knowledgeable, and ready to help. Whether it's a menu question, an allergy concern, or a recommendation, we handle it with ease and warmth.\n\n3. We Appreciate You — Every guest hears a sincere thank-you before they leave. We don't just say it — we mean it.",
                        contentEs: "En DD Mau, cada interacción es una oportunidad para alegrar el día de alguien. Tratamos cada visita como si importara — porque importa.\n\nLas 3 Promesas — Cada miembro del equipo, cada turno, cada cliente:\n\n1. Te Vemos — Cada cliente es reconocido dentro de 10 segundos de entrar. Contacto visual, una sonrisa y un genuino '¡Bienvenido a DD Mau!' Nadie entra por nuestra puerta y se siente invisible.\n\n2. Te Tenemos — Nuestro equipo es seguro, conocedor y listo para ayudar. Ya sea una pregunta del menú, una preocupación de alergia o una recomendación, lo manejamos con facilidad y calidez.\n\n3. Te Apreciamos — Cada cliente escucha un agradecimiento sincero antes de irse. No solo lo decimos — lo sentimos."
                    },
                    {
                        titleEn: "The Bright 4 — Core Service Principles",
                        titleEs: "Los Brillantes 4 — Principios de Servicio",
                        contentEn: "The Bright 4 guide every interaction at DD Mau. Great service should feel like walking into sunlight — warm, energizing, and uplifting.\n\nEYES UP — Lock In with Eye Contact: When a guest approaches, your eyes are on them — not the register, not your phone. Real eye contact says 'I see you, and you have my full attention.'\n\nLIGHT UP — Smile Like You Mean It: Your smile is contagious. When you smile at a guest, their whole experience shifts. Just a genuine, natural smile that says 'I'm happy you're here.'\n\nSPEAK UP — Use an Energetic, Friendly Tone: Your voice carries energy. Speak with enthusiasm and warmth. Flat, monotone service kills the vibe. Bring the energy.\n\nSHOW UP — Stay Present & Connected: Great service doesn't stop after the greeting. Stay tuned in throughout the entire guest experience. Check in without hovering. Anticipate needs before they're asked.\n\nPractice: Next time you greet a guest, notice their eye color. This tiny trick forces genuine eye contact and makes the connection feel real.",
                        contentEs: "Los Brillantes 4 guían cada interacción en DD Mau. Un gran servicio debe sentirse como caminar bajo la luz del sol — cálido, energizante y edificante.\n\nOJOS ARRIBA — Conecta con Contacto Visual: Cuando un cliente se acerca, tus ojos están en ellos — no en la caja, no en tu teléfono. El contacto visual real dice 'Te veo, y tienes toda mi atención.'\n\nILUMÍNATE — Sonríe de Verdad: Tu sonrisa es contagiosa. Cuando sonríes a un cliente, toda su experiencia cambia. Solo una sonrisa genuina y natural que dice 'Me alegra que estés aquí.'\n\nHABLA — Usa un Tono Enérgico y Amigable: Tu voz lleva energía. Habla con entusiasmo y calidez. El servicio plano y monótono mata la vibra. Trae la energía.\n\nPRESÉNTATE — Mantente Presente y Conectado: El gran servicio no se detiene después del saludo. Mantente sintonizado durante toda la experiencia del cliente. Revisa sin agobiar. Anticipa necesidades antes de que las pidan.\n\nPráctica: La próxima vez que saludes a un cliente, nota el color de sus ojos. Este pequeño truco fuerza un contacto visual genuino."
                    },
                    {
                        titleEn: "First Impressions — Greeting & Seating",
                        titleEs: "Primeras Impresiones — Saludo y Recepción",
                        contentEn: "You have about 10 seconds to set the tone for a guest's entire visit. Here's the flow:\n\n1. Acknowledge immediately — Even if you're mid-task, look up, make eye contact, and smile. A quick 'Hey, welcome in! I'll be right with you!' is a thousand times better than silence.\n\n2. Greet with energy — 'Welcome to DD Mau!' — say it like you mean it every single time. Vary it up: 'Hey, welcome back!' for regulars.\n\n3. Guide them — 'Have you been here before?' New guests get a quick walkthrough of how ordering works. Regulars get a 'Great to see you again!'\n\n4. Set the vibe — Your energy becomes their energy.\n\nGreeting Scenarios:\n• Guest walks in alone → 'Welcome to DD Mau! Dining in or grabbing it to go today?'\n• Family with kids → 'Hey, welcome in! Let me grab you some extra napkins — you guys are gonna love it!'\n• Regular guest → 'Hey! Great to see you again! Going with the usual?'\n• Guest looks confused → 'Welcome! First time here? Let me walk you through how we do things!'\n• Busy rush, line forming → 'Welcome in! We're moving fast — you'll be taken care of in just a sec!'\n• Guest on the phone → Smile, wave, and mouth 'welcome' — don't interrupt, but acknowledge them.",
                        contentEs: "Tienes unos 10 segundos para establecer el tono de toda la visita del cliente. Aquí está el flujo:\n\n1. Reconoce inmediatamente — Aunque estés en medio de algo, levanta la vista, haz contacto visual y sonríe. Un rápido '¡Hola, bienvenido! ¡Ya te atiendo!' es mil veces mejor que el silencio.\n\n2. Saluda con energía — '¡Bienvenido a DD Mau!' — dilo como si lo sintieras cada vez. Varíalo: '¡Hey, bienvenido de nuevo!' para clientes regulares.\n\n3. Guíalos — '¿Has venido antes?' Los nuevos reciben una explicación rápida de cómo funciona el pedido. Los regulares reciben un '¡Qué gusto verte de nuevo!'\n\n4. Establece la vibra — Tu energía se convierte en su energía.\n\nEscenarios de saludo:\n• Cliente llega solo → '¡Bienvenido a DD Mau! ¿Comes aquí o para llevar?'\n• Familia con niños → '¡Hola, bienvenidos! Déjame traerles servilletas extra — ¡les va a encantar!'\n• Cliente regular → '¡Hey! ¡Qué gusto verte! ¿Lo de siempre?'\n• Cliente confundido → '¡Bienvenido! ¿Primera vez aquí? ¡Déjame explicarte cómo funciona!'\n• Hora pico con fila → '¡Bienvenido! Estamos moviéndonos rápido — ¡ya te atendemos!'\n• Cliente al teléfono → Sonríe, saluda con la mano y articula 'bienvenido' — no interrumpas."

                        titleEn: "Order Taking & Upselling with Heart",
                        titleEs: "Tomar Pedidos y Sugerir con Corazón",
                        contentEn: "Taking orders at DD Mau is more than punching buttons — it's a conversation and a chance to help someone discover their new favorite dish.\n\nOrder-Taking Flow:\n1. Read the guest — Are they ready, or still browsing? 'Take your time — let me know when you're ready!'\n2. Listen actively — Repeat the order back: 'So that's a large pho with brisket, a coconut shrimp bao, and a Thai iced tea — did I get that right?'\n3. Suggest, don't push — 'Have you tried our roti tacos? They're amazing with the lemongrass chicken!' If they say no, move on with a smile.\n4. Flag allergies — 'Any allergies I should know about?' Ask EVERY time. This is a safety issue, not optional.\n5. Confirm and thank — 'Awesome choices! We'll get that started for you right away!'\n\nHeartfelt Upselling Scenarios:\n• Guest orders pho → 'Would you like to add an egg roll or spring roll on the side? They're a perfect match!'\n• Guest orders a banh mi → 'Our sesame balls are amazing for dessert — want to add a couple?'\n• Guest seems undecided → 'If you can't decide, the bao sliders are great for trying a couple different flavors!'\n• Group order → 'For the table, our dessert sampler is a hit — want me to add one?'\n\nThe Golden Rule of Upselling: Would YOU want someone to suggest this to you? If yes — go for it. If you'd find it annoying — skip it.",
                        contentEs: "Tomar pedidos en DD Mau es más que presionar botones — es una conversación y una oportunidad de ayudar a alguien a descubrir su nuevo platillo favorito.\n\nFlujo de toma de pedidos:\n1. Lee al cliente — ¿Está listo o todavía revisando? '¡Tómate tu tiempo — avísame cuando estés listo!'\n2. Escucha activamente — Repite el pedido: 'Entonces es un pho grande con brisket, un bao de camarón de coco y un té Thai — ¿correcto?'\n3. Sugiere, no presiones — '¿Has probado nuestros roti tacos? ¡Son increíbles con el pollo lemongrass!' Si dicen que no, sigue con una sonrisa.\n4. Pregunta por alergias — '¿Alguna alergia que deba saber?' Pregunta CADA vez. Es un tema de seguridad, no es opcional.\n5. Confirma y agradece — '¡Excelentes elecciones! ¡Se lo preparamos de inmediato!'\n\nEscenarios de sugerencias:\n• Cliente pide pho → '¿Le gustaría agregar un egg roll o spring roll? ¡Combinan perfecto!'\n• Cliente pide banh mi → '¡Nuestras sesame balls son increíbles de postre — quiere agregar unas?'\n• Cliente indeciso → '¡Si no puedes decidir, los bao sliders son geniales para probar varios sabores!'\n• Pedido grupal → '¡Para la mesa, nuestro sampler de postres es un éxito — lo agrego?'\n\nLa Regla de Oro: ¿TÚ querrías que alguien te sugiriera esto? Si sí — hazlo. Si te molestaría — no lo hagas."
                    },
                    {
                        titleEn: "Food Running & Table Touches",
                        titleEs: "Entrega de Comida y Visitas a la Mesa",
                        contentEn: "The moment between ordering and eating is where the magic happens.\n\nFood Running Basics:\n• Speed matters — Hot food should arrive hot. Pho broth cools fast — move with purpose.\n• Accuracy is everything — Double-check the ticket before you run it. Wrong orders = unhappy guests = wasted food.\n• Present with pride — Don't just drop the food. 'Here's your pho with brisket — enjoy! And those herbs and lime are for you to customize.'\n• Two hands — Always carry trays and bowls with two hands. Pho is hot, heavy, and unforgiving.\n• Announce, don't ask — 'Here's the coconut shrimp bao!' is better than 'Who had the bao?' Know your tickets.\n\nTable Touches:\n1. The 2-Bite Check (60-90 seconds after food arrives): 'How's everything tasting? Is your pho just right?'\n2. The Mid-Meal Scan: A quick visual check — do they need napkins, refills, extra sauce? Handle it before they ask.\n3. The Farewell: 'How was everything? Can I get you anything else?' Then: 'Thanks for coming in — we'll see you next time!'",
                        contentEs: "El momento entre pedir y comer es donde ocurre la magia.\n\nBásicos de entrega:\n• La velocidad importa — La comida caliente debe llegar caliente. El caldo de pho se enfría rápido — muévete con propósito.\n• La precisión es todo — Verifica el ticket antes de llevarlo. Pedidos incorrectos = clientes insatisfechos = comida desperdiciada.\n• Presenta con orgullo — No solo dejes la comida. 'Aquí está su pho con brisket — ¡disfrute! Las hierbas y limón son para personalizar.'\n• Dos manos — Siempre carga las bandejas y tazones con dos manos. El pho es caliente, pesado e implacable.\n• Anuncia, no preguntes — '¡Aquí están los bao de camarón de coco!' es mejor que '¿Quién pidió los bao?'\n\nVisitas a la mesa:\n1. Revisión a los 2 bocados (60-90 seg después): '¿Cómo está todo? ¿Su pho está bien?'\n2. Escaneo a mitad de comida: Revisión visual rápida — ¿necesitan servilletas, refills, salsa extra?\n3. La despedida: '¿Cómo estuvo todo? ¿Puedo traerles algo más?' Luego: '¡Gracias por venir — los esperamos pronto!'"
                    },
                    {
                        titleEn: "Handling Guest Concerns — The RESTORE Model",
                        titleEs: "Manejo de Quejas — El Modelo RESTORE",
                        contentEn: "Things go wrong sometimes. How you handle those moments defines us. A problem handled well can actually make a guest MORE loyal. Studies show guests who experience excellent recovery are 2-3x more likely to return.\n\nWe use the RESTORE model:\n\nR — Recognize: Notice the issue before the guest escalates. Body language, facial expressions, a plate being pushed away — read the signals.\n\nE — Empathize: 'I totally understand — that's not what you were expecting, and I'd feel the same way.' Be real.\n\nS — Say Sorry: 'I'm really sorry about that' — simple, sincere, no excuses. Don't blame the kitchen or anyone else.\n\nT — Take Action: Fix it. Fast. Remake the dish, get a manager, offer an alternative.\n\nO — Overdeliver: Turn a problem into a win. A complimentary dessert, a heartfelt 'next one's on us.'\n\nR — Reconnect: Circle back before they leave: 'I just wanted to make sure everything was taken care of.'\n\nE — Elevate: Share the feedback with your manager and team. Every concern is a chance to get better.\n\nCommon Scenarios:\n• Wrong order → Apologize immediately. Rush the correct item.\n• Long wait → Acknowledge proactively. 'I know it's been a bit — your food is almost ready. Can I grab you a drink while you wait?'\n• Food too spicy → 'Let me get you a milder option, or I can bring some extra sides to balance it out.'\n• Rude or angry guest → Stay calm. Listen fully. 'I hear you, and I'm going to make this right.' Get your manager if needed.\n• Dietary concern missed → Take it seriously immediately. 'Let me replace that right away. Your safety is our top priority.'\n\nRemember: An angry guest is not your enemy. They're someone who cared enough to tell you something went wrong instead of just never coming back.",
                        contentEs: "Las cosas salen mal a veces. Cómo manejas esos momentos nos define. Un problema bien manejado puede hacer que un cliente sea MÁS leal. Los estudios muestran que los clientes que experimentan una excelente recuperación tienen 2-3x más probabilidades de regresar.\n\nUsamos el modelo RESTORE:\n\nR — Reconoce: Nota el problema antes de que el cliente escale. Lenguaje corporal, expresiones faciales, un plato siendo alejado — lee las señales.\n\nE — Empatiza: 'Entiendo totalmente — eso no es lo que esperabas, y yo me sentiría igual.' Sé real.\n\nS — Discúlpate: 'Lo siento mucho' — simple, sincero, sin excusas. No culpes a la cocina ni a nadie.\n\nT — Toma Acción: Arréglalo. Rápido. Rehaz el platillo, llama al gerente, ofrece una alternativa.\n\nO — Supera Expectativas: Convierte un problema en una victoria. Un postre de cortesía, un sincero 'el próximo va por nuestra cuenta.'\n\nR — Reconecta: Regresa antes de que se vayan: 'Solo quería asegurarme de que todo se resolvió.'\n\nE — Eleva: Comparte los comentarios con tu gerente y equipo. Cada queja es una oportunidad de mejorar.\n\nEscenarios comunes:\n• Pedido incorrecto → Discúlpate inmediatamente. Apresura el artículo correcto.\n• Espera larga → Reconoce proactivamente. 'Sé que ha sido un poco — tu comida ya casi está. ¿Te traigo algo de tomar mientras esperas?'\n• Comida muy picante → 'Déjame traerte una opción más suave, o puedo traer extras para equilibrar.'\n• Cliente rudo o enojado → Mantén la calma. Escucha completamente. 'Te escucho, y voy a arreglar esto.' Llama al gerente si es necesario.\n• Problema dietético → Tómalo en serio inmediatamente. 'Déjame reemplazar eso de inmediato. Tu seguridad es nuestra prioridad.'\n\nRecuerda: Un cliente enojado no es tu enemigo. Es alguien que se preocupó lo suficiente para decirte que algo salió mal en lugar de simplemente no volver."
                    },
                    {
                        titleEn: "Going the Extra Bowl — Above & Beyond",
                        titleEs: "El Tazón Extra — Ir Más Allá",
                        contentEn: "Meeting expectations is the first mile. Going the extra bowl is where legends are made. This is the service that gets us 5-star reviews and word-of-mouth that no advertising can buy.\n\nWhat Does 'Extra Bowl' Service Look Like?\n• A guest mentions it's their birthday → surprise them with a dessert and a 'Happy birthday from DD Mau!'\n• It's raining outside → walk a guest's to-go order out to their car with an umbrella.\n• A parent is struggling with bags and a stroller → offer to carry their tray to the table.\n• A guest is eating alone and looks like they're having a tough day → 'I hope your day gets better — glad you're here.'\n• Someone can't decide → offer a small taste: 'Here, try a little of the lemongrass chicken — I think you'll love it.'\n• A regular always orders the same thing → have it started before they even get to the counter.\n\nThe Extra Bowl Mindset: Always ask yourself 'What would make this person's experience go from good to unforgettable?' It's usually something small, unexpected, and personal. You don't need permission to be kind.",
                        contentEs: "Cumplir con las expectativas es la primera milla. Ir por el tazón extra es donde se hacen las leyendas. Este es el servicio que nos da reseñas de 5 estrellas y el boca a boca que ninguna publicidad puede comprar.\n\n¿Cómo se ve el servicio del 'Tazón Extra'?\n• Un cliente menciona que es su cumpleaños → sorpréndelo con un postre y un '¡Feliz cumpleaños de parte de DD Mau!'\n• Está lloviendo → lleva el pedido para llevar al carro del cliente con un paraguas.\n• Un padre lucha con bolsas y carriola → ofrece llevar su charola a la mesa.\n• Un cliente come solo y parece tener un mal día → 'Espero que tu día mejore — me alegra que estés aquí.'\n• Alguien no puede decidir → ofrece una pequeña prueba: 'Aquí, prueba un poco del pollo lemongrass.'\n• Un regular siempre pide lo mismo → tenlo listo antes de que llegue al mostrador.\n\nLa Mentalidad del Tazón Extra: Siempre pregúntate '¿Qué haría que la experiencia de esta persona pase de buena a inolvidable?' Usualmente es algo pequeño, inesperado y personal. No necesitas permiso para ser amable."
                    },
                    {
                        titleEn: "Phone & Online Order Etiquette",
                        titleEs: "Etiqueta de Pedidos por Teléfono y En Línea",
                        contentEn: "Phone Orders:\n• Answer within 3 rings. Your voice IS DD Mau to that caller.\n• Greeting: 'Thank you for calling DD Mau [location]! This is [your name] — how can I help you today?'\n• Speak clearly. Slow down, enunciate, and smile while you talk — yes, people can hear a smile.\n• Repeat the order back. Always.\n• Give a time estimate. Be honest, not optimistic.\n• End with warmth: 'See you soon!' or 'Thanks for choosing DD Mau!'\n\nOnline / Third-Party Orders (DoorDash, Grubhub):\n• Double-check every item before sealing the bag\n• Include napkins, utensils, and requested condiments\n• Make sure lids are secure — especially for pho and soup orders\n• Bag items logically: hot and cold separate, drinks upright\n• Be friendly with delivery drivers — they represent us too",
                        contentEs: "Pedidos por teléfono:\n• Contesta en 3 timbres. Tu voz ES DD Mau para esa persona.\n• Saludo: '¡Gracias por llamar a DD Mau [ubicación]! Soy [tu nombre] — ¿cómo puedo ayudarle?'\n• Habla claro. Ve despacio, articula y sonríe mientras hablas — sí, la gente puede escuchar una sonrisa.\n• Repite el pedido siempre.\n• Da un estimado de tiempo. Sé honesto, no optimista.\n• Termina con calidez: '¡Nos vemos pronto!' o '¡Gracias por elegir DD Mau!'\n\nPedidos en línea / Terceros (DoorDash, Grubhub):\n• Verifica cada artículo antes de sellar la bolsa\n• Incluye servilletas, cubiertos y condimentos pedidos\n• Asegura que las tapas estén firmes — especialmente para pho y sopas\n• Empaca lógicamente: caliente y frío separados, bebidas derechas\n• Sé amable con los repartidores — ellos nos representan"
                    },
                    {
                        titleEn: "Teamwork, Appearance & Professionalism",
                        titleEs: "Trabajo en Equipo, Apariencia y Profesionalismo",
                        contentEn: "Communication Standards:\n• 'Behind!' — Always announce when walking behind someone.\n• 'Corner!' — Call out when rounding blind corners.\n• 'Hands!' — Need someone to grab a plate? Call for hands.\n• '86'd!' — When we're out of something, communicate immediately.\n• 'All day' — Total count needed. '4 pho all day' means 4 total.\n\nThe Team Mindset:\n• If you have time to lean, you have time to clean — and to help a teammate.\n• Never say 'that's not my table' or 'that's not my job.' At DD Mau, everything is everyone's job.\n• Celebrate wins together — great review? High-five your team.\n• Have each other's backs. If you see a teammate struggling, jump in.\n\nDress Code:\n• Clean DD Mau shirt — tucked in, no stains\n• Non-slip, closed-toe shoes (safety requirement, no exceptions)\n• Hair tied back and secured\n• Minimal jewelry — nothing dangling that could fall into food\n• Clean, trimmed nails — no nail polish or acrylics (food safety)\n• Name tag visible every shift\n\nProfessionalism:\n• Phones stay in the back\n• No eating or drinking in guest-visible areas\n• Be on time. Showing up 5 minutes early is showing up on time.\n• Treat every coworker with respect. Disagree privately, never in front of guests.",
                        contentEs: "Estándares de comunicación:\n• '¡Atrás!' — Siempre anuncia al caminar detrás de alguien.\n• '¡Esquina!' — Avisa al dar vuelta en esquinas ciegas.\n• '¡Manos!' — ¿Necesitas que alguien agarre un plato? Pide manos.\n• '¡86!' — Cuando se acaba algo, comunica inmediatamente.\n• 'All day' — Conteo total. '4 pho all day' significa 4 en total.\n\nMentalidad de equipo:\n• Si tienes tiempo para recargarte, tienes tiempo para limpiar — y ayudar a un compañero.\n• Nunca digas 'esa no es mi mesa' o 'ese no es mi trabajo.' En DD Mau, todo es trabajo de todos.\n• Celebren los triunfos juntos — ¿buena reseña? Choca los cinco con tu equipo.\n• Apóyense unos a otros. Si ves a un compañero batallando, ayúdalo.\n\nCódigo de vestimenta:\n• Camisa limpia de DD Mau — fajada, sin manchas\n• Zapatos cerrados antiderrapantes (requisito de seguridad, sin excepciones)\n• Cabello recogido y asegurado\n• Joyería mínima — nada colgante que pueda caer en la comida\n• Uñas limpias y recortadas — sin esmalte ni acrílicas (seguridad alimentaria)\n• Gafete visible cada turno\n\nProfesionalismo:\n• Teléfonos se quedan en la parte de atrás\n• No comer ni beber en áreas visibles para clientes\n• Sé puntual. Llegar 5 minutos antes es llegar a tiempo.\n• Trata a cada compañero con respeto. Desacuerden en privado, nunca frente a clientes."
                    },
                    {
                        titleEn: "Opening & Closing FOH Checklists",
                        titleEs: "Checklists de Apertura y Cierre FOH",
                        contentEn: "Opening Checklist:\n1. Arrive at least 15 minutes before opening\n2. Turn on all front-of-house lights and music\n3. Wipe down all tables, chairs, and counters\n4. Stock napkin dispensers, utensil stations, and condiment bar\n5. Ensure all menus/menu boards are clean and visible\n6. Check restrooms — stocked, clean, and presentable\n7. Verify POS system is on and functioning\n8. Review the day's specials, 86'd items, and team notes\n9. Do a final walkthrough: 'Would I want to eat here right now?'\n10. Quick 2-minute pre-shift huddle with the team\n\nClosing Checklist:\n1. Last guest served with full energy — closing time is NOT half-effort time\n2. Wipe down all tables, chairs, counters, and ordering area\n3. Sweep and mop all FOH floors\n4. Clean and restock condiment bar and utensil stations\n5. Empty all FOH trash cans and replace liners\n6. Clean front windows and glass doors\n7. Check restrooms — clean, restocked, lights off\n8. Count and reconcile cash drawer (per manager instructions)\n9. Turn off music, TVs, and non-essential lights\n10. Lock all doors and set alarm (if applicable)",
                        contentEs: "Checklist de Apertura:\n1. Llega al menos 15 minutos antes de abrir\n2. Enciende todas las luces y música del frente\n3. Limpia todas las mesas, sillas y mostradores\n4. Rellena servilleteros, estación de cubiertos y barra de condimentos\n5. Asegura que los menús/tableros estén limpios y visibles\n6. Revisa los baños — abastecidos, limpios y presentables\n7. Verifica que el POS esté encendido y funcionando\n8. Revisa los especiales del día, artículos 86'd y notas del equipo\n9. Recorrido final: '¿Yo comería aquí ahorita?'\n10. Reunión rápida de 2 minutos con el equipo\n\nChecklist de Cierre:\n1. Último cliente atendido con toda la energía — el cierre NO es tiempo de medio esfuerzo\n2. Limpia todas las mesas, sillas, mostradores y área de pedidos\n3. Barre y trapea todos los pisos de FOH\n4. Limpia y reabastece barra de condimentos y cubiertos\n5. Vacía todos los botes de basura y reemplaza bolsas\n6. Limpia ventanas y puertas de vidrio\n7. Revisa baños — limpios, abastecidos, luces apagadas\n8. Cuenta y cuadra el cajón de efectivo (según instrucciones del gerente)\n9. Apaga música, TVs y luces no esenciales\n10. Cierra todas las puertas y activa la alarma (si aplica)"
                    },
                    {
                        titleEn: "Quick-Reference Cheat Sheet",
                        titleEs: "Hoja de Referencia Rápida",
                        contentEn: "Keep this handy during your first few weeks:\n\n• The Bright 4: Eyes Up, Light Up, Speak Up, Show Up\n• The 3 Promises: We See You, We've Got You, We Appreciate You\n• Greeting: Acknowledge within 10 seconds. 'Welcome to DD Mau!'\n• Order Taking: Listen, repeat back, suggest, check allergies, confirm\n• Table Touch: 2-bite check, mid-meal scan, farewell\n• Guest Concerns: RESTORE — Recognize, Empathize, Say Sorry, Take Action, Overdeliver, Reconnect, Elevate\n• Phone Greeting: 'Thank you for calling DD Mau [location]! This is [name] — how can I help?'\n• Extra Bowl: What would make this go from good to unforgettable?\n• Kitchen Calls: Behind! Corner! Hands! 86'd! All day!\n• Golden Rule: 'Every guest should leave happier than when they came in.'\n\nYou're not just serving food — you're creating experiences. Welcome to the DD Mau family. Now let's go make someone's day!",
                        contentEs: "Ten esto a la mano durante tus primeras semanas:\n\n• Los Brillantes 4: Ojos Arriba, Ilumínate, Habla, Preséntate\n• Las 3 Promesas: Te Vemos, Te Tenemos, Te Apreciamos\n• Saludo: Reconoce en 10 segundos. '¡Bienvenido a DD Mau!'\n• Tomar Pedidos: Escucha, repite, sugiere, pregunta alergias, confirma\n• Visita a Mesa: Revisión a 2 bocados, escaneo a mitad de comida, despedida\n• Quejas: RESTORE — Reconoce, Empatiza, Discúlpate, Toma Acción, Supera Expectativas, Reconecta, Eleva\n• Teléfono: '¡Gracias por llamar a DD Mau [ubicación]! Soy [nombre] — ¿cómo puedo ayudar?'\n• Tazón Extra: ¿Qué haría esto pasar de bueno a inolvidable?\n• Llamadas de Cocina: ¡Atrás! ¡Esquina! ¡Manos! ¡86! ¡All day!\n• Regla de Oro: 'Cada cliente debe irse más feliz de lo que llegó.'\n\nNo solo estás sirviendo comida — estás creando experiencias. Bienvenido a la familia DD Mau. ¡Ahora vamos a alegrar el día de alguien!"

            {
                id: 2,
                titleEn: "Menu Training Guide",
                titleEs: "Guía de Capacitación del Menú",
                role: "FOH",
                duration: "50 min",
                lessons: [
                    {
                        titleEn: "Menu Overview & Training Goals",
                        titleEs: "Resumen del Menú y Metas de Capacitación",
                        contentEn: "DD Mau brings Vietnamese street food traditions to St. Louis with a modern, creative twist. Our menu is organized into three main sections: DD Mau Vietnamese Eatery (Entrees, Snacks, Sweets, Extras, Sauces), Beverages (House Drinks, Bottled/Canned, Boba Milk Tea, Boba Fruit Tea, Slushies, Hot Tea), and Retail (Sauce Bottles).\n\nTraining Goals — Within your first two weeks you should:\n• Know every menu item by name, description, and key ingredients\n• Understand all protein options and their upcharges\n• Be able to explain our sauce lineup and recommend pairings\n• Identify allergens and accommodate dietary restrictions (vegan, gluten-free, nut-free)\n• Confidently answer common guest questions\n• Recognize opportunities to suggest add-ons\n\nGuests often ask 'What do you recommend?' Start with our most popular items: Vermicelli Bowl, Rice Bowl, Pho, Banh Mi, and Boba Milk Tea.\n\nPro Tip: Ask your manager about tasting opportunities. The more you've personally tried, the more authentic your recommendations will be. 'I love the coconut shrimp bao — it's my personal favorite' hits different than 'people seem to like it.'",
                        contentEs: "DD Mau trae las tradiciones de comida callejera vietnamita a St. Louis con un toque moderno y creativo. Nuestro menú se organiza en tres secciones principales: DD Mau (Platillos, Snacks, Postres, Extras, Salsas), Bebidas (Caseras, Embotelladas, Boba Milk Tea, Boba Fruit Tea, Slushies, Té Caliente), y Retail (Botellas de Salsa).\n\nMetas de capacitación — En tus primeras dos semanas debes:\n• Conocer cada artículo del menú por nombre, descripción e ingredientes clave\n• Entender todas las opciones de proteína y sus cargos adicionales\n• Poder explicar nuestras salsas y recomendar combinaciones\n• Identificar alérgenos y acomodar restricciones dietéticas (vegano, sin gluten, sin nueces)\n• Contestar con confianza las preguntas comunes de los clientes\n• Reconocer oportunidades para sugerir extras\n\nLos clientes frecuentemente preguntan '¿Qué me recomiendan?' Empieza con nuestros artículos más populares: Vermicelli Bowl, Rice Bowl, Pho, Banh Mi y Boba Milk Tea.\n\nConsejo Pro: Pregunta a tu gerente sobre oportunidades de probar la comida. Entre más hayas probado, más auténticas serán tus recomendaciones."
                    },
                    {
                        titleEn: "Entrees — Deep Dive",
                        titleEs: "Platillos Principales — A Fondo",
                        contentEn: "Our entrees are the heart of the DD Mau experience. Most let guests choose their protein, sauce, and customize with extras.\n\nVermicelli Bowl ($15) — Vietnamese street food staple. Vermicelli rice noodles, protein of choice, lettuce, red cabbage, cucumber, pickled medley, crushed peanuts, fried shallots, scallions, cilantro, sauce of choice. Includes one egg roll. ALLERGEN: CONTAINS PEANUTS.\n\nSalad Bowl ($15) — Same as Vermicelli but with spring mix instead of noodles. Great lighter option. ALLERGEN: CONTAINS NUTS.\n\nRice Bowl ($15) — Jasmine white or brown rice, protein, fresh veggies, over easy egg. On vegan/veggie bowls NO egg unless guest requests.\n\nPho ($15) — Traditional Vietnamese noodle soup. Rich broth, rice noodles, protein, garnished with basil, bean sprouts, cilantro, scallions, white onion, lime. Pho Protein Options differ from bowl proteins — includes Brisket, Rare Steak, Meatball, Combo (+$1), Shrimp (+$1), Seafood (+$3), Ultimate (+$4).\n\nPho *VEGAN ($15) — Same format with fully VEGAN broth from a separate pot. Always confirm with guest whether they want regular or vegan version.\n\nLo Mein ($15) — Lo Mein egg noodles with onions, carrots, cabbage. NOT gluten-free (egg noodles).\n\nFried Rice ($11.50) — Our most affordable entree. Fried rice with eggs, green onion, white onion.\n\nTacos ($14) — Flaky roti tortilla (unique DD Mau twist!) with protein, red cabbage, pickled medley, cilantro, jalapeño, sauce of choice.\n\nBanh Mi ($10) — Vietnamese baguette sandwich with French and Vietnamese influences. Pickled medley, cilantro, cucumber, mayo. Our most affordable sandwich.\n\nBao Sliders ($8) — Fluffy steamed flour buns with fresh veggies and protein. ALLERGEN: CONTAINS DAIRY.\n\nSpring Rolls ($8) — Fresh (not fried) rice paper rolls with vermicelli, protein, fresh veggies.\n\nGarlic String Beans ($14) — Wok-tossed with garlic. Vegan-friendly.",
                        contentEs: "Nuestros platillos principales son el corazón de la experiencia DD Mau. La mayoría permite elegir proteína, salsa y personalizar con extras.\n\nVermicelli Bowl ($15) — Clásico de comida callejera vietnamita. Fideos de arroz, proteína a elegir, lechuga, col morada, pepino, encurtidos, cacahuates machacados, echalotes fritos, cebollín, cilantro, salsa a elegir. Incluye un egg roll. ALÉRGENO: CONTIENE CACAHUATES.\n\nSalad Bowl ($15) — Igual que el Vermicelli pero con mezcla de lechugas en lugar de fideos. Opción más ligera. ALÉRGENO: CONTIENE NUECES.\n\nRice Bowl ($15) — Arroz jazmín blanco o integral, proteína, vegetales frescos, huevo estrellado. En bowls veganos/vegetarianos NO hay huevo a menos que lo pidan.\n\nPho ($15) — Sopa tradicional vietnamita de fideos. Caldo rico, fideos de arroz, proteína, guarnición de albahaca, brotes de soya, cilantro, cebollín, cebolla blanca, limón. Las proteínas de Pho son diferentes — incluye Brisket, Bistec, Albóndiga, Combo (+$1), Camarón (+$1), Mariscos (+$3), Ultimate (+$4).\n\nPho *VEGANO ($15) — Mismo formato con caldo 100% VEGANO de una olla separada. Siempre confirma con el cliente si quiere regular o vegano.\n\nLo Mein ($15) — Fideos de huevo con cebollas, zanahorias, col. NO es sin gluten (fideos de huevo).\n\nFried Rice ($11.50) — Nuestro platillo más económico. Arroz frito con huevos, cebollín, cebolla.\n\nTacos ($14) — Tortilla de roti (¡toque único de DD Mau!) con proteína, col morada, encurtidos, cilantro, jalapeño, salsa.\n\nBanh Mi ($10) — Sándwich vietnamita en baguette con influencias francesas y vietnamitas. Encurtidos, cilantro, pepino, mayonesa.\n\nBao Sliders ($8) — Bollos de harina al vapor con vegetales frescos y proteína. ALÉRGENO: CONTIENE LÁCTEOS.\n\nSpring Rolls ($8) — Rollos frescos (no fritos) de papel de arroz con fideos, proteína, vegetales.\n\nGarlic String Beans ($14) — Ejotes salteados con ajo. Vegano."
                    },
                    {
                        titleEn: "Snacks, Desserts & Beverages",
                        titleEs: "Aperitivos, Postres y Bebidas",
                        contentEn: "SNACKS & APPETIZERS:\n• Thai Chili Pepper Wings (6) — $15 | Sweet Garlic Wings (6) — $16 | Buffalo Sweet Chili Wings (6) — $15\n• Crab Rangoons — $4.50 (3pc) / $7.50 (6pc)\n• Vietnamese Egg Rolls (2) — $5 | Veggie Egg Rolls (2) — $5\n• Fried Shrimp Rolls (3) — $6.50 | Coconut Shrimp (6) — $13\n• Vegan Popcorn Shrimp (6) — $8.50 | Buffalo Sweet Chili Tofu — $8\n• Sweet Potato Waffle Fries — $8\n\nUpsell tip: Wings are a popular add-on! Suggest as a starter while they wait.\n\nDESSERTS:\n• (NEW) Passion Fruit Mousse — $7 | Flan — $5 | Sesame Balls — $6\n• Vegan Chocolate Cake — $8 | Tres Leches Cake — $8 | Strawberry Matcha Tres Leches — $9\n• Vegan Iced Oatmeal Cookies (3) — $6.50\nTip: Two vegan dessert options (Vegan Chocolate Cake and Vegan Oatmeal Cookies) — great to mention for dietary restrictions!\n\nBEVERAGES:\nHouse Drinks: Mango/Blueberry/Strawberry Matcha Latte ($9), Matcha Latte ($8), Lychee Limeade ($6), Masala Chai ($6), Thai Tea ($6), Vietnamese Coffee ($6), Vietnamese Latte ($6)\n\nBoba Milk Tea ($6.50): Banana, Black, Brown Sugar, Honeydew, Mango, Strawberry, Strawberry Taro, Taro, Ube\n\nBoba Fruit Tea ($6.50): Lychee, Mango, Passionfruit, Strawberry, Peach\n\nSlushies ($7.50): Mango Slush, Strawberry Slush\n\nHot Teas ($6): Matcha Green Tea, Chrysanthemum & Cassia Seed, Corn Silk & Mulberry Leaf, Chinese Green Mandarin Passion Fruit Lotus Leaf, Artichoke Tea, Plum Drink, Goji Berry & Mulberries, Hispid Fig Root & Pachyma Cocos\n\nBottled/Canned: Dr. Pepper/Diet ($2), Root Beer/Pure Leaf ($3), Coke Zero ($3), Smartwater ($3.50), Mexican Coke/Sprite/Topo Chico ($4), Jarrito/Orangina/ITO EN/MILKIS ($4), Humm Kombucha ($8)",

                    {
                        titleEn: "Sauces Guide & Pairings",
                        titleEs: "Guía de Salsas y Combinaciones",
                        contentEn: "Our sauces are a huge part of the DD Mau experience. Every team member should be able to describe each sauce and recommend pairings.\n\nMain Sauces:\n• DD Sauce — Our signature house sauce. Savory, slightly sweet. The go-to for first-timers.\n• Spicy DD — The DD sauce with added heat. For spice lovers.\n• Vietnamese Vinaigrette — Light, tangy fish sauce-based dressing. Traditional Vietnamese flavor.\n• Vegan Vietnamese Vinaigrette — Same tangy profile without fish sauce. Vegan-friendly.\n• Peanut Sauce — Creamy, nutty. Classic pairing with spring rolls and vermicelli bowls.\n• Spicy Peanut Sauce — Peanut sauce with a kick.\n• Hoisin — Rich, sweet, and savory. Staple with pho and rice dishes.\n• Sweet Chili — Mild, sweet. Kid-friendly and versatile.\n• Creamy Sweet Chili — Sweet chili with a creamy twist.\n• Lime Ranch — Creamy ranch with lime zest. Popular with guests who prefer familiar flavors.\n• Chili Oil — Pure chili-infused oil. For serious spice lovers.\n• Sambal — Southeast Asian chili paste. Bold and spicy.\n• Sriracha — Classic rooster sauce.\n\nTop Sauce Pairings:\n• Vermicelli / Salad Bowl → Vietnamese Vinaigrette or Peanut Sauce\n• Rice Bowl → DD Sauce or Spicy DD\n• Pho → Hoisin + Sriracha (on the side)\n• Tacos → Lime Ranch or Spicy DD\n• Banh Mi → DD Sauce\n• Spring Rolls → Peanut Sauce\n• Wings → Already sauced — offer extra Sweet Chili on the side\n\nRetail Sauce Bottles — All $8.00. If a guest loves a sauce, let them know: 'Our sauces are available in bottles for just $8 if you'd like to enjoy them at home.'",
                        contentEs: "Nuestras salsas son parte fundamental de la experiencia DD Mau. Cada miembro del equipo debe poder describir cada salsa y recomendar combinaciones.\n\nSalsas principales:\n• DD Sauce — Nuestra salsa insignia. Sabrosa, ligeramente dulce. La ideal para primerizos.\n• Spicy DD — La DD con más picante. Para amantes del picante.\n• Vietnamese Vinaigrette — Aderezo ligero y ácido a base de salsa de pescado. Sabor tradicional vietnamita.\n• Vegan Vietnamese Vinaigrette — Mismo perfil ácido sin salsa de pescado. Apta para veganos.\n• Peanut Sauce — Cremosa, con nuez. Clásica con spring rolls y vermicelli bowls.\n• Spicy Peanut Sauce — Salsa de cacahuate con picante.\n• Hoisin — Rica, dulce y sabrosa. Básica con pho y arroz.\n• Sweet Chili — Suave, dulce. Apta para niños y versátil.\n• Creamy Sweet Chili — Sweet chili con toque cremoso.\n• Lime Ranch — Ranch cremoso con limón. Popular para quienes prefieren sabores familiares.\n• Chili Oil — Aceite puro de chile. Para los que les gusta muy picante.\n• Sambal — Pasta de chile del sureste asiático. Audaz y picante.\n• Sriracha — La clásica salsa del gallo.\n\nMejores combinaciones:\n• Vermicelli / Salad Bowl → Vietnamese Vinaigrette o Peanut Sauce\n• Rice Bowl → DD Sauce o Spicy DD\n• Pho → Hoisin + Sriracha (al lado)\n• Tacos → Lime Ranch o Spicy DD\n• Banh Mi → DD Sauce\n• Spring Rolls → Peanut Sauce\n• Alitas → Ya traen salsa — ofrece Sweet Chili extra\n\nBotellas de salsa retail — Todas a $8.00. Si a un cliente le encanta una salsa: 'Nuestras salsas están disponibles en botella por solo $8 para disfrutar en casa.'"
                    },

                        contentEs: "Proteínas para Bowls/Platillos:\n• Sin cargo extra: Chicken, Pork, Tofu (vegano), Veggie (vegano)\n• +$1.00: Shrimp, Steak, Fish, Vegan Beef, Vegan Shrimp, Vegan Chicken\n• +$3.00: Viet Cajun Salmon (premium), Combo, Coconut Shrimp, Vegan Combo\n\nProteína Extra:\n• +$4.00: XTR Chicken / Pork / Tofu\n• +$4.50: XTR Fish / Shrimp / Steak / proteínas veganas\n• +$2.00: XTR Spring Mix / XTR Huevo\n• +$6.00: XTR Coconut Shrimp / XTR Combo\n\nProteínas de Pho (¡lista diferente!):\n• Sin cargo: Brisket, Chicken, Meatball, Rare Steak, Tofu & Veggies, Tofu Only, Veggie, Plain\n• +$1.00: Combo Pho, Shrimp\n• +$3.00: Seafood\n• +$4.00: Ultimate\n\nExtras y Acompañamientos:\n• Caldos: Beef Pho ($5), Chicken Pho ($5), Vegan Pho ($5), Spicy Vegan Lemongrass ($5)\n• Carbohidratos: Arroz Blanco ($4), Arroz Integral ($4), Fideos Vermicelli ($4), Fideos Pho ($4)\n• Otros: Baos Solos 2pz ($4), Baguette Solo ($1.50)\n\nSalsas extra: +$0.75 con platillo, $0.75–$1.00 solas"

                    {
                        titleEn: "Allergens & Dietary Accommodations",
                        titleEs: "Alérgenos y Restricciones Dietéticas",
                        contentEn: "IMPORTANT: Always take allergen requests seriously. If you are unsure about any ingredient, check with the kitchen before confirming. Never guess.\n\nKnown Allergens on Our Menu:\n• Peanuts — Vermicelli Bowl, Salad Bowl, Peanut Sauce, Spicy Peanut Sauce\n• Nuts — Salad Bowl\n• Dairy — Bao Sliders, Tres Leches, Crab Rangoons, Lime Ranch\n• Gluten — Lo Mein (egg noodles), Banh Mi (baguette), Bao Sliders (flour buns), Egg Rolls, Crab Rangoons\n• Eggs — Rice Bowl (over easy egg), Fried Rice, Egg Rolls, Lo Mein\n• Shellfish — Shrimp items, Coconut Shrimp, Seafood Pho, Crab Rangoons\n• Soy — Many sauces contain soy\n• Fish Sauce — Vietnamese Vinaigrette, Pho broth (non-vegan versions)\n\nVegan-Friendly Options:\nAny bowl with vegan protein and vegan sauce, Pho *VEGAN (vegan broth), Veggie Egg Rolls, Vegan Popcorn Shrimp, Buffalo Sweet Chili Tofu, Sweet Potato Waffle Fries, Garlic String Beans, Vegan Chocolate Cake, Vegan Iced Oatmeal Cookies.\n\nRemember: On vegan/veggie Rice Bowls, the over easy egg is automatically removed unless guest requests it.\n\nFAQ:\n• 'What is pho?' — Pronounced 'fuh.' Traditional Vietnamese noodle soup with rice noodles in slow-simmered broth.\n• 'Do you have gluten-free options?' — Yes! Rice noodle bowls, Rice Bowls, Salad Bowls, and Spring Rolls. Check sauces with kitchen.\n• 'What is DD Sauce?' — Our signature house sauce — savory, slightly sweet, unique to DD Mau.\n• 'Can I buy your sauces?' — Yes! Bottles for $8 each.\n• 'What is boba?' — Chewy tapioca pearls in flavored tea. Available in Milk Tea and Fruit Tea varieties.",
                        contentEs: "IMPORTANTE: Siempre toma las solicitudes de alérgenos en serio. Si no estás seguro de algún ingrediente, verifica con la cocina. Nunca adivines.\n\nAlérgenos conocidos en nuestro menú:\n• Cacahuates — Vermicelli Bowl, Salad Bowl, Peanut Sauce, Spicy Peanut Sauce\n• Nueces — Salad Bowl\n• Lácteos — Bao Sliders, Tres Leches, Crab Rangoons, Lime Ranch\n• Gluten — Lo Mein (fideos de huevo), Banh Mi (baguette), Bao Sliders (bollos), Egg Rolls, Crab Rangoons\n• Huevos — Rice Bowl (huevo estrellado), Fried Rice, Egg Rolls, Lo Mein\n• Mariscos — Artículos de camarón, Coconut Shrimp, Seafood Pho, Crab Rangoons\n• Soya — Muchas salsas contienen soya\n• Salsa de Pescado — Vietnamese Vinaigrette, Caldo de Pho (versiones no veganas)\n\nOpciones Veganas:\nCualquier bowl con proteína y salsa vegana, Pho *VEGANO (caldo vegano), Veggie Egg Rolls, Vegan Popcorn Shrimp, Buffalo Sweet Chili Tofu, Papas Waffle de Camote, Garlic String Beans, Pastel de Chocolate Vegano, Galletas de Avena Veganas.\n\nRecuerda: En Rice Bowls veganos/vegetarianos, el huevo se quita automáticamente a menos que lo pidan.\n\nPreguntas frecuentes:\n• '¿Qué es pho?' — Se pronuncia 'fuh.' Sopa tradicional vietnamita de fideos de arroz en caldo lento.\n• '¿Tienen opciones sin gluten?' — ¡Sí! Bowls de fideos de arroz, Rice Bowls, Salad Bowls y Spring Rolls. Verifica salsas con cocina.\n• '¿Qué es DD Sauce?' — Nuestra salsa insignia — sabrosa, ligeramente dulce, única de DD Mau.\n• '¿Puedo comprar sus salsas?' — ¡Sí! Botellas a $8 cada una.\n• '¿Qué es boba?' — Perlas de tapioca masticables en té con sabor. En variedades de Milk Tea y Fruit Tea."

                        titleEn: "The 7:45 PM Kitchen Cutoff Rule",
                        titleEs: "La Regla del Corte de Cocina a las 7:45 PM",
                        contentEn: "Kitchen closes at 7:45 PM. Online/delivery orders are cut off earlier.\n\nTHE KEY RULE:\n• If a guest is already in line or at the counter at 7:45 (or a couple minutes after) — they get served. We honor the line. Ring them through and get their ticket to the kitchen.\n• If a guest walks in the door after 7:45 — the kitchen is closed. Do NOT let them get in line and wait just to be turned away at the register. Catch them early, be warm, and redirect them.\n\nCatching someone at the door is ALWAYS better than turning them away at the register. A warm redirect keeps the guest feeling good about DD Mau — even if they didn't eat tonight.",
                        contentEs: "La cocina cierra a las 7:45 PM. Los pedidos en línea/delivery se cortan antes.\n\nLA REGLA CLAVE:\n• Si un cliente ya está en la fila o en el mostrador a las 7:45 (o un par de minutos después) — se le atiende. Respetamos la fila. Pásalo y envía su ticket a la cocina.\n• Si un cliente entra por la puerta después de las 7:45 — la cocina está cerrada. NO dejes que se forme y espere solo para ser rechazado en la caja. Alcánzalo temprano, sé cálido y rediríjelo.\n\nAlcanzar a alguien en la puerta SIEMPRE es mejor que rechazarlo en la caja. Una redirección cálida mantiene al cliente sintiéndose bien con DD Mau — aunque no haya comido esta noche."
                    },
                    {
                        titleEn: "In Line by 7:45 — They Get Served",
                        titleEs: "En Fila para las 7:45 — Se les Atiende",
                        contentEn: "Guest is in line at 7:45: Take their order normally. They made it — full menu, full energy.\n\nSmall line still at 7:47-7:48: Keep going. Ring everyone through who was already waiting. Move fast but don't rush the guest.\n\nGuest at counter still deciding: Help them out — 'Want me to tell you our most popular picks? The [top seller] is amazing.' Get them to a decision so the ticket gets to the kitchen.\n\nGuest already eating (ordered before 7:45): All good — they already ordered. If they need something extra that requires the kitchen (another side, a replacement), check with kitchen first before promising anything.",
                        contentEs: "Cliente en fila a las 7:45: Toma su pedido normalmente. Lo lograron — menú completo, energía completa.\n\nPequeña fila aún a las 7:47-7:48: Sigue adelante. Atiende a todos los que ya estaban esperando. Muévete rápido pero no apresures al cliente.\n\nCliente en el mostrador aún decidiendo: Ayúdalo — '¿Quiere que le diga nuestros platillos más populares? ¡El [más vendido] es increíble!' Ayúdalo a decidir para que el ticket llegue a la cocina.\n\nCliente ya comiendo (pidió antes de las 7:45): Todo bien — ya pidieron. Si necesitan algo extra que requiera la cocina, consulta primero con la cocina antes de prometer algo."
                    },
                    {
                        titleEn: "After 7:45 — Redirect with Warmth",
                        titleEs: "Después de las 7:45 — Redirige con Calidez",
                        contentEn: "Intercept at the door — don't let them line up for nothing.\n\nGuest walks in: Step out and catch them before they line up — 'Hey, welcome! I'm really sorry — our kitchen actually just closed for the night. But we'd love to see you tomorrow — we open at 11!'\n\nGuest walks to counter: 'Hey, I'm sorry about this — our kitchen just closed down for the night. I wish I could get you something! We open at 11 tomorrow.'\n\nGuest pushes back / 'I just drove here': 'I totally get it, and I really am sorry. The kitchen has already started breaking down so I wouldn't want to serve you something that's not our best. Come back tomorrow and we'll make sure you're taken care of.'\n\nGuest asks 'can you make an exception?': 'I wish I could! Unfortunately the kitchen's already shutting down. But come in tomorrow — we'll take care of you.' If they keep pressing, get your manager.\n\nGuest is upset or frustrated: Stay calm and empathetic. 'I completely understand — I'd be disappointed too.' Offer a menu to take home. Get a manager if they escalate.\n\nGuest just wants a drink or dessert: Check with your manager. Drinks or grab-and-go items that don't need the kitchen may be okay — but confirm first.",
                        contentEs: "Intercepta en la puerta — no dejes que se formen para nada.\n\nCliente entra: Sal y alcánzalo antes de que se forme — '¡Hola, bienvenido! Lo siento mucho — nuestra cocina acaba de cerrar por esta noche. ¡Pero nos encantaría verte mañana — abrimos a las 11!'\n\nCliente va al mostrador: 'Hey, lo siento — nuestra cocina acaba de cerrar. ¡Me gustaría poder atenderte! Abrimos a las 11 mañana.'\n\nCliente insiste / 'Acabo de manejar hasta aquí': 'Te entiendo totalmente, y de verdad lo siento. La cocina ya empezó a cerrar y no querría servirte algo que no sea lo mejor. Regresa mañana y nos aseguraremos de atenderte bien.'\n\nCliente pide excepción: '¡Me gustaría poder! Desafortunadamente la cocina ya está cerrando. Pero ven mañana — te atendemos.' Si insisten, llama a tu gerente.\n\nCliente molesto o frustrado: Mantén la calma y empatía. 'Entiendo completamente — yo también estaría decepcionado.' Ofrece un menú para llevar. Llama al gerente si escala.\n\nCliente solo quiere bebida o postre: Consulta con tu gerente. Bebidas o artículos listos pueden estar bien — pero confirma primero."
                    },
                    {

s, Tés Calientes — ✓ Sin alérgenos comunes.\n\n⚠ IMPORTANTE: Esto es solo referencia para el personal. El contacto cruzado siempre es posible en una cocina compartida. SIEMPRE confirma cualquier alergia con el gerente y la cocina. Nunca adivines."

                    {
                        titleEn: "Why Cross Contamination Matters",
                        titleEs: "Por Qué Importa la Contaminación Cruzada",
                        contentEn: "Cross contamination happens when allergens, bacteria, or other harmful substances transfer from one food, surface, or utensil to another. In a Vietnamese kitchen like ours, this is especially important because many of our core ingredients — fish sauce, soy sauce, peanuts, sesame, and shellfish — are among the FDA's Big 9 allergens.\n\nA guest with a severe peanut allergy can react to trace amounts — even residue left on a cutting board or in shared fryer oil. Cross contamination is the #1 cause of allergic reactions in restaurants.\n\nThe FDA Big 9 at DD Mau:\n• Milk/Dairy — Cream cheese (rangoons), bao sliders, tres leches, ranch, lattes\n• Eggs — Egg roll wrappers, fried rice, rice bowls, mayo-based sauces, flan\n• Fish — Fish sauce (nuoc mam) in pho broth, vinaigrette, DD sauce. Present in many dishes.\n• Shellfish — Shrimp rolls, coconut shrimp, seafood pho, combo bowls\n• Tree Nuts — Coconut (FDA classifies as tree nut) — coconut shrimp, some desserts\n• Peanuts — Peanut garnish on bowls, peanut sauce, spicy peanut sauce\n• Wheat — Egg roll wrappers, bao buns, banh mi baguette, lo mein, roti, hoisin\n• Soy — Soy sauce (in most stir-fry, fried rice, marinades), tofu, hoisin, DD sauce\n• Sesame — Sesame balls, sesame oil, some wing sauces, hoisin\n\nDD Mau Tip: Fish sauce and soy sauce are in almost everything we make. When a guest says 'no fish' or 'no soy,' think beyond the obvious — check sauces, broths, and marinades too.",
                        contentEs: "La contaminación cruzada ocurre cuando alérgenos, bacterias u otras sustancias dañinas se transfieren de un alimento, superficie o utensilio a otro. En una cocina vietnamita como la nuestra, esto es especialmente importante porque muchos de nuestros ingredientes principales — salsa de pescado, salsa de soya, cacahuates, ajonjolí y mariscos — están entre los 9 Grandes alérgenos de la FDA.\n\nUn cliente con alergia severa al cacahuate puede reaccionar a cantidades mínimas — incluso residuos en una tabla de cortar o en aceite compartido de freidora. La contaminación cruzada es la causa #1 de reacciones alérgicas en restaurantes.\n\nLos 9 Grandes de la FDA en DD Mau:\n• Leche/Lácteos — Queso crema (rangoons), bao sliders, tres leches, ranch, lattes\n• Huevos — Masa de egg rolls, arroz frito, rice bowls, salsas con mayo, flan\n• Pescado — Salsa de pescado (nuoc mam) en caldo de pho, vinagreta, DD sauce. Presente en muchos platillos.\n• Mariscos — Shrimp rolls, coconut shrimp, seafood pho, combos\n• Frutos Secos — Coco (la FDA lo clasifica como fruto seco) — coconut shrimp, algunos postres\n• Cacahuates — Guarnición de cacahuate en bowls, salsa de cacahuate\n• Trigo — Masa de egg rolls, bao buns, baguette de banh mi, lo mein, roti, hoisin\n• Soya — Salsa de soya (en la mayoría de salteados, arroz frito, marinadas), tofu, hoisin, DD sauce\n• Ajonjolí — Bolas de ajonjolí, aceite de ajonjolí, algunas salsas de alitas, hoisin\n\nConsejo DD Mau: La salsa de pescado y la salsa de soya están en casi todo lo que hacemos. Cuando un cliente dice 'sin pescado' o 'sin soya,' piensa más allá de lo obvio — revisa salsas, caldos y marinadas."
                    },
                    {
                        titleEn: "Color-Coded Cutting Boards & Utensils",
                        titleEs: "Tablas de Cortar por Color y Utensilios",
                        contentEn: "Using the right cutting board for the right task is one of the easiest ways to prevent cross contamination. Follow these color assignments EVERY time:\n\nGREEN — Fruits & vegetables: Herbs, bean sprouts, jalapenos, spring mix, pickled veggies for banh mi\nRED — Raw meat: Raw pork (egg rolls), raw beef (pho), raw chicken (bowls, wings)\nBLUE — Raw seafood: Raw shrimp (shrimp rolls, coconut shrimp)\nYELLOW — Cooked meat (ready-to-eat): Sliced grilled pork, grilled chicken, tofu, cooked shrimp\nWHITE — Dairy & bread: Baguette slicing (banh mi), bao buns\n\nNEVER use the same cutting board for raw meat/seafood and ready-to-eat items without washing, rinsing, and sanitizing it first. When in doubt, grab a clean board.",
                        contentEs: "Usar la tabla de cortar correcta para la tarea correcta es una de las formas más fáciles de prevenir la contaminación cruzada. Sigue estas asignaciones de color CADA vez:\n\nVERDE — Frutas y vegetales: Hierbas, brotes de soya, jalapeños, mezcla de lechugas, encurtidos para banh mi\nROJO — Carne cruda: Cerdo crudo (egg rolls), res cruda (pho), pollo crudo (bowls, alitas)\nAZUL — Mariscos crudos: Camarón crudo (shrimp rolls, coconut shrimp)\nAMARILLO — Carne cocida (lista para comer): Cerdo a la parrilla rebanado, pollo a la parrilla, tofu, camarón cocido\nBLANCO — Lácteos y pan: Rebanar baguette (banh mi), bao buns\n\nNUNCA uses la misma tabla para carne cruda/mariscos y artículos listos para comer sin lavarla, enjuagarla y desinfectarla primero. En caso de duda, agarra una tabla limpia."
                    },
                    {
                        titleEn: "Handwashing & Storage Rules",
                        titleEs: "Reglas de Lavado de Manos y Almacenamiento",
                        contentEn: "HANDWASHING — The Non-Negotiable:\nWash your hands for at least 20 seconds with soap and warm water:\n• Before starting any food prep task\n• After touching raw meat, poultry, or seafood\n• After cracking eggs\n• After handling peanuts, peanut sauce, or sesame products\n• After touching your face, hair, or phone\n• After taking out trash or busing dishes\n• After switching between allergen zones (e.g., peanut sauce station to vegan prep)\n• After using cleaning chemicals\n\nQuick Rule: If you touched something that isn't the food you're about to prepare, wash your hands. Gloves are NOT a substitute — change gloves as often as you'd wash your hands.\n\nPROPER STORAGE — Top to Bottom:\nIn walk-ins and reach-in coolers, store food in this order from top to bottom:\n• TOP — Ready-to-eat foods: herbs, spring mix, bean sprouts, cooked proteins, sauces (nothing can drip onto them)\n• MIDDLE-HIGH — Fruits, vegetables, tofu (lower contamination risk)\n• MIDDLE — Whole cuts of beef, pork (lower cooking temp than poultry)\n• MIDDLE-LOW — Raw seafood/shrimp (separate from meat; contains shellfish allergen)\n• BOTTOM — Raw ground meat, raw poultry (highest risk — must be lowest to prevent drips)\n\nAll containers must be covered, labeled, and dated. Never store raw proteins above ready-to-eat food.",
                        contentEs: "LAVADO DE MANOS — Lo No Negociable:\nLava tus manos por al menos 20 segundos con jabón y agua tibia:\n• Antes de comenzar cualquier tarea de preparación\n• Después de tocar carne cruda, pollo o mariscos\n• Después de romper huevos\n• Después de manejar cacahuates, salsa de cacahuate o productos de ajonjolí\n• Después de tocar tu cara, cabello o teléfono\n• Después de sacar basura o recoger platos\n• Después de cambiar entre zonas de alérgenos (ej., estación de salsa de cacahuate a preparación vegana)\n• Después de usar productos de limpieza\n\nRegla rápida: Si tocaste algo que no es la comida que vas a preparar, lávate las manos. Los guantes NO son sustituto — cambia los guantes tan seguido como te lavarías las manos.\n\nALMACENAMIENTO — De Arriba a Abajo:\nEn refrigeradores, almacena la comida en este orden de arriba a abajo:\n• ARRIBA — Alimentos listos para comer: hierbas, mezcla de lechugas, brotes, proteínas cocidas, salsas (nada puede gotear sobre ellos)\n• MEDIO-ALTO — Frutas, vegetales, tofu (menor riesgo de contaminación)\n• MEDIO — Cortes enteros de res, cerdo (menor temperatura de cocción que el pollo)\n• MEDIO-BAJO — Mariscos crudos/camarón (separados de la carne; contiene alérgeno de mariscos)\n• ABAJO — Carne molida cruda, pollo crudo (mayor riesgo — debe estar abajo para prevenir goteos)\n\nTodos los contenedores deben estar cubiertos, etiquetados y con fecha. Nunca almacenes proteínas crudas arriba de comida lista para comer."
                    },
                    {
                        titleEn: "Cooking Temps & Fryer Protocols",
                        titleEs: "Temperaturas de Cocción y Protocolos de Freidora",
                        contentEn: "MINIMUM INTERNAL COOKING TEMPERATURES:\nAlways use a calibrated food thermometer.\n• Poultry (chicken, turkey) — 165°F / 74°C: Wings (all flavors), chicken for bowls/lo mein/fried rice\n• Ground meat — 155°F / 68°C: Ground pork in egg rolls\n• Pork, beef, veal (whole cuts) — 145°F / 63°C: Grilled pork (vermicelli, banh mi), beef for pho\n• Shrimp & shellfish — 145°F / 63°C: Fried shrimp rolls, coconut shrimp\n• Eggs — 145°F / 63°C: Over-easy eggs (rice bowls) — yolk may be runny per guest preference\n• Reheated leftovers — 165°F / 74°C: Any reheated protein, broth, or sauce\n\nFRYER & SHARED EQUIPMENT PROTOCOLS:\nOur fryers are a major cross-contact risk. Fryer Cross-Contact Risks:\n• Egg rolls (wheat + egg) share oil with sweet potato waffle fries (allergen-clean on their own)\n• Coconut shrimp (shellfish + tree nut) may share oil with vegan popcorn shrimp\n• Crab rangoons (dairy + fish + wheat + egg) go through the fryer too\n• Fried shrimp rolls (shellfish + wheat) add shellfish allergen to shared oil\n\nWhen a guest has a shellfish, peanut, or wheat allergy: do NOT assume fried items are safe. Always tell the guest our fryers are shared. Alert a manager.\n\nOther Shared Equipment:\n• Woks & pans — Must be washed between proteins, especially between shellfish and non-shellfish\n• Tongs & spatulas — Never reuse tongs from raw protein on cooked food\n• Ladles for broth — Regular pho broth contains fish sauce; vegan pho uses a SEPARATE pot with separate ladles\n• Sauce squeeze bottles — Don't cross-drip, keep peanut sauce away from other stations\n• Blenders — Rinse between dairy and non-dairy beverages",
                        contentEs: "TEMPERATURAS INTERNAS MÍNIMAS DE COCCIÓN:\nSiempre usa un termómetro de alimentos calibrado.\n• Pollo/Pavo — 165°F / 74°C: Alitas (todos los sabores), pollo para bowls/lo mein/arroz frito\n• Carne molida — 155°F / 68°C: Cerdo molido en egg rolls\n• Cerdo, res, ternera (cortes enteros) — 145°F / 63°C: Cerdo a la parrilla (vermicelli, banh mi), res para pho\n• Camarón y mariscos — 145°F / 63°C: Rollos de camarón frito, coconut shrimp\n• Huevos — 145°F / 63°C: Huevos estrellados (rice bowls) — la yema puede estar líquida según el cliente\n• Sobras recalentadas — 165°F / 74°C: Cualquier proteína, caldo o salsa recalentada\n\nPROTOCOLOS DE FREIDORA Y EQUIPO COMPARTIDO:\nNuestras freidoras son un riesgo mayor de contacto cruzado. Riesgos:\n• Egg rolls (trigo + huevo) comparten aceite con papas waffle de camote (limpias por sí solas)\n• Coconut shrimp (mariscos + fruto seco) puede compartir aceite con vegan popcorn shrimp\n• Crab rangoons (lácteos + pescado + trigo + huevo) pasan por la freidora también\n• Rollos de camarón frito (mariscos + trigo) añaden alérgeno de mariscos al aceite\n\nCuando un cliente tiene alergia a mariscos, cacahuates o trigo: NO asumas que los fritos son seguros. Siempre informa al cliente que nuestras freidoras son compartidas. Alerta al gerente.\n\nOtro equipo compartido:\n• Woks y sartenes — Deben lavarse entre proteínas, especialmente entre mariscos y no-mariscos\n• Pinzas y espátulas — Nunca reutilices las de proteína cruda en comida cocida\n• Cucharones de caldo — El caldo regular de pho contiene salsa de pescado; el pho vegano usa una olla SEPARADA con cucharones separados\n• Botellas de salsa — No gotear entre ellas, mantén la salsa de cacahuate lejos de otras estaciones\n• Licuadoras — Enjuaga entre bebidas lácteas y no lácteas"
                    },
                    {
                        titleEn: "Vegan & Allergen-Free Orders",
                        titleEs: "Pedidos Veganos y Libres de Alérgenos",
                        contentEn: "When a ticket comes in with an allergy note or vegan modification, take these extra steps:\n\nDO:\n✓ Clean and sanitize your station before starting the order\n✓ Use fresh, clean utensils — not the ones already on the line\n✓ Use the VEGAN pho broth from the separate pot (confirm with kitchen lead)\n✓ Use vegan vinaigrette (soy-based) instead of regular (fish sauce-based)\n✓ Skip peanut garnish unless the guest specifically wants it\n✓ Communicate clearly with the line: 'Allergy order — no [allergen]!'\n✓ If unsure about ANY ingredient, ask a manager. Never guess.\n\nDON'T:\n✗ Don't prep allergen-free food on a surface that just had peanuts or shellfish\n✗ Don't use the same gloves you wore while handling other orders\n✗ Don't fry allergen-free items in shared oil without disclosing it to the guest\n✗ Don't assume vegan = allergen-free (vegan items still contain soy, wheat, sesame)\n✗ Don't brush off allergy requests — every one is serious",
                        contentEs: "Cuando llega un ticket con nota de alergia o modificación vegana, sigue estos pasos extra:\n\nHAZ:\n✓ Limpia y desinfecta tu estación antes de empezar el pedido\n✓ Usa utensilios frescos y limpios — no los que ya están en la línea\n✓ Usa el caldo de pho VEGANO de la olla separada (confirma con el líder de cocina)\n✓ Usa vinagreta vegana (base de soya) en lugar de la regular (base de salsa de pescado)\n✓ Omite la guarnición de cacahuate a menos que el cliente lo pida específicamente\n✓ Comunica claramente a la línea: '¡Pedido con alergia — sin [alérgeno]!'\n✓ Si no estás seguro de ALGÚN ingrediente, pregunta al gerente. Nunca adivines.\n\nNO HAGAS:\n✗ No prepares comida libre de alérgenos en una superficie que tenía cacahuates o mariscos\n✗ No uses los mismos guantes que usaste para otros pedidos\n✗ No frías artículos libres de alérgenos en aceite compartido sin informar al cliente\n✗ No asumas que vegano = libre de alérgenos (los artículos veganos aún contienen soya, trigo, ajonjolí)\n✗ No ignores las solicitudes de alergia — cada una es seria"

                    {
                        titleEn: "Clean-Rinse-Sanitize & Allergen Incidents",
                        titleEs: "Lavar-Enjuagar-Desinfectar e Incidentes de Alérgenos",
                        contentEn: "CLEAN, RINSE, SANITIZE — Every Time:\nWiping a surface down is NOT enough. Follow the three-step process:\n\n1. WASH — Scrub with hot soapy water to remove visible food debris (removes particles and allergen residue)\n2. RINSE — Rinse with clean water (removes soap and loosened debris)\n3. SANITIZE — Apply sanitizer solution, follow concentration on label (kills bacteria; air-dry — don't towel dry)\n\nThis applies to cutting boards, knives, prep tables, woks, tongs, ladles, and any surface that touches food. Do this BETWEEN TASKS, not just at the end of your shift.\n\nWHEN THINGS GO WRONG — Allergen Incidents:\nIf a guest reports an allergic reaction or you realize a dish was contaminated:\n• Stop serving the dish immediately. Pull it from the table.\n• Alert a manager right away. Do not try to handle it alone.\n• Ask the guest if they need medical help. Call 911 if severe (difficulty breathing, swelling, hives).\n• Do NOT say 'it shouldn't have that allergen' — focus on helping the guest, not defending the kitchen.\n• Document what happened: What was ordered, served, who prepared it, what went wrong.\n• Review and correct: Identify the breakdown and retrain if needed.\n\nAllergic reactions can be life-threatening. When a guest tells us about an allergy, our response should be: 'We've got you. Let me make sure this is prepared safely.'\n\nDD MAU CROSS-CONTACT HOT SPOTS:\n• Fish sauce in 'everything' — check every sauce for fish allergies\n• Peanut garnish — check ticket before garnishing bowls\n• Shared fryer oil — egg rolls, rangoons, shrimp, waffle fries ALL share oil\n• Soy sauce in marinades — most stir-fry proteins are marinated in soy\n• Egg in wrappers — egg rolls and lo mein contain egg + wheat; spring roll rice paper is safe\n• Dairy in sauces — lime ranch, creamy sweet chili, bao sliders\n• Vegan pho broth — must come from SEPARATE pot; a ladle that touched regular broth = fish contamination\n• Sesame in sauces — hoisin often contains sesame",
                        contentEs: "LAVAR, ENJUAGAR, DESINFECTAR — Cada Vez:\nLimpiar una superficie NO es suficiente. Sigue el proceso de tres pasos:\n\n1. LAVAR — Frota con agua caliente jabonosa para remover restos visibles (elimina partículas y residuos de alérgenos)\n2. ENJUAGAR — Enjuaga con agua limpia (elimina jabón y residuos sueltos)\n3. DESINFECTAR — Aplica solución desinfectante, sigue la concentración de la etiqueta (mata bacterias; seca al aire — no uses toalla)\n\nEsto aplica para tablas de cortar, cuchillos, mesas de preparación, woks, pinzas, cucharones y cualquier superficie que toque comida. Hazlo ENTRE TAREAS, no solo al final del turno.\n\nCUANDO LAS COSAS SALEN MAL — Incidentes de Alérgenos:\nSi un cliente reporta una reacción alérgica o te das cuenta de que un platillo fue contaminado:\n• Deja de servir el platillo inmediatamente. Retíralo de la mesa.\n• Alerta al gerente de inmediato. No intentes manejarlo solo.\n• Pregunta al cliente si necesita ayuda médica. Llama al 911 si es severo (dificultad para respirar, hinchazón, ronchas).\n• NO digas 'no debería tener ese alérgeno' — enfócate en ayudar al cliente, no en defender la cocina.\n• Documenta lo que pasó: Qué se pidió, qué se sirvió, quién lo preparó, qué salió mal.\n• Revisa y corrige: Identifica la falla y re-entrena si es necesario.\n\nLas reacciones alérgicas pueden ser mortales. Cuando un cliente nos dice sobre una alergia, nuestra respuesta debe ser: 'Te tenemos. Déjame asegurarme de que esto se prepare de forma segura.'\n\nPUNTOS CRÍTICOS DE CONTACTO CRUZADO EN DD MAU:\n• Salsa de pescado en 'todo' — revisa cada salsa para alergias al pescado\n• Guarnición de cacahuate — revisa el ticket antes de decorar bowls\n• Aceite compartido de freidora — egg rolls, rangoons, camarón, papas waffle TODOS comparten aceite\n• Salsa de soya en marinadas — la mayoría de proteínas salteadas se marinan en soya\n• Huevo en masas — egg rolls y lo mein contienen huevo + trigo; el papel de arroz del spring roll es seguro\n• Lácteos en salsas — lime ranch, creamy sweet chili, bao sliders\n• Caldo de pho vegano — debe venir de olla SEPARADA; un cucharón que tocó caldo regular = contaminación con pescado\n• Ajonjolí en salsas — el hoisin frecuentemente contiene ajonjolí"
