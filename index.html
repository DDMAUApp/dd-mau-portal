                const unsubscribe = docRef.onSnapshot((doc) => {
                    if (doc.exists) {
                        setProgress(doc.data().modules || {});
                    } else {
                        // Initialize empty progress
                        const newProgress = {};
                        TRAINING_MODULES.forEach(mod => {
                            newProgress[mod.id.toString()] = new Array(mod.lessons.length).fill(false);
                        });
                        setProgress(newProgress);
                    }
                    setLoading(false);
                });

                return () => unsubscribe();
            }, [staffName]);

            const toggleLesson = async (moduleId, lessonIndex) => {
                const moduleIdStr = moduleId.toString();
                const newProgress = { ...progress };
                if (!newProgress[moduleIdStr]) {
                    newProgress[moduleIdStr] = new Array(TRAINING_MODULES.find(m => m.id === moduleId).lessons.length).fill(false);
                }
                newProgress[moduleIdStr][lessonIndex] = !newProgress[moduleIdStr][lessonIndex];
                setProgress(newProgress);

                // Write to Firestore
                try {
                    await db.collection("training").doc(staffName).set({ modules: newProgress }, { merge: true });
                } catch (err) {
                    console.error("Error updating training progress:", err);
                }
            };

            const toggleModule = (moduleId) => {
                setExpandedModule(expandedModule === moduleId ? null : moduleId);
                setExpandedLesson(null);
            };

            const toggleLessonExpand = (lessonKey) => {
                setExpandedLesson(expandedLesson === lessonKey ? null : lessonKey);
            };

            if (loading) {
                return <div className="p-4 text-center">{t("loading", language)}</div>;
            }

            // Calculate overall progress
            let totalLessons = 0;
            let totalCompleted = 0;
            TRAINING_MODULES.forEach(mod => {
                const modProgress = progress[mod.id.toString()] || [];
                totalLessons += mod.lessons.length;
                totalCompleted += modProgress.filter(Boolean).length;

                            <div

                            />
                        </div>
                    </div>

                    {TRAINING_MODULES.map(module => {
                        const moduleIdStr = module.id.toString();
                        const moduleProgress = progress[moduleIdStr] || new Array(module.lessons.length).fill(false);
                        const completed = moduleProgress.filter(Boolean).length;

                                                    {language === "es" ? module.titleEs : module.titleEn}

            // Check if a person can work a position (based on skill matrix)
            const canWorkPosition = (personName, posId) => {

                if (skillId === "manager") return true; // managers handled separately
                return !!skillsMatrix[personName + "_" + skillId];

            const getQualifiedCovers = (posId, availablePeople, waveId) => {
                const skillId = positionToSkill(posId);
                const needCover = getPositionsNeedingCover(waveId);
                // Count how many stations each available person is already covering in this wave
                const coverLoad = {};
                needCover.forEach(nc => {
                    const c = nc.cover;
                    if (c) coverLoad[c] = (coverLoad[c] || 0) + 1;
                });
                // Filter to qualified, sort by: fewest current covers first
                return availablePeople
                    .filter(name => canWorkPosition(name, posId))

                const updated = [...breakWaveTimes];
                updated[idx] = newTime;
                setBreakWaveTimes(updated);
                saveBreakPlan(breakPlan, updated);
            };

            const updateStationAssignment = (posId, name) => {
                const newPlan = { ...breakPlan, stations: { ...breakPlan.stations, [posId]: name } };
                setBreakPlan(newPlan);
                saveBreakPlan(newPlan);
            };

            const clearBreakPlan = () => {
                if (!confirm(language === "es" ? "¿Borrar todo el plan de breaks?" : "Clear entire break plan?")) return;
                setBreakPlan({ stations: {}, waves: {} });
                saveBreakPlan({ stations: {}, waves: {} });
            };

            // Build a map: person -> position(s) they're assigned to
            const getStaffPositionMap = () => {
                const map = {};
                Object.entries(breakPlan.stations || {}).forEach(([posId, name]) => {
                    if (!name) return;
                    if (!map[name]) map[name] = [];
                    const pos = ALL_POSITIONS.find(p => p.id === posId);
                    if (pos) map[name].push(pos);
                });
                return map;
            };

            // Get who's on break in a wave (array of names)
            const getWaveBreakers = (waveId) => {
                return breakPlan.waves?.[waveId + "_breakers"] || [];
            };

            // Toggle a person on/off break for a wave
            const toggleBreaker = (waveId, personName) => {
                const breakers = [...getWaveBreakers(waveId)];
                const idx = breakers.indexOf(personName);
                if (idx >= 0) breakers.splice(idx, 1);
                else breakers.push(personName);
                const newWaves = { ...breakPlan.waves, [waveId + "_breakers"]: breakers };
                const newPlan = { ...breakPlan, waves: newWaves };
                setBreakPlan(newPlan);
                saveBreakPlan(newPlan);
            };

            // Get/set who covers a specific position during a wave
            const getWaveCover = (waveId, posId) => breakPlan.waves?.[waveId + "_cover_" + posId] || "";
            const setWaveCover = (waveId, posId, coverName) => {
                const newWaves = { ...breakPlan.waves, [waveId + "_cover_" + posId]: coverName };
                const newPlan = { ...breakPlan, waves: newWaves };
                setBreakPlan(newPlan);
                saveBreakPlan(newPlan);
            };

            // Get all assigned people
            const getAssignedStaff = () => {
                const assigned = new Set();
                Object.values(breakPlan.stations || {}).forEach(n => { if (n) assigned.add(n); });
                return [...assigned].sort();
            };

            // For a wave, get people NOT on break (available to cover)
            const getAvailableCovers = (waveId) => {
                const breakers = getWaveBreakers(waveId);
                return getAssignedStaff().filter(n => !breakers.includes(n));
            };

            // Get positions that need coverage in a wave (their assigned person is on break)
            const getPositionsNeedingCover = (waveId) => {
                const breakers = getWaveBreakers(waveId);
                const positions = [];
                Object.entries(breakPlan.stations || {}).forEach(([posId, name]) => {
                    if (name && breakers.includes(name)) {
                        const pos = ALL_POSITIONS.find(p => p.id === posId);
                        if (pos) positions.push({ pos, person: name, cover: getWaveCover(waveId, posId) });
                    }
                });
                return positions;
            };

            useEffect(() => {
                // Load checklist data (new system)
                const unsubChecklist = db.collection("ops").doc("checklists2").onSnapshot(async (doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        const todayKey = getTodayKey();
                        // Auto-update tasks when version changes
                        if (!data.version || data.version < CHECKLIST_VERSION) {
                            const freshTasks = JSON.parse(JSON.stringify(DEFAULT_CHECKLIST_TASKS));
                            setCustomTasks(freshTasks);
                            setChecks({});
                            setChecklistDate(todayKey);
                            try {
                                await db.collection("ops").doc("checklists2").set({
                                    checks: {}, customTasks: freshTasks, date: todayKey, updatedAt: new Date().toISOString(), version: CHECKLIST_VERSION
                                });
                            } catch (err) { console.error("Error updating checklist version:", err); }
                            return;
                        }
                        // Auto-reset: if stored date != today, reset checks but keep tasks
                        if (data.date && data.date !== todayKey) {
                            setChecks({});
                            setChecklistDate(todayKey);
                        } else {
                            setChecks(data.checks || {});
                            setChecklistDate(data.date || todayKey);
                        }
                        if (data.customTasks) setCustomTasks(data.customTasks);
                        setLastUpdated(prev => ({ ...prev, checklists: data.updatedAt ? new Date(data.updatedAt).toLocaleString() : "" }));
                    }
                });

                const inventoryRef = db.collection("ops").doc("inventory");
                const unsubInventorySnapshot = inventoryRef.onSnapshot((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        setInventory(data.counts || {});
                        if (data.customInventory) setCustomInventory(data.customInventory);
                        setLastUpdated(prev => ({ ...prev, inventory: new Date(data.date).toLocaleString() }));
                    }
                });

                return () => { unsubChecklist(); unsubInventorySnapshot(); };
            }, []);

            // ── PUSH NOTIFICATION SYSTEM ──
            // ── NOTIFICATION SYSTEM ──
            const [activeAlerts, setActiveAlerts] = useState([]);
            const [clockTick, setClockTick] = useState(0);
            const dismissedAlertsRef = React.useRef(new Set());

            const checkDeadlines = () => {
                const now = new Date();
                const currentMinutes = now.getHours() * 60 + now.getMinutes();
                const tasks = customTasksRef.current;
                const ch = checksRef.current;
                const todayKey = getTodayKey();
                const alerts = [];
                ["FOH", "BOH"].forEach(side => {
                    ["morning", "afternoon"].forEach(period => {
                        const periodTasks = (tasks[side] && tasks[side][period]) || [];
                        periodTasks.forEach(item => {
                            if (!item.completeBy || !item.assignTo) return;
                            if (item.assignTo !== staffName) return;
                            const done = item.subtasks && item.subtasks.length > 0
                                ? item.subtasks.every(s => ch[s.id])
                                : !!ch[item.id];
                            if (done) return;
                            const [h, m] = item.completeBy.split(":").map(Number);
                            const deadlineMinutes = h * 60 + m;
                            const taskName = item.task.includes("\n") ? item.task.split("\n")[0] : item.task;
                            const timeStr = item.completeBy.replace(/^0/, "");
                            // 30-minute warning
                            const warn30Key = item.id + "_30_" + todayKey;
                            if (currentMinutes >= deadlineMinutes - 30 && currentMinutes < deadlineMinutes && !dismissedAlertsRef.current.has(warn30Key)) {
                                const minsLeft = deadlineMinutes - currentMinutes;
                                alerts.push({ key: warn30Key, type: "warning", taskName, timeStr, message: `${minsLeft} min left` });
                            }
                            // At deadline or overdue
                            const dueKey = item.id + "_due_" + todayKey;
                            if (currentMinutes >= deadlineMinutes && !dismissedAlertsRef.current.has(dueKey)) {
                                const overBy = currentMinutes - deadlineMinutes;
                                alerts.push({ key: dueKey, type: "overdue", taskName, timeStr, message: overBy === 0 ? "Due NOW" : `${overBy} min overdue` });
                            }
                        });
                    });
                });
                setActiveAlerts(alerts);
                // Also try browser notification for new alerts
                if ("Notification" in window && Notification.permission === "granted") {
                    alerts.forEach(a => {
                        const nKey = "notif_" + a.key;
                        if (!dismissedAlertsRef.current.has(nKey)) {
                            dismissedAlertsRef.current.add(nKey);
                            new Notification(a.type === "overdue" ? "DD Mau - Task Due!" : "DD Mau - Reminder", {
                                body: `"${a.taskName}" — ${a.message}`,
                                tag: nKey
                            });
                        }
                    });
                }
            };

            useEffect(() => {
                if ("Notification" in window && Notification.permission === "default") {
                    Notification.requestPermission();
                }
                checkDeadlines(); // run immediately
                const interval = setInterval(() => { checkDeadlines(); setClockTick(t => t + 1); }, 30000);
                return () => clearInterval(interval);
            }, [staffName]);

            const dismissAlert = (key) => {
                dismissedAlertsRef.current.add(key);
                setActiveAlerts(prev => prev.filter(a => a.key !== key));
            };

            const getTodayKey = () => {
                const d = new Date();
                return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
            };

            // Strip undefined values from nested objects before Firestore save
            const cleanForFirestore = (obj) => {
                if (Array.isArray(obj)) return obj.map(cleanForFirestore);
                if (obj && typeof obj === "object") {
                    const clean = {};
                    Object.keys(obj).forEach(k => {
                        if (obj[k] !== undefined) clean[k] = cleanForFirestore(obj[k]);
                    });
                    return clean;
                }
                return obj;
            };

            const saveChecklistState = async (newChecks, newTasks) => {
                const todayKey = getTodayKey();

                const safeChecks = cleanForFirestore(newChecks);
                const safeTasks = cleanForFirestore(newTasks);

                    await db.collection("ops").doc("checklists2").set({
                        checks: safeChecks, customTasks: safeTasks, date: todayKey, updatedAt: now, version: CHECKLIST_VERSION
                    });
                    // Also save to daily history
                    await db.collection("checklistHistory").doc(todayKey).set({
                        checks: safeChecks, customTasks: safeTasks, date: now, version: CHECKLIST_VERSION
                    });

            };

            const handlePasswordSubmit = (e) => {

            const addChecklistTask = async () => {
                if (!newTask.trim()) return;

                if (newRequirePhoto) item.requirePhoto = true;
                if (newCompleteBy) item.completeBy = newCompleteBy;
                if (newAssignTo) item.assignTo = newAssignTo;

                if (cleanSubs.length > 0) item.subtasks = cleanSubs.map((s, i) => ({ id: item.id + "_s" + i, task: s.task.trim() }));
                const updated = JSON.parse(JSON.stringify(customTasksRef.current));
                if (!updated[checklistSide]) updated[checklistSide] = {};
                if (!updated[checklistSide][activePeriod]) updated[checklistSide][activePeriod] = [];
                updated[checklistSide][activePeriod].push(item);
                setCustomTasks(updated);
                await saveChecklistState(checksRef.current, updated);
                setNewTask(""); setNewRequirePhoto(false); setNewSubtasks([]); setNewCompleteBy(""); setNewAssignTo(""); setShowAddForm(false);
            };

            const saveChecklistEdit = async (idx) => {
                if (!editTask.trim()) return;
                const updated = JSON.parse(JSON.stringify(customTasksRef.current));
                const item = updated[checklistSide][activePeriod][idx];
                item.task = editTask.trim();
                item.requirePhoto = editRequirePhoto;
                if (editCompleteBy) { item.completeBy = editCompleteBy; } else { delete item.completeBy; }
                if (editAssignTo) { item.assignTo = editAssignTo; } else { delete item.assignTo; }
                const cleanSubs = editSubtasks.filter(s => s.task.trim());
                if (cleanSubs.length > 0) { item.subtasks = cleanSubs.map((s, i) => ({ id: (item.id || idx) + "_s" + i, task: s.task.trim() })); } else { delete item.subtasks; }
                setCustomTasks(updated);
                await saveChecklistState(checksRef.current, updated);
                setEditingIdx(null); setEditTask(""); setEditRequirePhoto(false); setEditSubtasks([]); setEditCompleteBy(""); setEditAssignTo("");
            };

            // Photo capture and upload
            const handlePhotoCapture = async (e, taskId) => {
                const file = e.target.files?.[0];
                if (!file) return;
                setCapturingPhoto(taskId);
                try {
                    const todayKey = getTodayKey();
                    const ref = storage.ref().child("checklist-photos/" + todayKey + "/" + taskId + "_" + Date.now() + ".jpg");
                    await ref.put(file);
                    const url = await ref.getDownloadURL();
                    const newChecks = { ...checksRef.current, [taskId + "_photo"]: url, [taskId + "_photoTime"]: new Date().toISOString() };
                    setChecks(newChecks);
                    await saveChecklistState(newChecks, customTasksRef.current);
                } catch (err) { console.error("Error uploading photo:", err); alert(language === "es" ? "Error al subir foto" : "Error uploading photo"); }
                setCapturingPhoto(null);
            };

            const deleteChecklistTask = async (idx) => {
                const updated = JSON.parse(JSON.stringify(customTasksRef.current));
                updated[checklistSide][activePeriod].splice(idx, 1);
                setCustomTasks(updated);
                await saveChecklistState(checksRef.current, updated);
            };

            const resetAllChecklists = async () => {
                if (!confirm(language === "es" ? "¿Guardar y reiniciar todas las tareas?" : "Save & reset all checklists?")) return;
                const todayKey = getTodayKey();
                const now = new Date().toISOString();
                try {
                    await db.collection("checklistHistory").doc(todayKey + "_saved").set({
                        checks: cleanForFirestore(checksRef.current), customTasks: cleanForFirestore(customTasksRef.current), date: now, savedBy: staffName
                    });
                } catch (err) { console.error("Error saving history:", err); }
                setChecks({});
                await saveChecklistState({}, customTasksRef.current);
            };

            const saveInventorySnapshot = async (counts, items) => {
                const now = new Date();
                const key = now.toISOString().split("T")[0] + "_" + now.toTimeString().split(" ")[0].replace(/:/g, "");
                // Only save items that have a count > 0 (shopping cart style)
                const cleanCounts = {};
                Object.entries(counts).forEach(([k, v]) => { if (v && v > 0) cleanCounts[k] = v; });
                // Filter categories to only include items with counts
                const filteredItems = items.map(cat => ({
                    category: cat.category || cat.name || "",
                    items: cat.items.filter(i => cleanCounts[i.id]).map(i => ({ id: i.id, name: i.name, nameEs: i.nameEs || "", supplier: i.supplier || "", orderDay: i.orderDay || "" }))
                })).filter(cat => cat.items.length > 0);
                try {
                    await db.collection("inventoryHistory").doc(key).set({
                        counts: cleanCounts,
                        items: filteredItems,
                        date: now.toISOString(),
                        listName: "",
                        ordered: {}
                    });
                } catch (err) { console.error("Error saving inventory snapshot:", err); }
            };

            const updateInventoryCount = async (itemId, newCount) => {
                const newInventory = { ...inventory, [itemId]: parseInt(newCount) || 0 };
                setInventory(newInventory);
                try {
                    await db.collection("ops").doc("inventory").set({ counts: newInventory, customInventory, date: new Date().toISOString() });
                } catch (err) { console.error("Error updating inventory:", err); }
            };

            const saveAndResetInventory = async () => {
                setInventorySaving(true);
                try {
                    // Save snapshot to history
                    await saveInventorySnapshot(inventory, customInventory);
                    // Reset all counts to 0
                    const resetCounts = {};
                    customInventory.forEach(cat => {
                        cat.items.forEach(item => { resetCounts[item.id] = 0; });
                    });
                    setInventory(resetCounts);
                    await db.collection("ops").doc("inventory").set({ counts: resetCounts, customInventory, date: new Date().toISOString() });
                } catch (err) { console.error("Error saving/resetting inventory:", err); }
                setInventorySaving(false);
                setShowSaveConfirm(false);
            };

            const saveInventory = async (counts, items) => {
                try {
                    await db.collection("ops").doc("inventory").set({
                        counts, customInventory: items, date: new Date().toISOString()
                    });
                    await saveInventorySnapshot(counts, items);
                } catch (err) { console.error("Error updating inventory:", err); }
            };

            // Quick write-in add (from the blank line at bottom of each category)
            const quickAddItem = async (catIdx) => {
                const name = (writeInValues[catIdx] || "").trim();
                if (!name) return;
                const category = customInventory[catIdx];
                const maxId = Math.max(...category.items.map(item => parseInt(item.id.split('-')[1]) || 0), -1);
                const newItem = { id: catIdx + "-" + (maxId + 1), name, nameEs: "", supplier: "", orderDay: "" };
                const updated = customInventory.map((cat, idx) =>
                    idx === catIdx ? { ...cat, items: [...cat.items, newItem] } : cat
                );
                setCustomInventory(updated);
                setWriteInValues(prev => ({ ...prev, [catIdx]: "" }));
                await saveInventory(inventory, updated);
            };

            const addInvItem = async (catIdx) => {
                if (!invNewName.trim()) return;
                const category = customInventory[catIdx];
                const maxId = Math.max(...category.items.map(item => parseInt(item.id.split('-')[1])), -1);
                const newItem = {
                    id: catIdx + "-" + (maxId + 1),
                    name: invNewName.trim(),
                    nameEs: invNewNameEs.trim(),
                    supplier: invNewSupplier.trim(),

                };
                const updated = customInventory.map((cat, idx) =>
                    idx === catIdx ? { ...cat, items: [...cat.items, newItem] } : cat
                );
                setCustomInventory(updated);
                await saveInventory(inventory, updated);
                setInvNewName(""); setInvNewNameEs(""); setInvNewSupplier(""); setInvNewOrderDay("Fri"); setInvShowAddForm(null);
            };

            const saveInvEdit = async (catIdx, itemIdx) => {
                if (!invEditName.trim()) return;
                const updated = customInventory.map((cat, cIdx) =>
                    cIdx === catIdx
                        ? { ...cat, items: cat.items.map((item, iIdx) =>
                            iIdx === itemIdx
                                ? { ...item, name: invEditName.trim(), nameEs: invEditNameEs.trim(), supplier: invEditSupplier.trim(), orderDay: invEditOrderDay }
                                : item
                            )}
                        : cat
                );
                setCustomInventory(updated);
                await saveInventory(inventory, updated);
                setInvEditingIdx(null); setInvEditName(""); setInvEditNameEs(""); setInvEditSupplier(""); setInvEditOrderDay("Fri");
            };

            const deleteInvItem = async (catIdx, itemIdx) => {
                const updated = customInventory.map((cat, cIdx) =>
                    cIdx === catIdx
                        ? { ...cat, items: cat.items.filter((_, iIdx) => iIdx !== itemIdx) }
                        : cat
                );
                setCustomInventory(updated);
                await saveInventory(inventory, updated);
            };

            // Get tasks for current side + period
            const getCurrentTasks = () => {
                return (customTasks[checklistSide] && customTasks[checklistSide][activePeriod]) || [];
            };

            // Count all checkable items (tasks + subtasks) for completion stats
            const countTaskItems = (task) => {
                let total = 0, done = 0;
                if (task.subtasks && task.subtasks.length > 0) {
                    total += task.subtasks.length;
                    done += task.subtasks.filter(s => checks[s.id]).length;
                } else {
                    total += 1;
                    done += checks[task.id] ? 1 : 0;
                }
                if (task.requirePhoto) {
                    total += 1;
                    done += checks[task.id + "_photo"] ? 1 : 0;
                }
                return { total, done };
            };

            const getCompletionStats = (side) => {
                let total = 0, done = 0;
                TIME_PERIODS.forEach(p => {
                    const tasks = (customTasks[side] && customTasks[side][p.id]) || [];
                    tasks.forEach(t => { const c = countTaskItems(t); total += c.total; done += c.done; });
                });
                return { total, done };
            };

            const getPeriodStats = (side, periodId) => {
                const tasks = (customTasks[side] && customTasks[side][periodId]) || [];
                let total = 0, done = 0;
                tasks.forEach(t => { const c = countTaskItems(t); total += c.total; done += c.done; });
                return { total, done };
            };

            // Check if a task is fully complete (all subtasks + photo if required)
            const isTaskComplete = (task) => {
                if (task.subtasks && task.subtasks.length > 0) {
                    if (!task.subtasks.every(s => checks[s.id])) return false;
                } else {
                    if (!checks[task.id]) return false;
                }
                if (task.requirePhoto && !checks[task.id + "_photo"]) return false;
                return true;
            };

            if (!passwordEntered) {
                return (
                    <div className="flex flex-col items-center justify-center min-h-screen bg-gradient-to-b from-mint-50 to-white p-4">
                        <div className="bg-white rounded-lg border-2 border-mint-700 p-8 w-full max-w-sm">
                            <h2 className="text-2xl font-bold text-mint-700 mb-2">🔐 {t("dailyOps", language)}</h2>
                            <p className="text-gray-600 mb-6">{t("passwordProtected", language)}</p>
                            <form onSubmit={handlePasswordSubmit}>
                                <input type="password" placeholder={t("enterPassword", language)} value={password}
                                    onChange={(e) => setPassword(e.target.value)}
                                    className="w-full px-4 py-2 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-mint-700 mb-4" />
                                <button type="submit" className="w-full bg-mint-700 text-white font-bold py-2 rounded-lg hover:bg-mint-800 transition">
                                    {t("unlock", language)}
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            const renderChecklist = () => {

                const periodStats = getPeriodStats(checklistSide, activePeriod);
                const overallStats = getCompletionStats(checklistSide);

                return (
                    <div className="space-y-3">
                        {/* FOH / BOH toggle — admins can switch, staff sees their own */}

                            <div className="flex gap-2 mb-3">
                                <button onClick={() => { setChecklistSide("FOH"); setEditMode(false); setEditingIdx(null); setShowAddForm(false); }}
                                    className={`flex-1 py-2 rounded-lg font-bold text-sm transition ${checklistSide === "FOH" ? "bg-blue-600 text-white" : "bg-blue-50 text-blue-700 border border-blue-200"}`}>
                                    FOH
                                </button>
                                <button onClick={() => { setChecklistSide("BOH"); setEditMode(false); setEditingIdx(null); setShowAddForm(false); }}
                                    className={`flex-1 py-2 rounded-lg font-bold text-sm transition ${checklistSide === "BOH" ? "bg-amber-600 text-white" : "bg-amber-50 text-amber-700 border border-amber-200"}`}>
                                    BOH
                                </button>
                            </div>
                        )}

                        {/* Overall progress bar */}

                            <div className="flex justify-between text-xs font-bold text-gray-600 mb-1">
                                <span>{checklistSide} — {language === "es" ? "Progreso del día" : "Day progress"}</span>
                                <span>{overallStats.done}/{overallStats.total}</span>
                            </div>
                            <div className="w-full bg-gray-200 rounded-full h-2">
                                <div className={`h-2 rounded-full transition-all ${checklistSide === "FOH" ? "bg-blue-500" : "bg-amber-500"}`}
                                    style={{ width: overallStats.total > 0 ? (overallStats.done / overallStats.total * 100) + "%" : "0%" }} />
                            </div>
                        </div>

                            <div className="flex gap-2 pb-2" style={{ minWidth: "max-content" }}>

                                    return (

                                            onClick={() => { setActivePeriod(p.id); setEditMode(false); setEditingIdx(null); setShowAddForm(false); }}
                                            className={`flex flex-col items-center px-3 py-2 rounded-lg text-xs font-bold transition whitespace-nowrap border-2 ${
                                                activePeriod === p.id
                                                    ? (checklistSide === "FOH" ? "bg-blue-600 text-white border-blue-600" : "bg-amber-600 text-white border-amber-600")
                                                    : allDone
                                                        ? "bg-green-50 text-green-700 border-green-300"
                                                        : "bg-white text-gray-600 border-gray-200"
                                            }`}>
                                            <span className="text-base">{p.emoji}</span>
                                            <span>{language === "es" ? p.nameEs : p.nameEn}</span>
                                            {ps.total > 0 && <span className="text-[10px] opacity-75">{ps.done}/{ps.total}</span>}

                            </div>

                                const deadMin = dh * 60 + dm;
                                if (curMin >= deadMin) taskUrgency = "overdue";

                                        <div className="flex items-center gap-2 mb-2">
                                            <label className="text-xs font-bold text-gray-600">⏰ {language === "es" ? "Completar antes de:" : "Complete by:"}</label>

                                                className="border border-gray-200 rounded px-2 py-1 text-xs" />

                                        {editCompleteBy && (
                                            <div className="flex items-center gap-2 mb-2">

                                                    className="border border-gray-200 rounded px-2 py-1 text-xs flex-1">
                                                    <option value="">{language === "es" ? "— Nadie —" : "— Nobody —"}</option>

                                                        <option key={s.id} value={s.name}>{s.name}</option>
                                                    ))}
                                                </select>
                                                {editAssignTo && <button onClick={() => setEditAssignTo("")} className="text-red-400 text-xs">✕</button>}
                                            </div>

                                                <div key={si} className="flex gap-1 mb-1">
                                                    <input className="flex-1 border border-gray-200 rounded px-2 py-1 text-xs" value={sub.task}
                                                        onChange={e => { const u = [...editSubtasks]; u[si] = {...u[si], task: e.target.value}; setEditSubtasks(u); }}
                                                        placeholder={(language === "es" ? "Subtarea " : "Subtask ") + (si+1)} />
                                                    <button onClick={() => setEditSubtasks(editSubtasks.filter((_,i) => i !== si))} className="text-red-400 text-xs px-1">✕</button>
                                                </div>

                                        <div className="flex items-center gap-2">

                                                className="px-3 py-1.5 bg-gray-100 text-gray-600 text-xs font-bold rounded-lg">{language === "es" ? "Cancelar" : "Cancel"}</button>
                                        </div>
                                    </div>

                            return (
                                <div key={item.id} className={"rounded-lg border-2 transition overflow-hidden " +

                                </label>

                                        <div key={si} className="flex gap-1 mb-1">
                                            <input className="flex-1 border border-gray-200 rounded px-2 py-1 text-xs" value={sub.task}

                                            <button onClick={() => setNewSubtasks(newSubtasks.filter((_,i) => i !== si))} className="text-red-400 text-xs px-1">✕</button>
                                        </div>
                                    ))}
                                    <button onClick={() => setNewSubtasks([...newSubtasks, {id: "", task: ""}])}
                                        className="text-xs text-mint-700 font-bold">+ {language === "es" ? "Agregar subtarea" : "Add subtask"}</button>
                                </div>
                                <div className="flex items-center gap-2">

        // DD Mau Location Coordinates
        const DD_MAU_LOCATIONS = [
            { name: "Maryland Heights", lat: 38.7138, lng: -90.4391 },
            { name: "Webster Groves", lat: 38.5917, lng: -90.3389 }
        ];
        const GEOFENCE_RADIUS_FEET = 500;

        // Haversine distance in feet
        function getDistanceFeet(lat1, lng1, lat2, lng2) {
            const R = 20902231; // Earth radius in feet
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) ** 2 +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                Math.sin(dLng / 2) ** 2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        function isWithinGeofence(lat, lng) {
            return DD_MAU_LOCATIONS.some(loc =>
                getDistanceFeet(lat, lng, loc.lat, loc.lng) <= GEOFENCE_RADIUS_FEET
            );
        }

        // Geofence hook
        function useGeofence() {
            const [isAtDDMau, setIsAtDDMau] = useState(false);
            const [checking, setChecking] = useState(true);
            const [error, setError] = useState(null);

            useEffect(() => {
                if (!navigator.geolocation) {
                    setError("noGeo");
                    setChecking(false);
                    return;
                }

                const watchId = navigator.geolocation.watchPosition(
                    (pos) => {
                        const inside = isWithinGeofence(pos.coords.latitude, pos.coords.longitude);
                        setIsAtDDMau(inside);
                        setChecking(false);
                        setError(null);
                    },
                    (err) => {
                        setError(err.code === 1 ? "denied" : "unavailable");
                        setChecking(false);
                    },
                    { enableHighAccuracy: true, maximumAge: 30000, timeout: 10000 }
                );

                return () => navigator.geolocation.clearWatch(watchId);
            }, []);

            return { isAtDDMau, checking, error };
        }

                ingredientsEn: [""], ingredientsEs: [""],
                instructionsEn: [""], instructionsEs: [""]
            });

            const updateField = (field, val) => setForm(prev => ({ ...prev, [field]: val }));
            const updateListItem = (field, idx, val) => {
                const arr = [...form[field]];
                arr[idx] = val;
                setForm(prev => ({ ...prev, [field]: arr }));
            };
            const addListItem = (field) => setForm(prev => ({ ...prev, [field]: [...prev[field], ""] }));
            const removeListItem = (field, idx) => {
                if (form[field].length <= 1) return;
                setForm(prev => ({ ...prev, [field]: prev[field].filter((_, i) => i !== idx) }));
            };

            const handleSave = () => {
                if (!form.titleEn.trim()) { alert(language === "es" ? "Se requiere título en inglés" : "English title is required"); return; }
                const cleaned = {
                    ...form,
                    ingredientsEn: form.ingredientsEn.filter(s => s.trim()),
                    ingredientsEs: form.ingredientsEs.filter(s => s.trim()),
                    instructionsEn: form.instructionsEn.filter(s => s.trim()),
                    instructionsEs: form.instructionsEs.filter(s => s.trim()),
                };
                if (cleaned.ingredientsEn.length === 0) cleaned.ingredientsEn = [""];
                if (cleaned.instructionsEn.length === 0) cleaned.instructionsEn = [""];
                if (cleaned.ingredientsEs.length === 0) cleaned.ingredientsEs = [""];
                if (cleaned.instructionsEs.length === 0) cleaned.instructionsEs = [""];
                onSave(cleaned);
            };

            const renderListEditor = (field, label) => (
                <div className="mb-4">
                    <label className="block text-xs font-bold text-gray-600 mb-1">{label}</label>
                    {form[field].map((item, i) => (
                        <div key={i} className="flex gap-1 mb-1">
                            <span className="text-xs text-gray-400 mt-2 w-5 text-right">{i + 1}.</span>
                            <input
                                className="flex-1 border border-gray-300 rounded px-2 py-1 text-sm"
                                value={item}
                                onChange={e => updateListItem(field, i, e.target.value)}
                                placeholder={`${label} ${i + 1}`}
                            />
                            <button onClick={() => removeListItem(field, i)} className="text-red-400 text-sm px-1">✕</button>
                        </div>
                    ))}
                    <button onClick={() => addListItem(field)} className="text-xs text-mint-700 font-bold mt-1">{language === "es" ? "+ Agregar" : "+ Add"}</button>
                </div>
            );

            return (
                <div className="p-4 pb-24">
                    <div className="flex items-center justify-between mb-4">
                        <h2 className="text-xl font-bold text-mint-700">
                            {isEdit ? (language === "es" ? "Editar Receta" : "Edit Recipe") : (language === "es" ? "Nueva Receta" : "New Recipe")}
                        </h2>
                        <button onClick={onCancel} className="text-gray-500 text-sm underline">{language === "es" ? "Cancelar" : "Cancel"}</button>
                    </div>

                    <div className="space-y-3">
                        <div className="flex gap-2">
                            <div className="w-16">
                                <label className="block text-xs font-bold text-gray-600 mb-1">{language === "es" ? "Ícono" : "Emoji"}</label>
                                <input className="w-full border border-gray-300 rounded px-2 py-1 text-center text-xl" value={form.emoji} onChange={e => updateField("emoji", e.target.value)} />
                            </div>
                            <div className="flex-1">
                                <label className="block text-xs font-bold text-gray-600 mb-1">{language === "es" ? "Categoría" : "Category"}</label>
                                <input className="w-full border border-gray-300 rounded px-2 py-1 text-sm" value={form.category} onChange={e => updateField("category", e.target.value)} placeholder={language === "es" ? "ej. Sopas, Aperitivos, Salsas" : "e.g. Soups, Appetizers, Sauces"} />
                            </div>
                        </div>

                        <div>
                            <label className="block text-xs font-bold text-gray-600 mb-1">{language === "es" ? "Título (Inglés) *" : "Title (English) *"}</label>
                            <input className="w-full border border-gray-300 rounded px-2 py-1 text-sm" value={form.titleEn} onChange={e => updateField("titleEn", e.target.value)} placeholder={language === "es" ? "Nombre de la receta en inglés" : "Recipe name in English"} />
                        </div>
                        <div>
                            <label className="block text-xs font-bold text-gray-600 mb-1">{language === "es" ? "Título (Español)" : "Title (Spanish)"}</label>
                            <input className="w-full border border-gray-300 rounded px-2 py-1 text-sm" value={form.titleEs} onChange={e => updateField("titleEs", e.target.value)} placeholder={language === "es" ? "Nombre en español" : "Recipe name in Spanish"} />
                        </div>

                        <div className="flex gap-2">
                            <div className="flex-1">
                                <label className="block text-xs font-bold text-gray-600 mb-1">{t("prepTime", language)}</label>
                                <input className="w-full border border-gray-300 rounded px-2 py-1 text-sm" value={form.prepTimeEn} onChange={e => updateField("prepTimeEn", e.target.value)} placeholder={language === "es" ? "ej. 30 min" : "e.g. 30 min"} />
                            </div>
                            <div className="flex-1">
                                <label className="block text-xs font-bold text-gray-600 mb-1">{t("cookTime", language)}</label>
                                <input className="w-full border border-gray-300 rounded px-2 py-1 text-sm" value={form.cookTimeEn} onChange={e => updateField("cookTimeEn", e.target.value)} placeholder={language === "es" ? "ej. 2 horas" : "e.g. 2 hours"} />
                            </div>
                        </div>

                        <div className="flex gap-2">
                            <div className="flex-1">
                                <label className="block text-xs font-bold text-gray-600 mb-1">{t("yields", language)} (EN)</label>
                                <input className="w-full border border-gray-300 rounded px-2 py-1 text-sm" value={form.yieldsEn} onChange={e => updateField("yieldsEn", e.target.value)} placeholder={language === "es" ? "ej. 5 galones" : "e.g. 5 gallons"} />
                            </div>
                            <div className="flex-1">
                                <label className="block text-xs font-bold text-gray-600 mb-1">{t("yields", language)} (ES)</label>
                                <input className="w-full border border-gray-300 rounded px-2 py-1 text-sm" value={form.yieldsEs} onChange={e => updateField("yieldsEs", e.target.value)} placeholder="e.g. 19 litros" />
                            </div>
                        </div>

                        <div className="border-t pt-3 mt-3">
                            <h3 className="font-bold text-sm text-amber-800 mb-2">📝 {t("ingredients", language)}</h3>
                            {renderListEditor("ingredientsEn", language === "es" ? "Inglés" : "English")}
                            {renderListEditor("ingredientsEs", language === "es" ? "Español" : "Spanish")}
                        </div>

                        <div className="border-t pt-3 mt-3">
                            <h3 className="font-bold text-sm text-amber-800 mb-2">👨‍🍳 {t("instructions", language)}</h3>
                            {renderListEditor("instructionsEn", language === "es" ? "Inglés" : "English")}
                            {renderListEditor("instructionsEs", language === "es" ? "Español" : "Spanish")}
                        </div>

                        <button
                            onClick={handleSave}
                            className="w-full bg-mint-700 text-white font-bold py-3 rounded-lg text-lg mt-4"
                        >
                            {isEdit ? (language === "es" ? "Guardar Cambios" : "Save Changes") : (language === "es" ? "Agregar Receta" : "Add Recipe")}
                        </button>
                    </div>
                </div>
            );
        }

        // Recipes Component
        function Recipes({ language, staffName }) {
            const [expandedRecipe, setExpandedRecipe] = useState(null);
            const [recipes, setRecipes] = useState(RECIPES);
            const [editMode, setEditMode] = useState(null); // null | "add" | recipe object
            const [unlocked, setUnlocked] = useState(false);
            const [showPasswordPrompt, setShowPasswordPrompt] = useState(false);
            const [pendingAction, setPendingAction] = useState(null); // "add" | recipe object
            const [passwordInput, setPasswordInput] = useState("");
            const [passwordError, setPasswordError] = useState(false);
            const adminUser = isAdmin(staffName);

            // Load recipes from Firestore
            useEffect(() => {
                const unsubscribe = db.collection("config").doc("recipes").onSnapshot((doc) => {
                    if (doc.exists && doc.data().list && doc.data().list.length > 0) {
                        setRecipes(doc.data().list);
                    }
                });
                return () => unsubscribe();
            }, []);

            const requestEdit = (action) => {
                if (unlocked) {
                    setEditMode(action);
                } else {
                    setPendingAction(action);
                    setShowPasswordPrompt(true);
                    setPasswordInput("");
                    setPasswordError(false);
                }
            };

            const checkPassword = () => {
                if (passwordInput === RECIPE_PASSWORD) {
                    setUnlocked(true);
                    setShowPasswordPrompt(false);
                    setPasswordError(false);
                    if (pendingAction && pendingAction.action === "delete") {
                        deleteRecipe(pendingAction.id);
                    } else {
                        setEditMode(pendingAction);
                    }
                    setPendingAction(null);
                } else {
                    setPasswordError(true);
                }
            };

            const saveRecipe = async (recipeData) => {
                let updated;
                if (editMode === "add") {
                    const newId = recipes.length > 0 ? Math.max(...recipes.map(r => r.id || 0)) + 1 : 1;
                    updated = [...recipes, { ...recipeData, id: newId }];
                } else {
                    updated = recipes.map(r => r.id === editMode.id ? { ...recipeData, id: editMode.id } : r);
                }
                setRecipes(updated);
                setEditMode(null);
                try {
                    await db.collection("config").doc("recipes").set({ list: updated, updatedAt: new Date().toISOString() });
                } catch (err) { console.error("Error saving recipes:", err); }
            };

            const deleteRecipe = async (recipeId) => {
                if (!confirm(language === "es" ? "¿Eliminar esta receta?" : "Delete this recipe?")) return;
                const updated = recipes.filter(r => r.id !== recipeId);
                setRecipes(updated);
                try {
                    await db.collection("config").doc("recipes").set({ list: updated, updatedAt: new Date().toISOString() });
                } catch (err) { console.error("Error deleting recipe:", err); }
            };

            // Password prompt modal
            if (showPasswordPrompt) {
                return (
                    <div className="p-4 pb-24">
                        <div className="max-w-sm mx-auto mt-12 bg-white border-2 border-amber-300 rounded-xl p-6 shadow-lg">
                            <div className="text-center mb-4">
                                <span className="text-4xl">🔐</span>
                                <h3 className="font-bold text-lg text-gray-800 mt-2">{language === "es" ? "Contraseña de Recetas" : "Recipe Password"}</h3>
                                <p className="text-xs text-gray-500 mt-1">{language === "es" ? "Ingrese la contraseña para editar recetas" : "Enter password to edit recipes"}</p>
                            </div>
                            <input
                                type="password"
                                className={`w-full border-2 ${passwordError ? "border-red-400" : "border-gray-300"} rounded-lg px-4 py-3 text-center text-lg mb-2`}
                                value={passwordInput}
                                onChange={e => { setPasswordInput(e.target.value); setPasswordError(false); }}
                                onKeyDown={e => e.key === "Enter" && checkPassword()}
                                placeholder="••••••••"
                                autoFocus
                            />
                            {passwordError && <p className="text-red-500 text-xs text-center mb-2">{language === "es" ? "Contraseña incorrecta" : "Incorrect password"}</p>}
                            <div className="flex gap-2 mt-3">
                                <button onClick={() => { setShowPasswordPrompt(false); setPendingAction(null); }} className="flex-1 border border-gray-300 rounded-lg py-2 text-sm text-gray-600">{language === "es" ? "Cancelar" : "Cancel"}</button>
                                <button onClick={checkPassword} className="flex-1 bg-mint-700 text-white rounded-lg py-2 text-sm font-bold">{language === "es" ? "Entrar" : "Enter"}</button>
                            </div>
                        </div>
                    </div>
                );
            }

            // Edit/Add form
            if (editMode) {
                return <RecipeForm
                    language={language}
                    recipe={editMode === "add" ? null : editMode}
                    onSave={saveRecipe}
                    onCancel={() => setEditMode(null)}
                />;
            }

            return (
                <div className="p-4 pb-24">
                    <div className="flex items-center justify-between mb-2">
                        <h2 className="text-2xl font-bold text-mint-700">🧑‍🍳 {t("recipesTitle", language)}</h2>
                        {adminUser && (
                            <button
                                onClick={() => requestEdit("add")}
                                className="bg-mint-700 text-white px-3 py-1.5 rounded-lg text-sm font-bold flex items-center gap-1"
                            >
                                + {language === "es" ? "Agregar" : "Add"}
                            </button>
                        )}
                    </div>
                    <p className="text-xs text-gray-500 mb-4 bg-amber-50 border border-amber-200 rounded-lg p-2">
                        🔒 {language === "es"
                            ? "Estas recetas solo son visibles cuando estás en DD Mau. No compartas fuera del restaurante."
                            : "These recipes are only visible when you're at DD Mau. Do not share outside the restaurant."}
                    </p>

                    {recipes.map(recipe => {
                        const isExpanded = expandedRecipe === recipe.id;
                        return (
                            <div key={recipe.id} className="mb-3 bg-white rounded-lg border-2 border-gray-200 overflow-hidden">
                                <div
                                    className="p-4 cursor-pointer bg-gradient-to-r from-amber-50 to-white"
                                    onClick={() => setExpandedRecipe(isExpanded ? null : recipe.id)}
                                >
                                    <div className="flex items-center justify-between">
                                        <div className="flex items-center gap-3">
                                            <span className="text-3xl">{recipe.emoji}</span>
                                            <div>
                                                <h3 className="font-bold text-amber-800">
                                                    {language === "es" ? (recipe.titleEs || recipe.titleEn) : recipe.titleEn}
                                                </h3>
                                                <p className="text-xs text-gray-500">{recipe.category}</p>
                                            </div>
                                        </div>
                                        <span className={`text-lg transition-transform ${isExpanded ? "rotate-180" : ""}`}>▼</span>
                                    </div>
                                </div>

                                {isExpanded && (
                                    <div className="border-t border-gray-200 p-4">
                                        {adminUser && (
                                            <div className="flex gap-2 mb-3">
                                                <button onClick={(e) => { e.stopPropagation(); requestEdit(recipe); }} className="text-xs bg-amber-100 text-amber-700 px-3 py-1 rounded-full font-bold border border-amber-300">
                                                    ✏️ {language === "es" ? "Editar" : "Edit"}
                                                </button>
                                                <button onClick={(e) => { e.stopPropagation(); if(unlocked) deleteRecipe(recipe.id); else { setPendingAction({action:"delete", id: recipe.id}); setShowPasswordPrompt(true); setPasswordInput(""); setPasswordError(false); }}} className="text-xs bg-red-50 text-red-600 px-3 py-1 rounded-full font-bold border border-red-200">
                                                    🗑️ {language === "es" ? "Eliminar" : "Delete"}
                                                </button>
                                            </div>
                                        )}
                                        <div className="flex gap-4 mb-4 text-xs">
                                            <div className="bg-blue-50 rounded-lg px-3 py-2 flex-1 text-center">
                                                <div className="font-bold text-blue-700">{t("prepTime", language)}</div>
                                                <div className="text-blue-600">{recipe.prepTimeEn}</div>
                                            </div>
                                            <div className="bg-orange-50 rounded-lg px-3 py-2 flex-1 text-center">
                                                <div className="font-bold text-orange-700">{t("cookTime", language)}</div>
                                                <div className="text-orange-600">{recipe.cookTimeEn}</div>
                                            </div>
                                            <div className="bg-green-50 rounded-lg px-3 py-2 flex-1 text-center">
                                                <div className="font-bold text-green-700">{t("yields", language)}</div>
                                                <div className="text-green-600">{language === "es" ? (recipe.yieldsEs || recipe.yieldsEn) : recipe.yieldsEn}</div>
                                            </div>
                                        </div>

                                        <div className="mb-4">
                                            <h4 className="font-bold text-sm text-gray-800 mb-2 border-b pb-1">📝 {t("ingredients", language)}</h4>
                                            <ul className="space-y-1">
                                                {(language === "es" ? (recipe.ingredientsEs || recipe.ingredientsEn) : recipe.ingredientsEn).map((item, i) => (
                                                    <li key={i} className="text-sm text-gray-700 flex items-start gap-2">
                                                        <span className="text-mint-400 mt-1">•</span>
                                                        <span>{item}</span>
                                                    </li>
                                                ))}
                                            </ul>
                                        </div>

                                        <div>
                                            <h4 className="font-bold text-sm text-gray-800 mb-2 border-b pb-1">👨‍🍳 {t("instructions", language)}</h4>
                                            <ol className="space-y-2">
                                                {(language === "es" ? (recipe.instructionsEs || recipe.instructionsEn) : recipe.instructionsEn).map((step, i) => (
                                                    <li key={i} className="text-sm text-gray-700 flex items-start gap-2">
                                                        <span className="bg-mint-700 text-white rounded-full w-5 h-5 flex items-center justify-center text-xs font-bold flex-shrink-0 mt-0.5">{i + 1}</span>
                                                        <span>{step}</span>
                                                    </li>
                                                ))}
                                            </ol>
                                        </div>
                                    </div>
                                )}
                            </div>
                        );
                    })}
                </div>
            );
        }

        // Checklist History Component (Admin only)
        function ChecklistHistory({ language }) {
            const [historyDates, setHistoryDates] = useState([]);
            const [selectedDate, setSelectedDate] = useState(null);
            const [dayData, setDayData] = useState(null);
            const [loading, setLoading] = useState(true);
            const [historySide, setHistorySide] = useState("FOH");
            const [expandedPhoto, setExpandedPhoto] = useState(null);

            useEffect(() => {
                const fetchHistory = async () => {
                    try {
                        const snapshot = await db.collection("checklistHistory").get();
                        const dates = snapshot.docs.map(doc => doc.id).filter(d => !d.includes("_")).sort().reverse().slice(0, 30);
                        setHistoryDates(dates);
                        if (dates.length > 0) setSelectedDate(dates[0]);
                    } catch (err) { console.error("Error loading history:", err); }
                    setLoading(false);
                };
                fetchHistory();
            }, []);

            useEffect(() => {
                if (!selectedDate) return;
                const fetchDay = async () => {
                    try {
                        // Prefer the _saved version (has completed checks before reset)
                        const savedDoc = await db.collection("checklistHistory").doc(selectedDate + "_saved").get();
                        if (savedDoc.exists) { setDayData(savedDoc.data()); return; }
                        const doc = await db.collection("checklistHistory").doc(selectedDate).get();
                        if (doc.exists) setDayData(doc.data());
                        else setDayData(null);
                    } catch (err) { console.error("Error loading day:", err); }
                };
                fetchDay();
            }, [selectedDate]);

            const formatDate = (dateStr) => {
                const d = new Date(dateStr + "T12:00:00");
                return d.toLocaleDateString(language === "es" ? "es-US" : "en-US", { weekday: "short", month: "short", day: "numeric" });
            };

            const renderHistoryPeriod = (period) => {
                if (!dayData || !dayData.customTasks) return null;
                const tasks = dayData.customTasks[historySide]?.[period.id] || [];
                if (tasks.length === 0) return null;
                const checks = dayData.checks || {};

                let totalItems = 0, doneItems = 0;
                tasks.forEach(task => {
                    if (task.subtasks && task.subtasks.length > 0) {
                        totalItems += task.subtasks.length;
                        doneItems += task.subtasks.filter(s => checks[s.id]).length;
                    } else {
                        totalItems += 1;
                        doneItems += checks[task.id] ? 1 : 0;
                    }
                    if (task.requirePhoto) { totalItems += 1; doneItems += checks[task.id + "_photo"] ? 1 : 0; }
                });

                const allDone = totalItems > 0 && doneItems === totalItems;

                return (
                    <div key={period.id} className="mb-3">
                        <div className="flex items-center justify-between mb-1.5">
                            <span className="text-sm font-bold text-gray-700">{period.emoji} {language === "es" ? period.nameEs : period.nameEn}</span>
                            <span className={`text-xs font-bold px-2 py-0.5 rounded-full ${allDone ? "bg-green-100 text-green-700" : "bg-amber-100 text-amber-700"}`}>
                                {doneItems}/{totalItems}
                            </span>
                        </div>
                        <div className="space-y-1">
                            {tasks.map((task, idx) => {
                                const hasSubtasks = task.subtasks && task.subtasks.length > 0;
                                const taskDone = hasSubtasks
                                    ? task.subtasks.every(s => checks[s.id])
                                    : !!checks[task.id];
                                const photoDone = task.requirePhoto ? !!checks[task.id + "_photo"] : true;
                                const fullyDone = taskDone && photoDone;
                                const photoUrl = checks[task.id + "_photo"];

                                return (
                                    <div key={idx} className={`p-2 rounded-lg text-sm ${fullyDone ? "bg-green-50" : "bg-red-50"}`}>
                                        <div className="flex items-center gap-2">
                                            <span className="text-base">{fullyDone ? "✅" : "❌"}</span>
                                            <span className={fullyDone ? "text-gray-700" : "text-red-700 font-medium"}>
                                                {task.task.includes("\n") ? task.task.split("\n").map((line, li) => (
                                                    <span key={li}>{li === 0 ? line : <><br/><span className="font-normal text-xs text-gray-500">{line}</span></>}</span>
                                                )) : task.task}
                                            </span>
                                        </div>
                                        {hasSubtasks && (
                                            <div className="ml-7 mt-1 space-y-0.5">
                                                {task.subtasks.map((sub, si) => (
                                                    <div key={si} className="flex items-center gap-1.5 text-xs">
                                                        <span>{checks[sub.id] ? "✅" : "⬜"}</span>
                                                        <span className={checks[sub.id] ? "text-gray-600" : "text-red-600"}>{sub.task}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                        {task.requirePhoto && (
                                            <div className="ml-7 mt-1">
                                                {photoUrl ? (
                                                    <button onClick={() => setExpandedPhoto(expandedPhoto === task.id ? null : task.id)}
                                                        className="text-xs font-bold text-mint-700 flex items-center gap-1">
                                                        📸 {expandedPhoto === task.id
                                                            ? (language === "es" ? "Ocultar foto" : "Hide photo")
                                                            : (language === "es" ? "Ver foto" : "View photo")}
                                                    </button>
                                                ) : (
                                                    <span className="text-xs text-red-400 font-medium">📸 {language === "es" ? "Foto no tomada" : "Photo not taken"}</span>
                                                )}
                                                {expandedPhoto === task.id && photoUrl && (
                                                    <img src={photoUrl} alt="Task photo" className="mt-1 rounded-lg border border-gray-200 max-w-full" style={{ maxHeight: "200px" }} />
                                                )}
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                );
            };

            if (loading) return <div className="text-center text-gray-500 py-4">{language === "es" ? "Cargando..." : "Loading..."}</div>;

            if (historyDates.length === 0) {
                return (
                    <div className="bg-gray-50 rounded-lg p-4 text-center text-gray-500">
                        <p className="text-sm">{language === "es"
                            ? "Aún no hay historial de listas. El historial comenzará a guardarse cuando el equipo use las listas."
                            : "No checklist history yet. History will start saving when the team uses the checklists."}</p>
                    </div>
                );
            }

            return (
                <div>
                    {/* Date picker */}
                    <div className="flex gap-2 overflow-x-auto pb-2 mb-3" style={{ scrollbarWidth: "none" }}>
                        {historyDates.map(date => (
                            <button key={date} onClick={() => setSelectedDate(date)}
                                className={`flex-shrink-0 px-3 py-2 rounded-lg text-xs font-bold transition ${selectedDate === date
                                    ? "bg-mint-700 text-white"
                                    : "bg-gray-100 text-gray-600 hover:bg-mint-50"}`}>
                                {formatDate(date)}
                            </button>
                        ))}
                    </div>

                    {/* FOH / BOH toggle */}
                    <div className="flex gap-2 mb-4">
                        <button onClick={() => setHistorySide("FOH")}
                            className={`flex-1 py-2 rounded-lg text-xs font-bold transition ${historySide === "FOH" ? "bg-mint-700 text-white" : "bg-gray-100 text-gray-600"}`}>
                            FOH
                        </button>
                        <button onClick={() => setHistorySide("BOH")}
                            className={`flex-1 py-2 rounded-lg text-xs font-bold transition ${historySide === "BOH" ? "bg-mint-700 text-white" : "bg-gray-100 text-gray-600"}`}>
                            BOH
                        </button>
                    </div>

                    {selectedDate && dayData && (
                        <div>
                            <p className="text-xs text-gray-500 mb-3">
                                {language === "es" ? "Última actualización" : "Last updated"}: {new Date(dayData.date).toLocaleString()}
                            </p>
                            {TIME_PERIODS.map(p => renderHistoryPeriod(p))}
                            {TIME_PERIODS.every(p => {
                                const tasks = dayData.customTasks?.[historySide]?.[p.id] || [];
                                return tasks.length === 0;
                            }) && (
                                <p className="text-center text-gray-400 text-sm py-4">{language === "es" ? "Sin tareas para este lado" : "No tasks for this side"}</p>
                            )}
                        </div>
                    )}

                    {selectedDate && !dayData && (
                        <p className="text-center text-gray-400 text-sm py-4">{language === "es" ? "Sin datos para este día" : "No data for this day"}</p>
                    )}
                </div>
            );
        }

        // Inventory History Component (Admin only)
        function InventoryHistory({ language, customInventory: customInventoryProp }) {
            const [historyDates, setHistoryDates] = useState([]);
            const [selectedDate, setSelectedDate] = useState(null);
            const [dayData, setDayData] = useState(null);
            const [prevData, setPrevData] = useState(null);
            const [loading, setLoading] = useState(true);
            // Editable list name
            const [listName, setListName] = useState("");
            const [editingName, setEditingName] = useState(false);
            // Ordered checkboxes
            const [ordered, setOrdered] = useState({});
            // Edit mode for counts & adding items
            const [histEditMode, setHistEditMode] = useState(false);
            const [histCounts, setHistCounts] = useState({});
            const [saving, setSaving] = useState(false);
            // Searchable add-item picker
            const [showAddPicker, setShowAddPicker] = useState(false);
            const [addSearch, setAddSearch] = useState("");
            // Full inventory (passed as prop or loaded from Firestore)
            const [fullInventory, setFullInventory] = useState(customInventoryProp || []);

            // Load full inventory if not passed as prop
            useEffect(() => {
                if (customInventoryProp && customInventoryProp.length > 0) {
                    setFullInventory(customInventoryProp);
                } else {
                    const loadInv = async () => {
                        try {
                            const doc = await db.collection("ops").doc("inventory").get();
                            if (doc.exists && doc.data().customInventory) setFullInventory(doc.data().customInventory);
                        } catch (err) { console.error("Error loading inventory for picker:", err); }
                    };
                    loadInv();
                }
            }, [customInventoryProp]);

            useEffect(() => {
                const fetchHistory = async () => {
                    try {
                        const snapshot = await db.collection("inventoryHistory").get();
                        const dates = snapshot.docs.map(doc => doc.id).sort().reverse().slice(0, 30);
                        setHistoryDates(dates);
                        if (dates.length > 0) setSelectedDate(dates[0]);
                    } catch (err) { console.error("Error loading inventory history:", err); }
                    setLoading(false);
                };
                fetchHistory();
            }, []);

            // Load selected day + previous day for comparison
            useEffect(() => {
                if (!selectedDate) return;
                const fetchDay = async () => {
                    try {
                        const doc = await db.collection("inventoryHistory")
                            .doc(selectedDate).get();
                        if (doc.exists) {
                            const data = doc.data();
                            setDayData(data);
                            setListName(data.listName || "");
                            setOrdered(data.ordered || {});
                            setHistCounts(data.counts || {});
                        } else {
                            setDayData(null);
                            setListName("");
                            setOrdered({});
                            setHistCounts({});
                        }

                        // Find previous day in history
                        const idx = historyDates.indexOf(selectedDate);
                        if (idx < historyDates.length - 1) {
                            const prevDoc = await db.collection("inventoryHistory")
                                .doc(historyDates[idx + 1]).get();
                            if (prevDoc.exists) setPrevData(prevDoc.data());
                            else setPrevData(null);
                        } else {
                            setPrevData(null);
                        }
                    } catch (err) { console.error("Error loading day:", err); }
                    setHistEditMode(false);
                    setAddingToCategory(null);
                };
                fetchDay();
            }, [selectedDate, historyDates]);

            // Save helper — persist changes back to Firestore (merge to handle new fields)
            const saveToFirestore = async (updates) => {
                if (!selectedDate) return;
                setSaving(true);
                try {
                    await db.collection("inventoryHistory").doc(selectedDate).set(updates, { merge: true });
                } catch (err) { console.error("Error saving inventory history:", err); }
                setSaving(false);
            };

            // Toggle ordered checkbox
            const toggleOrdered = async (itemId) => {
                const newOrdered = { ...ordered, [itemId]: !ordered[itemId] };
                setOrdered(newOrdered);
                await saveToFirestore({ ordered: newOrdered });
            };

            // Save list name
            const saveListName = async () => {
                setEditingName(false);
                await saveToFirestore({ listName });
            };

            // Update a count in edit mode
            const updateHistCount = (itemId, val) => {
                const n = Math.max(0, parseInt(val) || 0);
                setHistCounts(prev => ({ ...prev, [itemId]: n }));
            };

            // Save edited counts back (keep all items — this is a saved order list)
            const saveHistEdits = async () => {
                const updates = { counts: { ...histCounts } };
                await saveToFirestore(updates);
                setDayData(prev => ({ ...prev, counts: { ...histCounts } }));
                setHistEditMode(false);
            };

            // Add item from inventory picker to the saved list
            const addItemFromPicker = async (item, categoryName) => {
                // Check if item already exists in the saved list
                const alreadyExists = (dayData.items || []).some(cat => cat.items.some(i => i.id === item.id));
                if (alreadyExists) {
                    // Just increment count
                    const newCounts = { ...histCounts, [item.id]: (histCounts[item.id] || 0) + 1 };
                    setHistCounts(newCounts);
                    setDayData(prev => ({ ...prev, counts: newCounts }));
                    await saveToFirestore({ counts: newCounts });
                    return;
                }
                // Find or create category in saved list
                const newItem = { id: item.id, name: item.name, nameEs: item.nameEs || "", supplier: item.supplier || "", orderDay: item.orderDay || "" };
                let updatedItems = [...(dayData.items || [])];
                const catIdx = updatedItems.findIndex(c => c.category === categoryName);
                if (catIdx >= 0) {
