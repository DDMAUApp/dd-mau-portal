                    updatedItems[catIdx] = { ...updatedItems[catIdx], items: [...updatedItems[catIdx].items, newItem] };
                } else {
                    updatedItems.push({ category: categoryName, items: [newItem] });
                }
                const newCounts = { ...histCounts, [item.id]: 1 };
                setHistCounts(newCounts);
                setDayData(prev => ({ ...prev, items: updatedItems, counts: newCounts }));
                await saveToFirestore({ items: updatedItems, counts: newCounts });
            };

            const formatDate = (dateStr) => {
                // Keys are like "2026-04-11_143022"
                const datePart = dateStr.split("_")[0];
                const timePart = dateStr.split("_")[1];
                const d = new Date(datePart + "T12:00:00");
                const dateLabel = d.toLocaleDateString(language === "es" ? "es-US" : "en-US", { weekday: "short", month: "short", day: "numeric" });
                if (timePart) {
                    const h = timePart.slice(0, 2);
                    const m = timePart.slice(2, 4);
                    const hr = parseInt(h);
                    const ampm = hr >= 12 ? "pm" : "am";
                    const hr12 = hr % 12 || 12;
                    return `${dateLabel} ${hr12}:${m}${ampm}`;
                }
                return dateLabel;
            };

            const printInventory = () => {
                if (!dayData || !dayData.items) return;
                const dateLabel = formatDate(selectedDate);
                const titleName = listName || (language === "es" ? "Conteo de Inventario" : "Inventory Count");
                let html = `<!DOCTYPE html><html><head><title>DD Mau - ${titleName}</title>
                    <style>
                        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 20px; color: #222; }
                        h1 { font-size: 20px; margin-bottom: 4px; }
                        .subtitle { font-size: 12px; color: #666; margin-bottom: 16px; }
                        table { width: 100%; border-collapse: collapse; margin-bottom: 16px; }
                        th { background: #d9ecdb; text-align: left; padding: 6px 10px; font-size: 13px; border: 1px solid #ccc; }
                        td { padding: 5px 10px; font-size: 12px; border: 1px solid #ddd; }
                        .count { text-align: right; font-weight: bold; width: 50px; }
                        .diff-pos { color: green; font-size: 11px; }
                        .diff-neg { color: red; font-size: 11px; }
                        .supplier { color: #999; font-size: 11px; }
                        .ordered { text-decoration: line-through; color: #999; }
                        .check { color: green; font-weight: bold; }
                        @media print { body { padding: 0; } }
                    </style></head><body>`;
                html += `<h1>🍜 DD Mau — ${titleName}</h1>`;
                html += `<div class="subtitle">${dateLabel} • ${language === "es" ? "Última actualización" : "Last updated"}: ${new Date(dayData.date).toLocaleString()}</div>`;

                dayData.items.forEach(cat => {
                    html += `<table><tr><th colspan="4">${cat.category}</th></tr>`;
                    cat.items.forEach(item => {
                        const count = dayData.counts?.[item.id] || 0;
                        const prevCount = prevData?.counts?.[item.id];
                        const diff = prevCount !== undefined ? count - prevCount : null;
                        const name = language === "es" && item.nameEs ? item.nameEs : item.name;
                        const supplierStr = item.supplier ? ` <span class="supplier">(${item.supplier})</span>` : "";
                        const isOrdered = ordered[item.id];
                        let diffStr = "";
                        if (diff !== null && diff !== 0) {
                            diffStr = diff > 0
                                ? ` <span class="diff-pos">+${diff}</span>`
                                : ` <span class="diff-neg">${diff}</span>`;
                        }
                        html += `<tr><td style="width:30px">${isOrdered ? '<span class="check">✓</span>' : '☐'}</td><td class="${isOrdered ? 'ordered' : ''}">${name}${supplierStr}</td><td class="count">${count}</td><td style="width:40px">${diffStr}</td></tr>`;
                    });
                    html += `</table>`;
                });

                html += `</body></html>`;
                const win = window.open("", "_blank");
                win.document.write(html);
                win.document.close();
                win.focus();
                setTimeout(() => win.print(), 300);
            };

            if (loading) return <div className="text-center text-gray-500 py-4">{language === "es" ? "Cargando..." : "Loading..."}</div>;

            if (historyDates.length === 0) {
                return (
                    <div className="bg-gray-50 rounded-lg p-4 text-center text-gray-500">
                        <p className="text-sm">{language === "es"
                            ? "Aún no hay historial de inventario. Comenzará a guardarse cuando se actualicen los conteos."
                            : "No inventory history yet. It will start saving when counts are updated."}</p>
                    </div>
                );
            }

            // Count ordered vs total
            const totalItems = dayData?.items?.reduce((sum, cat) => sum + cat.items.length, 0) || 0;
            const orderedCount = dayData?.items?.reduce((sum, cat) => sum + cat.items.filter(i => ordered[i.id]).length, 0) || 0;

            return (
                <div>
                    <div className="flex gap-2 overflow-x-auto pb-2 mb-4" style={{ scrollbarWidth: "none" }}>
                        {historyDates.map(date => (
                            <button key={date} onClick={() => setSelectedDate(date)}
                                className={`flex-shrink-0 px-3 py-2 rounded-lg text-xs font-bold transition ${selectedDate === date
                                    ? "bg-mint-700 text-white"
                                    : "bg-gray-100 text-gray-600 hover:bg-mint-50"}`}>
                                {formatDate(date)}
                            </button>
                        ))}
                    </div>

                    {selectedDate && dayData && dayData.items && (
                        <div className="space-y-4">
                            {/* Date + editable list name */}
                            <div className="bg-white rounded-xl border-2 border-mint-200 p-3">
                                <p className="text-xs text-gray-500 mb-1">
                                    {formatDate(selectedDate)}
                                </p>
                                {editingName ? (
                                    <div className="flex gap-2">
                                        <input type="text" value={listName}
                                            onChange={e => setListName(e.target.value)}
                                            placeholder={language === "es" ? "Nombre de la lista..." : "List name..."}
                                            className="flex-1 px-3 py-1.5 border-2 border-mint-300 rounded-lg text-sm font-bold focus:outline-none focus:border-mint-700"
                                            autoFocus
                                            onKeyDown={e => { if (e.key === "Enter") saveListName(); }} />
                                        <button onClick={saveListName}
                                            className="px-3 py-1.5 bg-mint-700 text-white rounded-lg text-xs font-bold hover:bg-mint-800">
                                            ✓
                                        </button>
                                    </div>
                                ) : (
                                    <div className="flex items-center gap-2 cursor-pointer group" onClick={() => setEditingName(true)}>
                                        <h4 className="font-bold text-lg text-gray-800">
                                            {listName || (language === "es" ? "Conteo de Inventario" : "Inventory Count")}
                                        </h4>
                                        <span className="text-gray-400 group-hover:text-mint-700 text-sm">✏️</span>
                                    </div>
                                )}
                                {/* Order progress */}
                                {totalItems > 0 && (
                                    <div className="mt-2">
                                        <div className="flex justify-between text-xs mb-1">
                                            <span className="text-gray-500">{language === "es" ? "Progreso de pedido" : "Order progress"}</span>
                                            <span className="font-bold text-mint-700">{orderedCount}/{totalItems}</span>
                                        </div>
                                        <div className="w-full bg-gray-200 rounded-full h-2">
                                            <div className="bg-mint-500 h-2 rounded-full transition-all" style={{ width: `${totalItems > 0 ? (orderedCount / totalItems * 100) : 0}%` }}></div>
                                        </div>
                                    </div>
                                )}
                            </div>

                            {/* Action buttons */}
                            <div className="flex gap-2">
                                <button onClick={() => { if (histEditMode) { saveHistEdits(); } else { setHistEditMode(true); } setShowAddPicker(false); }}
                                    className={`flex-1 py-2 rounded-lg text-xs font-bold transition ${histEditMode ? "bg-green-700 text-white" : "bg-blue-700 text-white"}`}>
                                    {histEditMode
                                        ? (language === "es" ? "✓ Guardar" : "✓ Save")
                                        : (language === "es" ? "✏️ Editar Lista" : "✏️ Edit List")}
                                </button>
                                <button onClick={printInventory}
                                    className="px-4 py-2 bg-mint-100 text-mint-700 rounded-lg text-xs font-bold hover:bg-mint-200 transition">
                                    🖨️ {language === "es" ? "Imprimir" : "Print"}
                                </button>
                            </div>

                            {/* Items list */}
                            {dayData.items.map((cat, catIdx) => (
                                <div key={catIdx} className="bg-white rounded-lg border border-gray-200 overflow-hidden">
                                    <div className="p-2 bg-mint-50 border-b border-gray-200 flex justify-between items-center">
                                        <h4 className="font-bold text-sm text-mint-800">{cat.category}</h4>
                                        <span className="text-xs text-gray-400">
                                            {cat.items.filter(i => ordered[i.id]).length}/{cat.items.length} {language === "es" ? "pedido" : "ordered"}
                                        </span>
                                    </div>
                                    <div className="divide-y divide-gray-100">
                                        {cat.items.map((item, idx) => {
                                            const count = histEditMode ? (histCounts[item.id] || 0) : (dayData.counts?.[item.id] || 0);
                                            const prevCount = prevData?.counts?.[item.id];
                                            const diff = prevCount !== undefined ? (dayData.counts?.[item.id] || 0) - prevCount : null;
                                            const isOrdered = ordered[item.id];

                                            return (
                                                <div key={idx} className={`flex items-center gap-2 px-2 py-2 text-sm ${isOrdered && !histEditMode ? "bg-green-50" : ""}`}>
                                                    {/* Checkbox */}
                                                    {!histEditMode && (
                                                        <button onClick={() => toggleOrdered(item.id)}
                                                            className={`w-6 h-6 rounded border-2 flex items-center justify-center flex-shrink-0 transition ${
                                                                isOrdered ? "bg-green-500 border-green-500 text-white" : "border-gray-300 hover:border-mint-500"}`}>
                                                            {isOrdered && <span className="text-xs font-bold">✓</span>}
                                                        </button>
                                                    )}
                                                    <div className={`flex-1 min-w-0 ${isOrdered && !histEditMode ? "line-through text-gray-400" : ""}`}>
                                                        <span className="text-gray-800">{language === "es" && item.nameEs ? item.nameEs : item.name}</span>
                                                        {item.supplier && <span className="text-xs text-gray-400 ml-1">({item.supplier})</span>}
                                                    </div>
                                                    <div className="flex items-center gap-2 flex-shrink-0">
                                                        {histEditMode ? (
                                                            <div className="flex items-center gap-1">
                                                                <button onClick={() => updateHistCount(item.id, (histCounts[item.id] || 0) - 1)}
                                                                    className="w-7 h-7 rounded bg-gray-200 text-gray-700 font-bold flex items-center justify-center hover:bg-red-100">−</button>
                                                                <span className="w-8 text-center font-bold">{histCounts[item.id] || 0}</span>
                                                                <button onClick={() => updateHistCount(item.id, (histCounts[item.id] || 0) + 1)}
                                                                    className="w-7 h-7 rounded bg-gray-200 text-gray-700 font-bold flex items-center justify-center hover:bg-green-100">+</button>
                                                            </div>
                                                        ) : (
                                                            <>
                                                                <span className="font-bold text-gray-800 w-8 text-right">{count}</span>
                                                                {diff !== null && diff !== 0 && (
                                                                    <span className={`text-xs font-bold px-1.5 py-0.5 rounded ${diff > 0 ? "bg-green-100 text-green-700" : "bg-red-100 text-red-700"}`}>
                                                                        {diff > 0 ? "+" : ""}{diff}
                                                                    </span>
                                                                )}
                                                            </>
                                                        )}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            ))}

                            {/* Add item from inventory picker */}
                            {histEditMode && !showAddPicker && (
                                <button onClick={() => { setShowAddPicker(true); setAddSearch(""); }}
                                    className="w-full py-3 rounded-xl font-bold text-sm bg-blue-600 text-white hover:bg-blue-700 active:scale-95 transition">
                                    + {language === "es" ? "Agregar Artículo del Inventario" : "Add Item from Inventory"}
                                </button>
                            )}
                            {histEditMode && showAddPicker && (
                                <div className="bg-white border-2 border-blue-300 rounded-xl overflow-hidden shadow-lg">
                                    <div className="p-3 bg-blue-50 border-b border-blue-200 flex items-center gap-2">
                                        <input type="text" value={addSearch} onChange={e => setAddSearch(e.target.value)}
                                            placeholder={language === "es" ? "🔍 Buscar artículo para agregar..." : "🔍 Search item to add..."}
                                            className="flex-1 px-3 py-2 border-2 border-gray-200 rounded-lg text-sm focus:outline-none focus:border-blue-500"
                                            autoFocus />
                                        <button onClick={() => setShowAddPicker(false)}
                                            className="px-3 py-2 bg-gray-200 text-gray-600 rounded-lg text-sm font-bold hover:bg-gray-300">✕</button>
                                    </div>
                                    <div className="max-h-64 overflow-y-auto">
                                        {(() => {
                                            const searchLower = addSearch.toLowerCase().trim();
                                            const existingIds = new Set((dayData.items || []).flatMap(cat => cat.items.map(i => i.id)));
                                            let hasResults = false;
                                            return fullInventory.map((cat, ci) => {
                                                const catName = cat.category || cat.name || "";
                                                const matchingItems = cat.items.filter(item => {
                                                    if (!searchLower) return !existingIds.has(item.id);
                                                    const nameMatch = (item.name || "").toLowerCase().includes(searchLower);
                                                    const nameEsMatch = (item.nameEs || "").toLowerCase().includes(searchLower);
                                                    const supplierMatch = (item.supplier || "").toLowerCase().includes(searchLower);
                                                    return (nameMatch || nameEsMatch || supplierMatch);
                                                });
                                                if (matchingItems.length === 0) return null;
                                                hasResults = true;
                                                return (
                                                    <div key={ci}>
                                                        <div className="px-3 py-1.5 bg-gray-50 border-b text-xs font-bold text-gray-500 uppercase">{catName}</div>
                                                        {matchingItems.map(item => {
                                                            const alreadyIn = existingIds.has(item.id);
                                                            return (
                                                                <button key={item.id}
                                                                    onClick={() => { addItemFromPicker(item, catName); }}
                                                                    className={`w-full text-left px-3 py-2.5 border-b border-gray-100 flex items-center justify-between hover:bg-blue-50 transition ${alreadyIn ? "bg-green-50" : ""}`}>
                                                                    <div>
                                                                        <span className="text-sm text-gray-800 font-medium">{language === "es" && item.nameEs ? item.nameEs : item.name}</span>
                                                                        {item.supplier && <span className="text-xs text-gray-400 ml-2">({item.supplier})</span>}
                                                                    </div>
                                                                    <span className="text-xs font-bold text-blue-600">
                                                                        {alreadyIn
                                                                            ? (language === "es" ? "+1 más" : "+1 more")
                                                                            : (language === "es" ? "+ Agregar" : "+ Add")}
                                                                    </span>
                                                                </button>
                                                            );
                                                        })}
                                                    </div>
                                                );
                                            });
                                        })()}
                                        {addSearch && fullInventory.every(cat => {
                                            const s = addSearch.toLowerCase().trim();
                                            return cat.items.every(item =>
                                                !(item.name || "").toLowerCase().includes(s) &&
                                                !(item.nameEs || "").toLowerCase().includes(s) &&
                                                !(item.supplier || "").toLowerCase().includes(s)
                                            );
                                        }) && (
                                            <div className="p-4 text-center text-gray-400 text-sm">
                                                {language === "es" ? "No se encontraron artículos" : "No items found"}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}

                            {/* Save edits button */}
                            {histEditMode && (
                                <button onClick={saveHistEdits} disabled={saving}
                                    className="w-full py-3 rounded-xl font-bold text-sm bg-mint-700 text-white hover:bg-mint-800 active:scale-95 transition disabled:opacity-50">
                                    {saving
                                        ? (language === "es" ? "Guardando..." : "Saving...")
                                        : (language === "es" ? "💾 Guardar Cambios" : "💾 Save Changes")}
                                </button>
                            )}
                        </div>
                    )}

                    {selectedDate && !dayData && (
                        <p className="text-center text-gray-400 text-sm py-4">{language === "es" ? "Sin datos para este día" : "No data for this day"}</p>
                    )}
                </div>
            );
        }

        // Maintenance Request Component
        function MaintenanceRequest({ language, staffName }) {
            const [description, setDescription] = useState("");
            const [location, setLocation] = useState("");
            const [urgency, setUrgency] = useState("normal");
            const [reason, setReason] = useState("");
            const [photoFile, setPhotoFile] = useState(null);
            const [photoPreview, setPhotoPreview] = useState(null);
            const [submitting, setSubmitting] = useState(false);
            const [submitted, setSubmitted] = useState(false);
            const [myRequests, setMyRequests] = useState([]);

            const locationOptions = [
                { en: "Kitchen — Line", es: "Cocina — Línea" },
                { en: "Kitchen — Prep Area", es: "Cocina — Área de Prep" },
                { en: "Kitchen — Walk-in", es: "Cocina — Walk-in" },
                { en: "Kitchen — Dish Pit", es: "Cocina — Lavaplatos" },
                { en: "Dining Room", es: "Comedor" },
                { en: "Restroom", es: "Baño" },
                { en: "Bar Area", es: "Área de Bar" },
                { en: "Front Entrance", es: "Entrada Principal" },
                { en: "Back of House — Office", es: "Trastienda — Oficina" },
                { en: "Back of House — Storage", es: "Trastienda — Almacén" },
                { en: "Exterior / Parking", es: "Exterior / Estacionamiento" },
                { en: "Other", es: "Otro" }
            ];

            // Load this person's recent requests
            useEffect(() => {
                const unsub = db.collection("maintenanceRequests")
                    .orderBy("createdAt", "desc")
                    .limit(50)
                    .onSnapshot((snap) => {
                        const reqs = [];
                        snap.forEach(doc => {
                            const d = doc.data();
                            if (d.submittedBy === staffName) reqs.push({ id: doc.id, ...d });
                        });
                        setMyRequests(reqs.slice(0, 10));
                    }, (err) => { console.error("Error loading requests:", err); });
                return () => unsub();
            }, [staffName]);

            const handlePhotoSelect = (e) => {
                const file = e.target.files?.[0];
                if (!file) return;
                setPhotoFile(file);
                const reader = new FileReader();
                reader.onload = (ev) => setPhotoPreview(ev.target.result);
                reader.readAsDataURL(file);
            };

            const handleSubmit = async () => {
                if (!description.trim() || !location) return;
                setSubmitting(true);
                try {
                    let photoUrl = null;
                    if (photoFile) {
                        const ref = storage.ref().child("maintenance-photos/" + Date.now() + "_" + photoFile.name);
                        await ref.put(photoFile);
                        photoUrl = await ref.getDownloadURL();
                    }
                    const now = new Date();
                    await db.collection("maintenanceRequests").add({
                        description: description.trim(),
                        location,
                        urgency,
                        reason: reason.trim(),
                        photoUrl,
                        submittedBy: staffName,
                        createdAt: now.toISOString(),
                        date: now.getFullYear() + "-" + String(now.getMonth() + 1).padStart(2, "0") + "-" + String(now.getDate()).padStart(2, "0"),
                        status: "open"
                    });
                    setDescription("");
                    setLocation("");
                    setUrgency("normal");
                    setReason("");
                    setPhotoFile(null);
                    setPhotoPreview(null);
                    setSubmitted(true);
                    setTimeout(() => setSubmitted(false), 3000);
                } catch (err) {
                    console.error("Error submitting request:", err);
                    alert(language === "es" ? "Error al enviar solicitud" : "Error submitting request");
                }
                setSubmitting(false);
            };

            const statusColors = { open: "bg-yellow-100 text-yellow-700", "in-progress": "bg-blue-100 text-blue-700", completed: "bg-green-100 text-green-700", declined: "bg-red-100 text-red-700" };
            const statusLabels = { open: language === "es" ? "Abierto" : "Open", "in-progress": language === "es" ? "En Progreso" : "In Progress", completed: language === "es" ? "Completado" : "Completed", declined: language === "es" ? "Rechazado" : "Declined" };

            return (
                <div className="p-4 pb-24">
                    <h2 className="text-2xl font-bold text-mint-700 mb-2">🔧 {language === "es" ? "Solicitud de Mantenimiento" : "Maintenance Request"}</h2>
                    <p className="text-xs text-gray-500 mb-4">{language === "es" ? "Reporta cualquier problema o reparación necesaria" : "Report any issue or repair needed"}</p>

                    {submitted && (
                        <div className="mb-4 p-3 bg-green-100 border border-green-300 rounded-lg text-center text-green-700 font-bold text-sm">
                            ✅ {language === "es" ? "¡Solicitud enviada!" : "Request submitted!"}
                        </div>
                    )}

                    <div className="bg-white rounded-xl border-2 border-gray-200 p-4 space-y-4 mb-6">
                        {/* What — description */}
                        <div>
                            <label className="text-xs font-bold text-gray-600 uppercase tracking-wide block mb-1">
                                {language === "es" ? "¿Qué necesita arreglo?" : "What needs fixing?"} *
                            </label>
                            <textarea value={description} onChange={e => setDescription(e.target.value)}
                                rows={3} placeholder={language === "es" ? "Describe el problema..." : "Describe the issue..."}
                                className="w-full border-2 border-gray-200 rounded-lg px-3 py-2 text-sm focus:border-mint-500 focus:outline-none" />
                        </div>

                        {/* Where — location */}
                        <div>
                            <label className="text-xs font-bold text-gray-600 uppercase tracking-wide block mb-1">
                                {language === "es" ? "¿Dónde?" : "Where?"} *
                            </label>
                            <select value={location} onChange={e => setLocation(e.target.value)}
                                className="w-full border-2 border-gray-200 rounded-lg px-3 py-2 text-sm focus:border-mint-500 focus:outline-none">
                                <option value="">{language === "es" ? "Selecciona ubicación..." : "Select location..."}</option>
                                {locationOptions.map(loc => (
                                    <option key={loc.en} value={loc.en}>{language === "es" ? loc.es : loc.en}</option>
                                ))}
                            </select>
                        </div>

                        {/* Urgency */}
                        <div>
                            <label className="text-xs font-bold text-gray-600 uppercase tracking-wide block mb-1">
                                {language === "es" ? "Urgencia" : "Urgency"}
                            </label>
                            <div className="flex gap-2">
                                {[
                                    { val: "low", en: "Low", es: "Baja", color: "bg-gray-100 text-gray-700 border-gray-300", active: "bg-gray-700 text-white border-gray-700" },
                                    { val: "normal", en: "Normal", es: "Normal", color: "bg-yellow-50 text-yellow-700 border-yellow-300", active: "bg-yellow-600 text-white border-yellow-600" },
                                    { val: "high", en: "High", es: "Alta", color: "bg-orange-50 text-orange-700 border-orange-300", active: "bg-orange-600 text-white border-orange-600" },
                                    { val: "urgent", en: "Urgent", es: "Urgente", color: "bg-red-50 text-red-700 border-red-300", active: "bg-red-600 text-white border-red-600" }
                                ].map(u => (
                                    <button key={u.val} onClick={() => setUrgency(u.val)}
                                        className={`flex-1 py-2 rounded-lg text-xs font-bold border-2 transition ${urgency === u.val ? u.active : u.color}`}>
                                        {language === "es" ? u.es : u.en}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* Why */}
                        <div>
                            <label className="text-xs font-bold text-gray-600 uppercase tracking-wide block mb-1">
                                {language === "es" ? "¿Por qué es importante? (opcional)" : "Why is this important? (optional)"}
                            </label>
                            <input type="text" value={reason} onChange={e => setReason(e.target.value)}
                                placeholder={language === "es" ? "Riesgo de seguridad, afecta servicio, etc." : "Safety risk, affects service, etc."}
                                className="w-full border-2 border-gray-200 rounded-lg px-3 py-2 text-sm focus:border-mint-500 focus:outline-none" />
                        </div>

                        {/* Photo */}
                        <div>
                            <label className="text-xs font-bold text-gray-600 uppercase tracking-wide block mb-1">
                                {language === "es" ? "📷 Foto (opcional)" : "📷 Photo (optional)"}
                            </label>
                            {photoPreview ? (
                                <div className="relative">
                                    <img src={photoPreview} alt="Preview" className="rounded-lg border border-gray-200 max-w-full" style={{maxHeight: "200px"}} />
                                    <button onClick={() => { setPhotoFile(null); setPhotoPreview(null); }}
                                        className="absolute top-1 right-1 bg-red-500 text-white rounded-full w-6 h-6 text-xs font-bold">✕</button>
                                </div>
                            ) : (
                                <label className="block w-full py-3 border-2 border-dashed border-gray-300 rounded-lg text-center text-sm text-gray-500 cursor-pointer hover:border-mint-400 hover:text-mint-600 transition">
                                    📷 {language === "es" ? "Toca para tomar foto" : "Tap to take photo"}
                                    <input type="file" accept="image/*" capture="environment" onChange={handlePhotoSelect} className="hidden" />
                                </label>
                            )}
                        </div>

                        {/* Submit */}
                        <button onClick={handleSubmit}
                            disabled={submitting || !description.trim() || !location}
                            className={`w-full py-3 rounded-lg font-bold text-white text-lg transition ${
                                submitting || !description.trim() || !location ? "bg-gray-300 cursor-not-allowed" : "bg-mint-700 hover:bg-mint-800"}`}>
                            {submitting ? (language === "es" ? "Enviando..." : "Submitting...") : (language === "es" ? "📩 Enviar Solicitud" : "📩 Submit Request")}
                        </button>
                    </div>

                    {/* My recent requests */}
                    {myRequests.length > 0 && (
                        <div>
                            <h3 className="text-lg font-bold text-gray-700 mb-2">{language === "es" ? "Mis Solicitudes Recientes" : "My Recent Requests"}</h3>
                            <div className="space-y-2">
                                {myRequests.map(req => (
                                    <div key={req.id} className="bg-white rounded-lg border border-gray-200 p-3">
                                        <div className="flex items-start justify-between mb-1">
                                            <p className="text-sm font-bold text-gray-800 flex-1">{req.description}</p>
                                            <span className={`text-xs font-bold px-2 py-0.5 rounded-full ml-2 whitespace-nowrap ${statusColors[req.status] || "bg-gray-100 text-gray-600"}`}>
                                                {statusLabels[req.status] || req.status}
                                            </span>
                                        </div>
                                        <p className="text-xs text-gray-500">📍 {req.location} • {new Date(req.createdAt).toLocaleDateString()}</p>
                                        {req.adminNote && <p className="text-xs text-blue-600 mt-1">💬 {req.adminNote}</p>}
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // Admin Panel Component
        function AdminPanel({ language, staffList, setStaffList }) {
            const [editingId, setEditingId] = useState(null);
            const [editPin, setEditPin] = useState("");
            const [editRole, setEditRole] = useState("");
            const [showAdd, setShowAdd] = useState(false);
            const [newName, setNewName] = useState("");
            const [newRole, setNewRole] = useState("FOH");
            const [newPin, setNewPin] = useState("");
            const [savedMsg, setSavedMsg] = useState(null);
            const [confirmRemoveId, setConfirmRemoveId] = useState(null);
            const [staffExpanded, setStaffExpanded] = useState(false);
            const [maintenanceRequests, setMaintenanceRequests] = useState([]);
            const [maintenanceExpanded, setMaintenanceExpanded] = useState(true);
            const [selectedRequest, setSelectedRequest] = useState(null);
            const [adminNote, setAdminNote] = useState("");

            const showSaved = () => { setSavedMsg(true); setTimeout(() => setSavedMsg(null), 1500); };

            // Load maintenance requests
            useEffect(() => {
                const unsub = db.collection("maintenanceRequests")
                    .orderBy("createdAt", "desc")
                    .limit(50)
                    .onSnapshot((snap) => {
                        const reqs = [];
                        snap.forEach(doc => reqs.push({ id: doc.id, ...doc.data() }));
                        setMaintenanceRequests(reqs);
                    }, (err) => { console.error("Error loading maintenance requests:", err); });
                return () => unsub();
            }, []);

            const updateRequestStatus = async (reqId, newStatus) => {
                try {
                    const updates = { status: newStatus, updatedAt: new Date().toISOString() };
                    if (adminNote.trim()) updates.adminNote = adminNote.trim();
                    await db.collection("maintenanceRequests").doc(reqId).update(updates);
                    setAdminNote("");
                    showSaved();
                } catch (err) { console.error("Error updating request:", err); }
            };

            const addAdminNoteToRequest = async (reqId) => {
                if (!adminNote.trim()) return;
                try {
                    await db.collection("maintenanceRequests").doc(reqId).update({
                        adminNote: adminNote.trim(), updatedAt: new Date().toISOString()
                    });
                    setAdminNote("");
                    showSaved();
                } catch (err) { console.error("Error adding note:", err); }
            };

            const saveStaffToFirestore = async (updatedList) => {
                try {
                    await db.collection("config").doc("staff").set({ list: updatedList });
                } catch (err) { console.error("Error saving staff:", err); }
            };

            const handleSavePin = async (id) => {
                if (editPin.length !== 4 || !/^\d{4}$/.test(editPin)) return;
                const updated = staffList.map(s => s.id === id ? { ...s, pin: editPin, role: editRole } : s);
                setStaffList(updated);
                await saveStaffToFirestore(updated);
                setEditingId(null);
                setEditPin("");
                setEditRole("");
                showSaved();
            };

            const handleAddStaff = async () => {
                if (!newName.trim() || newPin.length !== 4 || !/^\d{4}$/.test(newPin)) return;
                const maxId = Math.max(...staffList.map(s => s.id), 0);
                const newStaff = { id: maxId + 1, name: newName.trim(), role: newRole, pin: newPin };
                const updated = [...staffList, newStaff];
                setStaffList(updated);
                await saveStaffToFirestore(updated);
                setShowAdd(false);
                setNewName("");
                setNewRole("FOH");
                setNewPin("");
                showSaved();
            };

            const handleRemoveStaff = async (id) => {
                const person = staffList.find(s => s.id === id);
                if (isAdmin(person?.name)) return; // can't remove admins
                const updated = staffList.filter(s => s.id !== id);
                setStaffList(updated);
                await saveStaffToFirestore(updated);
                setConfirmRemoveId(null);
                showSaved();
            };

            const roleOptions = ["FOH", "BOH", "Shift Lead", "Kitchen Manager", "Asst Kitchen Manager", "Manager", "Owner", "Prep", "Grill", "Fryer", "Fried Rice", "Dish", "Bao/Tacos/Banh Mi", "Spring Rolls/Prep", "Pho Station"];

            return (
                <div className="p-4 pb-24">
                    <h2 className="text-2xl font-bold text-mint-700 mb-2">⚙️ {t("adminPanel", language)}</h2>
                    <p className="text-xs text-gray-500 mb-4 bg-mint-50 border border-mint-200 rounded-lg p-2">
                        🔐 {language === "es"
                            ? "Solo Andrew Shih y Julie Shih pueden acceder a este panel."
                            : "Only Andrew Shih and Julie Shih can access this panel."}
                    </p>

                    {savedMsg && (
                        <div className="mb-3 p-2 bg-green-100 border border-green-300 rounded-lg text-center text-green-700 font-bold text-sm">
                            ✅ {t("saved", language)}
                        </div>
                    )}

                    {/* ── MAINTENANCE REQUESTS ── */}
                    <div className="mb-6">
                        <button onClick={() => setMaintenanceExpanded(!maintenanceExpanded)}
                            className="w-full flex items-center justify-between bg-red-50 border-2 border-red-200 rounded-xl p-4 hover:bg-red-100 transition">
                            <div className="flex items-center gap-2">
                                <span className="text-2xl">🔧</span>
                                <div className="text-left">
                                    <h3 className="font-bold text-red-700">{language === "es" ? "Solicitudes de Mantenimiento" : "Maintenance Requests"}</h3>
                                    <p className="text-xs text-red-500">
                                        {maintenanceRequests.filter(r => r.status === "open").length} {language === "es" ? "abiertos" : "open"}
                                        {maintenanceRequests.filter(r => r.status === "in-progress").length > 0 && (
                                            ` • ${maintenanceRequests.filter(r => r.status === "in-progress").length} ${language === "es" ? "en progreso" : "in progress"}`
                                        )}
                                    </p>
                                </div>
                            </div>
                            <span className="text-gray-400 text-xl">{maintenanceExpanded ? "▼" : "▶"}</span>
                        </button>

                        {maintenanceExpanded && (
                            <div className="mt-2 space-y-2">
                                {maintenanceRequests.length === 0 ? (
                                    <p className="text-center text-gray-400 text-sm py-4">{language === "es" ? "No hay solicitudes" : "No requests yet"}</p>
                                ) : maintenanceRequests.map(req => {
                                    const isExpanded = selectedRequest === req.id;
                                    const statusColors = { open: "bg-yellow-100 text-yellow-700 border-yellow-300", "in-progress": "bg-blue-100 text-blue-700 border-blue-300", completed: "bg-green-100 text-green-700 border-green-300", declined: "bg-red-100 text-red-700 border-red-300" };
                                    const urgencyDot = { low: "🟢", normal: "🟡", high: "🟠", urgent: "🔴" };
                                    return (
                                        <div key={req.id} className={`bg-white rounded-lg border-2 overflow-hidden ${req.status === "open" ? "border-yellow-200" : "border-gray-200"}`}>
                                            <button onClick={() => setSelectedRequest(isExpanded ? null : req.id)}
                                                className="w-full p-3 text-left">
                                                <div className="flex items-start justify-between">
                                                    <div className="flex-1">
                                                        <div className="flex items-center gap-1.5 mb-0.5">
                                                            <span className="text-sm">{urgencyDot[req.urgency] || "🟡"}</span>
                                                            <p className="text-sm font-bold text-gray-800">{req.description}</p>
                                                        </div>
                                                        <p className="text-xs text-gray-500">📍 {req.location} • 👤 {req.submittedBy} • {new Date(req.createdAt).toLocaleDateString()}</p>
                                                    </div>
                                                    <span className={`text-xs font-bold px-2 py-0.5 rounded-full border ml-2 whitespace-nowrap ${statusColors[req.status] || "bg-gray-100 text-gray-600 border-gray-300"}`}>
                                                        {req.status === "in-progress" ? (language === "es" ? "En Progreso" : "In Progress") : req.status === "open" ? (language === "es" ? "Abierto" : "Open") : req.status === "completed" ? (language === "es" ? "Completado" : "Done") : (language === "es" ? "Rechazado" : "Declined")}
                                                    </span>
                                                </div>
                                            </button>

                                            {isExpanded && (
                                                <div className="px-3 pb-3 border-t border-gray-100 pt-2 space-y-2">
                                                    {req.reason && <p className="text-xs text-gray-600"><span className="font-bold">{language === "es" ? "Razón:" : "Why:"}</span> {req.reason}</p>}
                                                    <p className="text-xs text-gray-500">{language === "es" ? "Enviado:" : "Submitted:"} {new Date(req.createdAt).toLocaleString()}</p>
                                                    {req.photoUrl && (
                                                        <img src={req.photoUrl} alt="Maintenance" className="rounded-lg border border-gray-200 max-w-full cursor-pointer" style={{maxHeight: "200px"}}
                                                            onClick={() => window.open(req.photoUrl, "_blank")} />
                                                    )}
                                                    {req.adminNote && <p className="text-xs bg-blue-50 border border-blue-200 rounded p-2 text-blue-700">💬 {req.adminNote}</p>}

                                                    {/* Admin note input */}
                                                    <div className="flex gap-1">
                                                        <input type="text" value={adminNote} onChange={e => setAdminNote(e.target.value)}
                                                            placeholder={language === "es" ? "Agregar nota..." : "Add note..."}
                                                            className="flex-1 border border-gray-200 rounded px-2 py-1.5 text-xs" />
                                                        <button onClick={() => addAdminNoteToRequest(req.id)}
                                                            className="bg-blue-500 text-white text-xs font-bold px-2 py-1.5 rounded">💬</button>
                                                    </div>

                                                    {/* Status buttons */}
                                                    <div className="flex gap-1.5">
                                                        {req.status !== "in-progress" && (
                                                            <button onClick={() => updateRequestStatus(req.id, "in-progress")}
                                                                className="flex-1 py-1.5 bg-blue-500 text-white rounded text-xs font-bold">
                                                                {language === "es" ? "En Progreso" : "In Progress"}
                                                            </button>
                                                        )}
                                                        {req.status !== "completed" && (
                                                            <button onClick={() => updateRequestStatus(req.id, "completed")}
                                                                className="flex-1 py-1.5 bg-green-600 text-white rounded text-xs font-bold">
                                                                {language === "es" ? "Completado" : "Done"}
                                                            </button>
                                                        )}
                                                        {req.status !== "declined" && req.status !== "completed" && (
                                                            <button onClick={() => updateRequestStatus(req.id, "declined")}
                                                                className="flex-1 py-1.5 bg-red-500 text-white rounded text-xs font-bold">
                                                                {language === "es" ? "Rechazar" : "Decline"}
                                                            </button>
                                                        )}
                                                        {(req.status === "completed" || req.status === "declined") && (
                                                            <button onClick={() => updateRequestStatus(req.id, "open")}
                                                                className="flex-1 py-1.5 bg-yellow-500 text-white rounded text-xs font-bold">
                                                                {language === "es" ? "Reabrir" : "Reopen"}
                                                            </button>
                                                        )}
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                    </div>

                    {/* ── STAFF LIST (collapsible) ── */}
                    <div className="mb-6">
                        <button onClick={() => setStaffExpanded(!staffExpanded)}
                            className="w-full flex items-center justify-between bg-blue-50 border-2 border-blue-200 rounded-xl p-4 hover:bg-blue-100 transition">
                            <div className="flex items-center gap-2">
                                <span className="text-2xl">👥</span>
                                <div className="text-left">
                                    <h3 className="font-bold text-blue-700">{language === "es" ? "Personal" : "Staff"}</h3>
                                    <p className="text-xs text-blue-500">{staffList.length} {language === "es" ? "empleados" : "members"}</p>
                                </div>
                            </div>
                            <span className="text-gray-400 text-xl">{staffExpanded ? "▼" : "▶"}</span>
                        </button>

                        {staffExpanded && (
                            <div className="mt-2">
                                <div className="space-y-2 mb-4">
                                    {staffList.map(person => (
                                        <div key={person.id} className="bg-white rounded-lg border-2 border-gray-200 overflow-hidden">
                                            {editingId === person.id ? (
                                                <div className="p-3 bg-blue-50 space-y-2">
                                                    <p className="font-bold text-gray-800">{person.name}</p>
                                                    <div>
                                                        <label className="text-xs text-gray-600 font-semibold">{t("staffRole", language)}</label>
                                                        <select value={editRole} onChange={(e) => setEditRole(e.target.value)}
                                                            className="w-full px-2 py-2 border-2 border-gray-300 rounded-lg focus:border-mint-700 focus:outline-none text-sm">
                                                            {roleOptions.map(r => <option key={r} value={r}>{r}</option>)}
                                                        </select>
                                                    </div>
                                                    <div>
                                                        <label className="text-xs text-gray-600 font-semibold">{t("newPIN", language)}</label>
                                                        <input type="text" inputMode="numeric" maxLength={4} value={editPin}
                                                            onChange={(e) => setEditPin(e.target.value.replace(/\D/g, "").slice(0, 4))}
                                                            placeholder="0000"
                                                            className="w-full px-3 py-2 border-2 border-gray-300 rounded-lg text-center text-2xl tracking-widest font-mono focus:border-mint-700 focus:outline-none" />
                                                    </div>
                                                    <div className="flex gap-2">
                                                        <button onClick={() => handleSavePin(person.id)}
                                                            disabled={editPin.length !== 4}
                                                            className={`flex-1 py-2 rounded-lg font-bold text-white transition ${editPin.length === 4 ? "bg-green-700 hover:bg-green-800" : "bg-gray-300 cursor-not-allowed"}`}>
                                                            {t("save", language)}
                                                        </button>
                                                        <button onClick={() => { setEditingId(null); setEditPin(""); setEditRole(""); }}
                                                            className="flex-1 py-2 rounded-lg font-bold bg-gray-500 text-white hover:bg-gray-600 transition">
                                                            {t("cancel", language)}
                                                        </button>
                                                    </div>
                                                </div>
                                            ) : (
                                                <div className="p-3 flex items-center justify-between">
                                                    <div>
                                                        <p className="font-bold text-gray-800">{person.name}</p>
                                                        <p className="text-xs text-gray-500">{person.role} • PIN: {person.pin}</p>
                                                    </div>
                                                    <div className="flex items-center gap-2">
                                                        <button onClick={() => { setEditingId(person.id); setEditPin(person.pin); setEditRole(person.role); }}
                                                            className="px-3 py-1.5 bg-blue-100 text-blue-700 rounded-lg text-xs font-bold hover:bg-blue-200 transition">
                                                            ✏️ {t("changePIN", language)}
                                                        </button>
                                                        {!isAdmin(person.name) && (
                                                            confirmRemoveId === person.id ? (
                                                                <div className="flex gap-1">
                                                                    <button onClick={() => handleRemoveStaff(person.id)}
                                                                        className="px-2 py-1.5 bg-red-600 text-white rounded-lg text-xs font-bold hover:bg-red-700">✓</button>
                                                                    <button onClick={() => setConfirmRemoveId(null)}
                                                                        className="px-2 py-1.5 bg-gray-400 text-white rounded-lg text-xs font-bold hover:bg-gray-500">✕</button>
                                                                </div>
                                                            ) : (
                                                                <button onClick={() => setConfirmRemoveId(person.id)}
                                                                    className="px-2 py-1.5 bg-mint-100 text-mint-700 rounded-lg text-xs font-bold hover:bg-mint-200 transition">
                                                                    🗑️
                                                                </button>
                                                            )
                                                        )}
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>

                                {showAdd ? (
                                    <div className="bg-green-50 border-2 border-green-300 rounded-lg p-4 space-y-3">
                                        <h3 className="font-bold text-green-800">{t("addStaff", language)}</h3>
                                        <div>
                                            <label className="text-xs text-gray-600 font-semibold">{t("staffName", language)}</label>
                                            <input type="text" value={newName} onChange={(e) => setNewName(e.target.value)}
                                                placeholder={language === "es" ? "Nombre completo" : "Full name"}
                                                className="w-full px-3 py-2 border-2 border-gray-300 rounded-lg focus:border-green-700 focus:outline-none" />
                                        </div>
                                        <div>
                                            <label className="text-xs text-gray-600 font-semibold">{t("staffRole", language)}</label>
                                            <select value={newRole} onChange={(e) => setNewRole(e.target.value)}
                                                className="w-full px-2 py-2 border-2 border-gray-300 rounded-lg focus:border-green-700 focus:outline-none text-sm">
                                                {roleOptions.map(r => <option key={r} value={r}>{r}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="text-xs text-gray-600 font-semibold">{t("staffPIN", language)} (4 {language === "es" ? "dígitos" : "digits"})</label>
                                            <input type="text" inputMode="numeric" maxLength={4} value={newPin}
                                                onChange={(e) => setNewPin(e.target.value.replace(/\D/g, "").slice(0, 4))}
                                                placeholder="0000"
                                                className="w-full px-3 py-2 border-2 border-gray-300 rounded-lg text-center text-2xl tracking-widest font-mono focus:border-green-700 focus:outline-none" />
                                        </div>
                                        <div className="flex gap-2">
                                            <button onClick={handleAddStaff}
                                                disabled={!newName.trim() || newPin.length !== 4}
                                                className={`flex-1 py-2 rounded-lg font-bold text-white transition ${newName.trim() && newPin.length === 4 ? "bg-green-700 hover:bg-green-800" : "bg-gray-300 cursor-not-allowed"}`}>
                                                {t("addStaff", language)}
                                            </button>
                                            <button onClick={() => { setShowAdd(false); setNewName(""); setNewRole("FOH"); setNewPin(""); }}
                                                className="flex-1 py-2 rounded-lg font-bold bg-gray-500 text-white hover:bg-gray-600 transition">
                                                {t("cancel", language)}
                                            </button>
                                        </div>
                                    </div>
                                ) : (
                                    <button onClick={() => setShowAdd(true)}
                                        className="w-full py-3 bg-green-700 text-white font-bold rounded-lg hover:bg-green-800 transition text-lg">
                                        + {t("addStaff", language)}
                                    </button>
                                )}
                            </div>
                        )}
                    </div>

                    {/* Checklist History Section */}
                    <div className="mt-8 pt-6 border-t-2 border-gray-200">
                        <h3 className="text-xl font-bold text-mint-700 mb-1">📋 {language === "es" ? "Historial de Listas" : "Checklist History"}</h3>
                        <p className="text-xs text-gray-500 mb-4">{language === "es"
                            ? "Revisa las listas de apertura y cierre de días anteriores"
                            : "Review opening and closing checklists from previous days"}</p>
                        <ChecklistHistory language={language} />
                    </div>

                    {/* Inventory History Section */}
                    <div className="mt-8 pt-6 border-t-2 border-gray-200">
                        <h3 className="text-xl font-bold text-mint-700 mb-1">📦 {language === "es" ? "Historial de Inventario" : "Inventory History"}</h3>
                        <p className="text-xs text-gray-500 mb-4">{language === "es"
                            ? "Revisa los conteos de inventario de días anteriores. Los cambios vs el día anterior se muestran en verde/rojo."
                            : "Review inventory counts from previous days. Changes vs the prior day are shown in green/red."}</p>
                        <InventoryHistory language={language} customInventory={null} />
                    </div>
                </div>
            );
        }

        // Main App Component
        function App() {
            const [staffName, setStaffName] = useState(null);
            const [language, setLanguage] = useState("en");
            const [activeTab, setActiveTab] = useState("home");
            const [staffList, setStaffList] = useState(DEFAULT_STAFF);
            const { isAtDDMau, checking: geoChecking, error: geoError } = useGeofence();

            // Load staff list from Firestore (falls back to DEFAULT_STAFF)
            useEffect(() => {
                const unsubscribe = db.collection("config").doc("staff").onSnapshot((doc) => {
                    if (doc.exists && doc.data().list) {
                        setStaffList(doc.data().list);
                    }
                });
                return () => unsubscribe();
            }, []);

            const staffIsAdmin = isAdmin(staffName);

            if (!staffName) {
                return <HomePage onSelectStaff={setStaffName} language={language} staffList={staffList} />;
            }

            return (
                <div className="bg-white min-h-screen">
                    {/* Header */}
                    <div className="bg-gradient-to-r from-mint-700 to-mint-600 text-white p-4 sticky top-0 z-40 shadow-lg">
                        <div className="max-w-lg mx-auto flex justify-between items-center">
                            <div>
                                <h1 className="text-2xl font-bold">🍜 DD Mau</h1>
                                <p className="text-sm text-mint-100">{t("staffPortal", language)}</p>
                            </div>
                            <div className="flex gap-2">
                                <button
                                    onClick={() => setLanguage(language === "en" ? "es" : "en")}
                                    className="bg-mint-500 hover:bg-mint-700 rounded-full p-2 font-bold text-sm transition"
                                >
                                    🌐 {language === "en" ? "ES" : "EN"}
                                </button>
                                <button
                                    onClick={() => {
                                        setStaffName(null);
                                        setActiveTab("home");
                                    }}
                                    className="bg-mint-500 hover:bg-mint-700 px-3 py-2 rounded-lg text-sm font-bold transition"
                                >
                                    {t("logout", language)}
                                </button>
                            </div>
                        </div>
                        <p className="text-xs text-mint-100 mt-2">{staffName}</p>
                    </div>

                    {/* Content */}
                    <div className="max-w-lg mx-auto">
                        {activeTab === "home" && (
                            <div className="p-4 pb-24">
                                <h2 className="text-2xl font-bold text-mint-700 mb-6">{t("welcome", language)}, {staffName}!</h2>
                                <div className="grid grid-cols-1 gap-3">
                                    <button
                                        onClick={() => setActiveTab("training")}
                                        className="p-4 bg-gradient-to-br from-blue-50 to-blue-100 border-2 border-blue-300 rounded-lg hover:shadow-lg transition text-left"
                                    >
                                        <div className="text-3xl mb-2">📚</div>
                                        <div className="font-bold text-blue-700">{t("trainingHub", language)}</div>
                                        <div className="text-xs text-blue-600">{language === "es" ? "Completa tus módulos de capacitación" : "Complete your training modules"}</div>
                                    </button>
                                    <button
                                        onClick={() => setActiveTab("operations")}
                                        className="p-4 bg-gradient-to-br from-purple-50 to-purple-100 border-2 border-purple-300 rounded-lg hover:shadow-lg transition text-left"
                                    >
                                        <div className="text-3xl mb-2">📋</div>
                                        <div className="font-bold text-purple-700">{t("dailyOps", language)}</div>
                                        <div className="text-xs text-purple-600">{language === "es" ? "Listas de verificación e inventario" : "Checklists and inventory"}</div>
                                    </button>
                                    <button
                                        onClick={() => setActiveTab("menu")}
                                        className="p-4 bg-gradient-to-br from-green-50 to-green-100 border-2 border-green-300 rounded-lg hover:shadow-lg transition text-left"
                                    >
                                        <div className="text-3xl mb-2">🍜</div>
                                        <div className="font-bold text-green-700">{t("menuReference", language)}</div>
                                        <div className="text-xs text-green-600">{language === "es" ? "Explora el menú" : "Browse the menu"}</div>
                                    </button>
                                    <button
                                        onClick={() => setActiveTab("schedule")}
                                        className="p-4 bg-gradient-to-br from-orange-50 to-orange-100 border-2 border-orange-300 rounded-lg hover:shadow-lg transition text-left"
                                    >
                                        <div className="text-3xl mb-2">📅</div>
                                        <div className="font-bold text-orange-700">{t("weeklySchedule", language)}</div>
                                        <div className="text-xs text-orange-600">{language === "es" ? "Revisa tus turnos" : "Check your shifts"}</div>
                                    </button>
                                    {isAtDDMau ? (
                                        <button
                                            onClick={() => setActiveTab("recipes")}
                                            className="p-4 bg-gradient-to-br from-amber-50 to-amber-100 border-2 border-amber-300 rounded-lg hover:shadow-lg transition text-left"
                                        >
                                            <div className="text-3xl mb-2">🧑‍🍳</div>
                                            <div className="font-bold text-amber-700">{t("recipesTitle", language)}</div>
                                            <div className="text-xs text-amber-600">{language === "es" ? "Solo disponible en DD Mau" : "Only available at DD Mau"}</div>
                                        </button>
                                    ) : (
                                        <div className="p-4 bg-gradient-to-br from-gray-50 to-gray-100 border-2 border-gray-200 rounded-lg text-left opacity-60">
                                            <div className="text-3xl mb-2">🔒</div>
                                            <div className="font-bold text-gray-500">{t("recipesTitle", language)}</div>
                                            <div className="text-xs text-gray-400">
                                                {geoChecking ? (language === "es" ? "Verificando ubicación..." : "Checking location...") :
                                                 geoError === "denied" ? (language === "es" ? "Permiso de ubicación denegado — actívalo en ajustes" : "Location permission denied — enable in settings") :
                                                 geoError ? (language === "es" ? "Ubicación no disponible" : "Location unavailable") :
                                                 (language === "es" ? "Solo disponible en DD Mau" : "Only available at DD Mau")}
                                            </div>
                                        </div>
                                    )}
                                    <button
                                        onClick={() => setActiveTab("maintenance")}
                                        className="p-4 bg-gradient-to-br from-red-50 to-red-100 border-2 border-red-300 rounded-lg hover:shadow-lg transition text-left"
                                    >
                                        <div className="text-3xl mb-2">🔧</div>
                                        <div className="font-bold text-red-700">{language === "es" ? "Mantenimiento" : "Maintenance"}</div>
                                        <div className="text-xs text-red-600">{language === "es" ? "Reportar un problema" : "Report an issue"}</div>
                                    </button>
                                    {staffIsAdmin && (
                                        <button
                                            onClick={() => setActiveTab("admin")}
                                            className="p-4 bg-gradient-to-br from-mint-50 to-mint-100 border-2 border-mint-400 rounded-lg hover:shadow-lg transition text-left"
                                        >
                                            <div className="text-3xl mb-2">⚙️</div>
                                            <div className="font-bold text-mint-700">{t("adminPanel", language)}</div>
                                            <div className="text-xs text-mint-600">{language === "es" ? "PINs, personal, configuración" : "PINs, staff, settings"}</div>
                                        </button>
                                    )}
                                </div>
                            </div>
                        )}

                        {activeTab === "training" && <TrainingHub staffName={staffName} language={language} />}
                        {activeTab === "operations" && <Operations language={language} staffList={staffList} staffName={staffName} />}
                        {activeTab === "menu" && <MenuReference language={language} />}
                        {activeTab === "schedule" && <Schedule staffName={staffName} language={language} />}
                        {activeTab === "recipes" && isAtDDMau && <Recipes language={language} staffName={staffName} />}
                        {activeTab === "maintenance" && <MaintenanceRequest language={language} staffName={staffName} />}
                        {activeTab === "admin" && staffIsAdmin && <AdminPanel language={language} staffList={staffList} setStaffList={setStaffList} />}
                    </div>

                    {/* Bottom Navigation */}
                    <nav className="fixed bottom-0 left-0 right-0 bg-white border-t-2 border-gray-200 navbar-shadow">
                        <div className="max-w-lg mx-auto flex justify-around items-center h-20">
                            <button
                                onClick={() => setActiveTab("home")}
                                className={`flex flex-col items-center justify-center flex-1 h-full transition ${activeTab === "home" ? "text-mint-700 bg-mint-50" : "text-gray-600 hover:text-mint-700"}`}
                            >
                                <span className="text-2xl">🏠</span>
                                <span className="text-xs font-bold mt-1">{t("home", language)}</span>
                            </button>
                            <button
                                onClick={() => setActiveTab("training")}
                                className={`flex flex-col items-center justify-center flex-1 h-full transition ${activeTab === "training" ? "text-mint-700 bg-mint-50" : "text-gray-600 hover:text-mint-700"}`}
                            >
                                <span className="text-2xl">📚</span>
                                <span className="text-xs font-bold mt-1">{t("training", language)}</span>
                            </button>
                            <button
                                onClick={() => setActiveTab("operations")}
                                className={`flex flex-col items-center justify-center flex-1 h-full transition ${activeTab === "operations" ? "text-mint-700 bg-mint-50" : "text-gray-600 hover:text-mint-700"}`}
                            >
                                <span className="text-2xl">📋</span>
                                <span className="text-xs font-bold mt-1">{t("operations", language)}</span>
                            </button>
                            <button
                                onClick={() => setActiveTab("menu")}
                                className={`flex flex-col items-center justify-center flex-1 h-full transition ${activeTab === "menu" ? "text-mint-700 bg-mint-50" : "text-gray-600 hover:text-mint-700"}`}
                            >
                                <span className="text-2xl">🍜</span>
                                <span className="text-xs font-bold mt-1">{t("menu", language)}</span>
                            </button>
                            <button
                                onClick={() => setActiveTab("schedule")}
                                className={`flex flex-col items-center justify-center flex-1 h-full transition ${activeTab === "schedule" ? "text-mint-700 bg-mint-50" : "text-gray-600 hover:text-mint-700"}`}
                            >
                                <span className="text-2xl">📅</span>
                                <span className="text-xs font-bold mt-1">{t("schedule", language)}</span>
                            </button>
                            {isAtDDMau && (
                                <button
                                    onClick={() => setActiveTab("recipes")}
                                    className={`flex flex-col items-center justify-center flex-1 h-full transition ${activeTab === "recipes" ? "text-mint-700 bg-mint-50" : "text-gray-600 hover:text-mint-700"}`}
                                >
                                    <span className="text-2xl">🧑‍🍳</span>
                                    <span className="text-xs font-bold mt-1">{t("recipes", language)}</span>
                                </button>
                            )}
                            {staffIsAdmin && (
                                <button
                                    onClick={() => setActiveTab("admin")}
                                    className={`flex flex-col items-center justify-center flex-1 h-full transition ${activeTab === "admin" ? "text-mint-700 bg-mint-50" : "text-gray-600 hover:text-mint-700"}`}
                                >
                                    <span className="text-2xl">⚙️</span>
                                    <span className="text-xs font-bold mt-1">{t("admin", language)}</span>
                                </button>
                            )}
                        </div>
                    </nav>
                </div>
            );
        }

        // Render App
        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
