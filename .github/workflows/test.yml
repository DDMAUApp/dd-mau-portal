name: Test

# Runs the test suite on every push + PR. The existing deploy
# workflow runs INDEPENDENTLY on push-to-main (so a failing test
# does NOT currently block deploy — we'll wire that gate once the
# test suite covers enough of the surface to make the gate
# meaningful, probably after the multi-tenant migration ships).
#
# 2026-05-16 — added as part of Phase 1 (multi-tenant foundations).
# First job: prove tests run green in CI. Once we have ~50+ tests
# covering rules + critical helpers, this workflow becomes a deploy
# blocker.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
