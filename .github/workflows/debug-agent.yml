# DD Mau self-healing debug agent — 24/7 in the cloud (GitHub Actions).
#
# Runs the SAME agent as the local scheduled task, but on GitHub's servers so it
# works even when Andrew's Mac is off. It reads the "🐛 Debug Agent" chat thread
# + the getDebugQueue endpoint, investigates, and opens fix PRs — NEVER merging.
#
# ── ONE-TIME ACTIVATION (Andrew) ─────────────────────────────────────────────
# Settings → Secrets and variables → Actions:
#   Secrets:
#     • ANTHROPIC_API_KEY        — a pay-per-use API key from console.anthropic.com
#                                  (needs a credit balance). Reliable for CI automation.
#                                  (To use a Claude subscription token instead, add
#                                  CLAUDE_CODE_OAUTH_TOKEN and swap the `with:` line below.)
#     • FIREBASE_SERVICE_ACCOUNT — paste the FULL contents of firebase-service-account.json
#   Variables:
#     • DEBUG_AGENT_ENABLED = true   ← the on-switch. Until this is "true" the job
#                                      is skipped, so there are NO failing runs while
#                                      you set up the secrets.
# Then either wait for the next :00/:15/:30/:45, or run it once manually:
# Actions → "DD Mau debug agent (24/7)" → Run workflow.
# Cost: ~96 runs/day; almost all exit in seconds with nothing to do.

name: DD Mau debug agent (24/7)

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 min (UTC; GitHub may delay under load) — SAFETY-NET backstop
  workflow_dispatch: {}        # manual "Run workflow" button
  repository_dispatch:         # INSTANT wake from a Cloud Function (functions/index.js
    types:                     # wakeDebugAgent): chat command or critical error → runs in seconds,
      - chat-command           # instead of waiting on the unreliable cron above.
      - critical-error

permissions:
  contents: write
  pull-requests: write
  id-token: write

# Never run two agents at once; let an in-flight run finish rather than cancel it
# mid-fix.
concurrency:
  group: dd-mau-debug-agent
  cancel-in-progress: false

jobs:
  agent:
    # On-switch: stays skipped (no red failing runs) until Andrew sets the
    # repo variable DEBUG_AGENT_ENABLED = true.
    if: ${{ vars.DEBUG_AGENT_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps (build/test/agent-comms need them)
        run: npm ci

      - name: Materialize the Firebase service account (for the chat bridge)
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > firebase-service-account.json

      - name: Run the debug agent
        uses: anthropics/claude-code-action@v1
        with:
          # Auth via a pay-per-use Anthropic API key (reliable for headless CI
          # automation; subscription OAuth tokens were rejected on the first call).
          # Needs the ANTHROPIC_API_KEY secret + a credit balance at console.anthropic.com.
          # To switch back to a subscription token: replace the line below with
          #   claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are the DD Mau self-healing debug agent, running in GitHub Actions (CI).

            ENVIRONMENT — read carefully, it differs from the playbook's local notes:
            - You are ALREADY in the repo root on a fresh, clean checkout of `main`. Do NOT `cd` to any /Users/... path, and do NOT run `git checkout main` / `git pull` — ignore those lines in the playbook; they're for the local Mac runner.
            - `gh` is authenticated via the GH_TOKEN env var — `gh pr create` works directly.
            - `firebase-service-account.json` is present at the repo root, so `node scripts/qa/agent-comms.mjs read|post` works for the chat thread.
            - `npm ci` already ran, so `npm run build` and `npx vitest run` work.

            TASK: Read `scripts/qa/debug-agent.md` and follow it, with these CI overrides:

            1. OWNER COMMAND CHANNEL FIRST — `node scripts/qa/agent-comms.mjs read --limit 40`. Find the LATEST "Andrew Shih" message that has NO agent CONCLUSION after it. CRITICAL: a bare "👀 On it"/acknowledgement does NOT count as handled — only a final findings / PR-link / answer / clarifying-question message counts. If you find such an unanswered request, you MUST FULLY complete it IN THIS SAME RUN (each run is stateless — there is no "later", so never post "on it, will report shortly" and stop). Investigate from his description — you are NOT limited to logged errors; read the relevant code (Grep/Read). Then END by posting ONE conclusive message via `node scripts/qa/agent-comms.mjs post "..."`:
               • Found + safe to fix → new branch `autofix/<slug>`, `npm run build` + `npx vitest run` (BOTH must pass), `gh pr create --base main`, then post `✅ <what> — <PR url>`.
               • Investigated but nothing to safely change → post `🔍 Looked into <X>: <what you found / why no change>`.
               • Genuinely need input → post `❓ <question>` --urgent.
               For a broad ask like "do a bug search", TIME-BOX it: sweep the highest-signal recent/changed areas + the error queue, then report what you found — do not attempt to read the whole codebase.
            2. THEN triage the error queue: `curl -fsS "https://us-central1-dd-mau-staff-app.cloudfunctions.net/getDebugQueue"` (ops/infra → note; code bug → fix PR; dedup vs `gh pr list --state open`).

            HOW TO WRITE YOUR CHAT POSTS — make them clear status updates Andrew can skim on his phone (match the way Claude updates him: lead with the result, then a few short lines):
            - For any real task, post TWO messages in THIS run: (a) a quick kickoff `👀 On it — <one line of exactly what you're checking>`, then (b) the result. Both land in the same run; the kickoff alone is NOT a conclusion.
            - Lead every post with a status marker: ✅ done/fixed · 🔍 investigated · ⚠️ needs your call · ❌ blocked · 👀 starting.
            - Then a few SHORT lines: what you checked → what you found → what (if anything) Andrew needs to do. Plain English; name the screen/feature in everyday terms (NOT file paths); include the PR link when there is one.
            - Chat-friendly only: short lines + simple `•` bullets. NO wide markdown tables.
            - Be honest + specific: if nothing's wrong, say what you checked and why it's fine. Never end on a bare "on it".

            ALWAYS leave the thread with a conclusion when you picked up a request — nothing should dangle to the next run.
            SHIP COMMAND (the ONE time you may merge + deploy): if Andrew's latest message is an explicit ship instruction — "ship it", "ship PR #N", "deploy the <x> fix", "make it live", "push it live" — then and ONLY then:
              1. Identify the PR: a number if he named one; else the most-recent OPEN `autofix/*` PR (`gh pr list --state open --head 'autofix/' --json number,title,headRefName`). If there are several open and he didn't say which, ASK which one — do NOT guess.
              2. Re-verify it's safe: `gh pr view <n>` is OPEN + mergeable; if it has CI checks, `gh pr checks <n>` must be green; (you already ran build+tests when you opened it). If it touches a caution zone (payroll/auth/PIN/schedule-transaction/cents-math/Firestore-rules) and he didn't clearly acknowledge that, confirm once before shipping.
              3. Detect server changes: `gh pr diff <n> --name-only | grep -q '^functions/'` → deploy_functions = true, else false.
              4. Merge: `gh pr merge <n> --merge --delete-branch` (uses GH_TOKEN).
              5. Deploy: fire the Ship Live workflow with the SHIP_PAT env var (a GITHUB_TOKEN dispatch can't start a workflow, so you MUST use SHIP_PAT):
                 `GH_TOKEN="$SHIP_PAT" gh api "repos/$GITHUB_REPOSITORY/dispatches" --method POST -f event_type=ship-live -F "client_payload[deploy_functions]=<true|false>"`
                 (If SHIP_PAT is empty, do NOT merge silently — post `⚠️ Merged-ready but SHIP_PAT isn't set, so I can't deploy from here. Merge PR #<n> in the GitHub app, then Actions → "Ship Live" → Run workflow.` and stop.)
              6. Post: `✅ Shipping PR #<n> (<title>) — web + phones<+ functions> live in ~2-3 min. Watch: https://github.com/$GITHUB_REPOSITORY/actions/workflows/ship-live.yml`.
            HARD RULES: NEVER merge or push to `main` EXCEPT the explicit SHIP COMMAND above (an unambiguous "ship it" from Andrew for a specific reviewed PR). For normal bug work it is PRs only — never auto-merge your own fix. NEVER `git add` firebase-service-account.json. Cap ~3 PRs/run. Extra caution (ask, don't auto-edit) on payroll / auth / PIN / schedule-transaction / cents-math / Firestore-rules. If the chat has NO unanswered request AND the queue is clear, do nothing and exit.
          claude_args: |
            --model claude-opus-4-8
            --max-turns 80
            --allowedTools "Bash,Read,Edit,Write,Glob,Grep"
        env:
          GH_TOKEN: ${{ github.token }}
          # PAT (fine-grained, Contents+Actions write on this repo) used ONLY to
          # fire the Ship Live workflow on an explicit "ship it". A GITHUB_TOKEN
          # dispatch can't start another workflow, so a PAT is required. The
          # agent merges with GH_TOKEN; it touches SHIP_PAT only to dispatch.
          # Andrew can reuse the existing dispatch PAT value here.
          SHIP_PAT: ${{ secrets.SHIP_PAT }}

      # GUARANTEE a chat reply. Runs even if the agent step errored/timed-out.
      # ensure-reply posts a fallback ONLY when the newest thread message isn't
      # from the agent (owner still waiting) — a pure Firestore write, so it works
      # even when the agent couldn't run (out of API credit, error, timeout). The
      # owner is never left hanging. Must run BEFORE the credential scrub below.
      - name: Guarantee a chat reply (fallback if the agent went silent)
        if: always()
        run: |
          node scripts/qa/agent-comms.mjs ensure-reply "⚠️ I saw your message but this run couldn't post a full answer — it likely errored, timed out, or the shared Anthropic API key is out of credit. Re-send once it's sorted and I'll pick it right back up. (Check the Actions log + Anthropic credit balance.)" || true

      - name: Scrub credentials (always)
        if: always()
        run: rm -f firebase-service-account.json
