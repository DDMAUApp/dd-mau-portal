name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        # 2026-05-27 — Sentry source-map upload env vars. All four
        # must be set as GitHub Actions Repository Secrets for the
        # source maps to upload to Sentry on each deploy. Without
        # them, sentry.io stack traces show minified names like
        # 'Ll' / '$' / 'ge' instead of real function names.
        #
        # To configure:
        # https://github.com/DDMAUApp/dd-mau-portal/settings/secrets/actions
        #   • SENTRY_AUTH_TOKEN  — sntrys_… (create at sentry.io →
        #                          Settings → Auth Tokens, scopes:
        #                          project:write + project:releases)
        #   • SENTRY_ORG         — dd-mau
        #   • SENTRY_PROJECT     — dd-mau-portal
        #   • VITE_SENTRY_DSN    — already hardcoded as fallback in
        #                          src/data/sentryClient.js, but
        #                          passing it explicitly is cleaner.
        #
        # If these secrets aren't set, the build still succeeds —
        # vite.config.js gates the Sentry plugin on their presence
        # and falls back to no-source-maps (per the conditional
        # sourcemap setting in build options).
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
